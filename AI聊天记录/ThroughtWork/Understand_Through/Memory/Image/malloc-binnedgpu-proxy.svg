<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8f9fa"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">MallocBinnedGPU — CPU代理块与GPU内存指针分离</text>

  <!-- CPU Metadata block layout -->
  <text x="20" y="58" font-size="13" font-weight="bold" fill="#1971c2">核心设计: CPU可写的元数据块 + GPU内存独立分离</text>

  <!-- FGPUMemoryBlockProxy structure -->
  <rect x="20" y="65" width="920" height="130" rx="6" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="2"/>
  <text x="30" y="82" font-size="12" font-weight="bold" fill="#3b5bdb">FGPUMemoryBlockProxy — 放在CPU可写内存中的代理结构</text>

  <!-- proxy cells -->
  <rect x="30" y="88" width="520" height="50" rx="4" fill="#a9e34b" stroke="#74b816" stroke-width="2"/>
  <text x="290" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b5c00">MemoryModifiedByCPU[32 - sizeof(void*)] 字节</text>
  <text x="290" y="128" text-anchor="middle" font-size="10" fill="#2b5c00">CPU可以自由读写的元数据 (BookKeeping信息，如 FFreeBlock 字段)</text>

  <rect x="554" y="88" width="200" height="50" rx="4" fill="#f783ac" stroke="#c2255c" stroke-width="2"/>
  <text x="654" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c0d24">void* GPUMemory</text>
  <text x="654" y="125" text-anchor="middle" font-size="10" fill="#5c0d24">指向实际GPU内存的指针</text>

  <!-- Total size label -->
  <line x1="30" y1="148" x2="754" y2="148" stroke="#4c6ef5" stroke-width="1.5"/>
  <line x1="30" y1="144" x2="30" y2="152" stroke="#4c6ef5" stroke-width="1.5"/>
  <line x1="754" y1="144" x2="754" y2="152" stroke="#4c6ef5" stroke-width="1.5"/>
  <text x="392" y="163" text-anchor="middle" font-size="11" fill="#3b5bdb">FGPUMemoryBlockProxy 总大小 = 32 字节 (cacheline友好)</text>

  <!-- Reason for separation -->
  <rect x="770" y="88" width="165" height="50" rx="4" fill="#fff3bf" stroke="#f59f00" stroke-width="1.5"/>
  <text x="852" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c4d00">设计原因:</text>
  <text x="852" y="120" text-anchor="middle" font-size="9" fill="#333">GPU内存不可被CPU</text>
  <text x="852" y="133" text-anchor="middle" font-size="9" fill="#333">直接读写(某些平台)</text>

  <!-- FFreeBlock in GPU context -->
  <text x="20" y="195" font-size="13" font-weight="bold" fill="#c92a2a">FFreeBlock::AllocateRegularBlock() — GPU 分配器特殊实现</text>
  <rect x="20" y="202" width="920" height="100" rx="6" fill="#fff0f6" stroke="#f76707" stroke-width="1.5"/>

  <text x="30" y="220" font-size="11" font-weight="bold" fill="#c92a2a">普通 Binned3/Arena 的 AllocateRegularBlock():</text>
  <text x="30" y="237" font-size="11" fill="#555" font-family="monospace">return (uint8*)this + NumFreeBlocks * (BlockSizeShifted &lt;&lt; MinAlignShift)</text>
  <text x="30" y="254" font-size="11" fill="#555">    // 返回 this 指针后面紧跟的内存块</text>

  <line x1="480" y1="235" x2="480" y2="255" stroke="#555" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="490" y="250" font-size="10" fill="#c92a2a">GPU版本不同!</text>

  <text x="30" y="272" font-size="11" font-weight="bold" fill="#2f9e44">BinnedGPU 的 AllocateRegularBlock():</text>
  <text x="30" y="289" font-size="11" fill="#333" font-family="monospace">return (uint8*)(((FGPUMemoryBlockProxy*)this)-&gt;GPUMemory)</text>
  <text x="30" y="302" font-size="11" fill="#555" font-family="monospace">     + NumFreeBlocks * (BlockSizeShifted &lt;&lt; MinAlignShift)</text>

  <!-- Layout comparison diagram -->
  <text x="20" y="330" font-size="13" font-weight="bold" fill="#7c4d00">两种布局对比</text>

  <!-- Binned3 layout -->
  <rect x="20" y="338" width="440" height="130" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1.5"/>
  <text x="240" y="356" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f9e44">Binned3/Arena: OS页内连续布局</text>

  <rect x="30" y="364" width="100" height="30" rx="3" fill="#ffa94d" stroke="#f76707" stroke-width="1.5"/>
  <text x="80" y="383" text-anchor="middle" font-size="9" fill="#6e2c00">FFreeBlock 头</text>

  <rect x="134" y="364" width="60" height="30" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="164" y="383" text-anchor="middle" font-size="9" fill="#2b5c00">Block N-1</text>

  <rect x="198" y="364" width="60" height="30" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="228" y="383" text-anchor="middle" font-size="9" fill="#2b5c00">Block N-2</text>

  <text x="270" y="382" font-size="14" fill="#adb5bd">...</text>

  <rect x="290" y="364" width="60" height="30" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="320" y="383" text-anchor="middle" font-size="9" fill="#2b5c00">Block 0</text>

  <text x="30" y="418" font-size="10" fill="#333">所有数据在同一OS内存页面中</text>
  <text x="30" y="433" font-size="10" fill="#333">CPU可以直接 this + offset 访问块</text>
  <text x="30" y="450" font-size="10" fill="#555">→ 适合 CPU内存</text>

  <!-- BinnedGPU layout -->
  <rect x="480" y="338" width="460" height="130" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1.5"/>
  <text x="710" y="356" text-anchor="middle" font-size="11" font-weight="bold" fill="#1971c2">BinnedGPU: 元数据在CPU内存, 数据在GPU内存</text>

  <!-- CPU side -->
  <rect x="490" y="364" width="160" height="30" rx="3" fill="#ffa94d" stroke="#f76707" stroke-width="1.5"/>
  <text x="570" y="383" text-anchor="middle" font-size="9" fill="#6e2c00">FGPUMemoryBlockProxy (CPU侧)</text>

  <!-- Arrow to GPU -->
  <line x1="650" y1="379" x2="680" y2="379" stroke="#1971c2" stroke-width="2" marker-end="url(#arr)"/>
  <text x="655" y="374" font-size="9" fill="#1971c2">GPUMemory</text>
  <text x="655" y="387" font-size="9" fill="#1971c2">指针</text>

  <!-- GPU memory -->
  <rect x="680" y="364" width="60" height="30" rx="3" fill="#f783ac" stroke="#c2255c" stroke-width="1.5"/>
  <text x="710" y="383" text-anchor="middle" font-size="9" fill="#5c0d24">GPU Blk N-1</text>

  <rect x="744" y="364" width="60" height="30" rx="3" fill="#f783ac" stroke="#c2255c" stroke-width="1.5"/>
  <text x="774" y="383" text-anchor="middle" font-size="9" fill="#5c0d24">GPU Blk N-2</text>

  <text x="810" y="382" font-size="12" fill="#adb5bd">...</text>

  <text x="490" y="418" font-size="10" fill="#333">元数据(FFreeBlock字段)在普通CPU内存，GPU可写</text>
  <text x="490" y="433" font-size="10" fill="#333">实际返回给用户的是GPU内存地址</text>
  <text x="490" y="450" font-size="10" fill="#555">→ 适合GPU显存/UMA内存分配</text>
</svg>
