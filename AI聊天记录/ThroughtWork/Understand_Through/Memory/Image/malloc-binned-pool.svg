<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#f8f9fa"/>
  <text x="490" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">MallocBinned — 分配流程与 Pool 表结构</text>

  <!-- Decision flow -->
  <!-- Step 1 -->
  <rect x="380" y="45" width="220" height="40" rx="6" fill="#3b5bdb" stroke="#364fc7"/>
  <text x="490" y="70" text-anchor="middle" font-size="13" fill="white" font-weight="bold">请求 Malloc(Size, Align)</text>

  <line x1="490" y1="85" x2="490" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision 1 -->
  <polygon points="490,105 610,135 490,165 370,135" fill="#fff9db" stroke="#f59f00" stroke-width="2"/>
  <text x="490" y="131" text-anchor="middle" font-size="11" fill="#7c4d00">Size &lt; BinnedSizeLimit</text>
  <text x="490" y="148" text-anchor="middle" font-size="11" fill="#7c4d00">&amp;&amp; Align==DEFAULT?</text>

  <!-- Yes branch -->
  <line x1="370" y1="135" x2="220" y2="135" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="128" text-anchor="middle" font-size="11" fill="#2f9e44">是 (小块)</text>

  <!-- No branch -->
  <line x1="490" y1="165" x2="490" y2="195" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="183" font-size="11" fill="#c92a2a">否</text>

  <!-- Small pool path -->
  <rect x="70" y="110" width="150" height="50" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1.5"/>
  <text x="145" y="130" text-anchor="middle" font-size="11" fill="#2b5c00">查 MemSizeToPoolTable[Size]</text>
  <text x="145" y="145" text-anchor="middle" font-size="11" fill="#2b5c00">找到对应 PoolTable</text>

  <line x1="145" y1="160" x2="145" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="145,180 245,205 145,230 45,205" fill="#fff9db" stroke="#f59f00" stroke-width="2"/>
  <text x="145" y="201" text-anchor="middle" font-size="11" fill="#7c4d00">Table.FirstPool</text>
  <text x="145" y="215" text-anchor="middle" font-size="11" fill="#7c4d00">有空池?</text>

  <line x1="245" y1="205" x2="310" y2="205" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="272" y="198" text-anchor="middle" font-size="10" fill="#c92a2a">否</text>

  <rect x="310" y="182" width="130" height="46" rx="4" fill="#ffa94d" stroke="#f76707" stroke-width="1.5"/>
  <text x="375" y="202" text-anchor="middle" font-size="11" fill="#6e2c00">AllocatePoolMemory()</text>
  <text x="375" y="218" text-anchor="middle" font-size="11" fill="#6e2c00">新建OS页Pool</text>

  <line x1="45" y1="205" x2="20" y2="205" stroke="#2f9e44" stroke-width="1.5"/>
  <line x1="20" y1="205" x2="20" y2="265" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="28" y="195" font-size="10" fill="#2f9e44">是</text>

  <line x1="375" y1="228" x2="375" y2="265" stroke="#555" stroke-width="1.5"/>
  <line x1="20" y1="265" x2="375" y2="265" stroke="#555" stroke-width="1.5"/>
  <line x1="145" y1="265" x2="145" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="70" y="285" width="150" height="46" rx="6" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="145" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b5c00">AllocateBlockFromPool()</text>
  <text x="145" y="320" text-anchor="middle" font-size="11" fill="#2b5c00">从Pool头部取出块</text>

  <!-- Large alloc path (middle) -->
  <!-- Decision 2: PagePool? -->
  <polygon points="490,195 650,225 490,255 330,225" fill="#fff9db" stroke="#f59f00" stroke-width="2"/>
  <text x="490" y="218" text-anchor="middle" font-size="11" fill="#7c4d00">BinnedSizeLimit &lt;= Size</text>
  <text x="490" y="232" text-anchor="middle" font-size="11" fill="#7c4d00">&lt;= PagePoolTable[x]?</text>

  <line x1="330" y1="225" x2="260" y2="225" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="290" y="218" font-size="10" fill="#2f9e44">是(中块)</text>

  <rect x="130" y="205" width="130" height="40" rx="4" fill="#4dabf7" stroke="#1971c2" stroke-width="1.5"/>
  <text x="195" y="222" text-anchor="middle" font-size="11" fill="white" font-weight="bold">PagePoolTable</text>
  <text x="195" y="237" text-anchor="middle" font-size="11" fill="white">3x或6x PageSize池</text>

  <line x1="490" y1="255" x2="490" y2="285" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="272" font-size="11" fill="#c92a2a">否(大块)</text>

  <rect x="380" y="285" width="220" height="50" rx="6" fill="#f783ac" stroke="#c2255c" stroke-width="1.5"/>
  <text x="490" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c0d24">OSAlloc(AlignedSize)</text>
  <text x="490" y="323" text-anchor="middle" font-size="11" fill="#5c0d24">直接向OS申请内存页</text>

  <!-- Pool table structure -->
  <!-- Header -->
  <rect x="630" y="45" width="330" height="30" rx="4" fill="#3b5bdb"/>
  <text x="795" y="65" text-anchor="middle" font-size="13" fill="white" font-weight="bold">PoolTable[41] — 41个分箱尺寸</text>

  <!-- MemSizeToPoolTable -->
  <text x="635" y="96" font-size="11" fill="#333" font-weight="bold">MemSizeToPoolTable[Size] 快速查找表 (最大32769项)</text>

  <!-- Pool table entry -->
  <rect x="630" y="100" width="100" height="180" rx="4" fill="#dbe4ff" stroke="#4c6ef5"/>
  <text x="680" y="118" text-anchor="middle" font-size="10" fill="#3b5bdb" font-weight="bold">PoolTable</text>
  <line x1="630" y1="125" x2="730" y2="125" stroke="#4c6ef5" stroke-width="1"/>
  <text x="680" y="140" text-anchor="middle" font-size="9" fill="#333">FirstPool →</text>
  <line x1="630" y1="148" x2="730" y2="148" stroke="#4c6ef5" stroke-width="1"/>
  <text x="680" y="163" text-anchor="middle" font-size="9" fill="#333">ExhaustedPool →</text>
  <line x1="630" y1="170" x2="730" y2="170" stroke="#4c6ef5" stroke-width="1"/>
  <text x="680" y="183" text-anchor="middle" font-size="9" fill="#333">BlockSize</text>
  <line x1="630" y1="190" x2="730" y2="190" stroke="#4c6ef5" stroke-width="1"/>
  <text x="680" y="205" text-anchor="middle" font-size="9" fill="#555">[STATS]</text>
  <text x="680" y="218" text-anchor="middle" font-size="9" fill="#555">NumActivePools</text>
  <text x="680" y="231" text-anchor="middle" font-size="9" fill="#555">TotalRequests</text>
  <text x="680" y="244" text-anchor="middle" font-size="9" fill="#555">TotalWaste...</text>
  <line x1="630" y1="250" x2="730" y2="250" stroke="#4c6ef5" stroke-width="1"/>
  <text x="680" y="270" text-anchor="middle" font-size="9" fill="#555">CriticalSection</text>
  <text x="680" y="283" text-anchor="middle" font-size="8" fill="#888">(USE_FINE_GRAIN_LOCKS)</text>

  <!-- PoolInfo -->
  <rect x="760" y="100" width="100" height="180" rx="4" fill="#d3f9d8" stroke="#40c057"/>
  <text x="810" y="118" text-anchor="middle" font-size="10" fill="#2f9e44" font-weight="bold">FPoolInfo</text>
  <line x1="760" y1="125" x2="860" y2="125" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="140" text-anchor="middle" font-size="9" fill="#333">Taken (uint16)</text>
  <line x1="760" y1="148" x2="860" y2="148" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="163" text-anchor="middle" font-size="9" fill="#333">TableIndex (uint16)</text>
  <line x1="760" y1="170" x2="860" y2="170" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="183" text-anchor="middle" font-size="9" fill="#333">AllocSize (uint32)</text>
  <line x1="760" y1="190" x2="860" y2="190" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="205" text-anchor="middle" font-size="9" fill="#333">FirstMem* →FFreeMem</text>
  <line x1="760" y1="213" x2="860" y2="213" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="228" text-anchor="middle" font-size="9" fill="#333">Next* →FPoolInfo</text>
  <line x1="760" y1="236" x2="860" y2="236" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="251" text-anchor="middle" font-size="9" fill="#333">PrevLink** →FPoolInfo*</text>
  <line x1="760" y1="259" x2="860" y2="259" stroke="#40c057" stroke-width="1"/>
  <text x="810" y="273" text-anchor="middle" font-size="9" fill="#888">total: 32 bytes</text>
  <text x="810" y="284" text-anchor="middle" font-size="9" fill="#888">(含Padding)</text>

  <!-- FFreeMem -->
  <rect x="875" y="100" width="90" height="100" rx="4" fill="#ffd8e4" stroke="#c2255c"/>
  <text x="920" y="118" text-anchor="middle" font-size="10" fill="#862e4a" font-weight="bold">FFreeMem</text>
  <text x="920" y="133" text-anchor="middle" font-size="8" fill="#555">(alignas(16))</text>
  <line x1="875" y1="138" x2="965" y2="138" stroke="#c2255c" stroke-width="1"/>
  <text x="920" y="153" text-anchor="middle" font-size="9" fill="#333">Next* →FFreeMem</text>
  <line x1="875" y1="160" x2="965" y2="160" stroke="#c2255c" stroke-width="1"/>
  <text x="920" y="175" text-anchor="middle" font-size="9" fill="#333">NumFreeBlocks</text>
  <text x="920" y="188" text-anchor="middle" font-size="9" fill="#333">(uint32)</text>

  <!-- Connection arrows -->
  <line x1="730" y1="133" x2="758" y2="133" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="860" y1="202" x2="873" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OS page layout -->
  <rect x="630" y="310" width="330" height="180" rx="6" fill="#fff9db" stroke="#f59f00" stroke-width="1.5"/>
  <text x="795" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c4d00">一个 OS 页内的数据布局 (BINNED_ALLOC_POOL_SIZE = 64KB)</text>
  <!-- page cells -->
  <!-- FFreeMem header at start -->
  <rect x="638" y="338" width="90" height="36" rx="3" fill="#ffd8e4" stroke="#c2255c" stroke-width="1.5"/>
  <text x="683" y="354" text-anchor="middle" font-size="9" fill="#862e4a" font-weight="bold">FFreeMem</text>
  <text x="683" y="367" text-anchor="middle" font-size="9" fill="#862e4a">NumFree=N</text>

  <!-- Block 1 -->
  <rect x="732" y="338" width="60" height="36" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="762" y="355" text-anchor="middle" font-size="9" fill="#2b5c00">Block</text>
  <text x="762" y="368" text-anchor="middle" font-size="9" fill="#2b5c00">[N-1]</text>

  <!-- Block 2 -->
  <rect x="796" y="338" width="60" height="36" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="826" y="355" text-anchor="middle" font-size="9" fill="#2b5c00">Block</text>
  <text x="826" y="368" text-anchor="middle" font-size="9" fill="#2b5c00">[N-2]</text>

  <!-- Dots -->
  <text x="870" y="360" font-size="16" fill="#555">...</text>

  <!-- Block N -->
  <rect x="895" y="338" width="60" height="36" rx="3" fill="#a9e34b" stroke="#74b816" stroke-width="1.5"/>
  <text x="925" y="355" text-anchor="middle" font-size="9" fill="#2b5c00">Block</text>
  <text x="925" y="368" text-anchor="middle" font-size="9" fill="#2b5c00">[0]</text>

  <!-- Allocation direction -->
  <line x1="955" y1="356" x2="733" y2="356" stroke="#c92a2a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="845" y="395" text-anchor="middle" font-size="11" fill="#c92a2a">← 分配方向 (从高地址往低地址)</text>
  <text x="795" y="415" text-anchor="middle" font-size="11" fill="#555">Free = (uint8*)Pool.FirstMem + --NumFreeBlocks * BlockSize</text>

  <!-- Pool sizes list -->
  <text x="638" y="440" font-size="11" fill="#333" font-weight="bold">41 个分箱尺寸 (部分):</text>
  <text x="638" y="458" font-size="10" fill="#555" font-family="monospace">8,16,32,48,64,96,128,192,256,384,512,768,1024...</text>
  <text x="638" y="474" font-size="10" fill="#555" font-family="monospace">...8192,12288,16384,24576,32768+1(→OSTable)</text>

  <!-- Hash table -->
  <rect x="630" y="490" width="330" height="55" rx="4" fill="#e7f5ff" stroke="#339af0" stroke-width="1.5"/>
  <text x="795" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#1971c2">HashBuckets 哈希表 — 指针→PoolInfo 映射</text>
  <text x="795" y="528" text-anchor="middle" font-size="10" fill="#333">Key = Ptr >> HashKeyShift | Hash = Key &amp; (MaxHashBuckets-1)</text>
  <text x="795" y="543" text-anchor="middle" font-size="10" fill="#333">PoolIndex = (Ptr >> PoolBitShift) &amp; PoolMask</text>

  <!-- Return node -->
  <rect x="70" y="350" width="150" height="40" rx="6" fill="#3b5bdb" stroke="#364fc7"/>
  <text x="145" y="375" text-anchor="middle" font-size="13" fill="white" font-weight="bold">返回对齐后指针</text>
</svg>
