<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8f9fa"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">MallocBinnedArena — FArenaParams 配置与大块/小块分配</text>

  <!-- FArenaParams -->
  <text x="20" y="55" font-size="13" font-weight="bold" fill="#1971c2">FArenaParams — 参数化控制Arena行为</text>
  <rect x="20" y="62" width="920" height="230" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>

  <!-- Column 1: Address & alignment -->
  <rect x="30" y="72" width="220" height="215" rx="4" fill="#dbe4ff" stroke="#4c6ef5"/>
  <text x="140" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b5bdb">地址空间参数</text>
  <line x1="30" y1="94" x2="250" y2="94" stroke="#4c6ef5" stroke-width="1"/>
  <text x="35" y="110" font-size="9" fill="#333">AddressLimit         // 最大VA空间 (64-bit=2^64)</text>
  <text x="35" y="126" font-size="9" fill="#333">BasePageSize         // 平台最小页大小(4096)</text>
  <text x="35" y="142" font-size="9" fill="#333">AllocationGranularity // 实际分配粒度(65536)</text>
  <text x="35" y="158" font-size="9" fill="#333">MinimumAlignmentShift // 最小对齐位移(4→16字节)</text>
  <text x="35" y="174" font-size="9" fill="#333">bUseSeparateVMPerPool // 每个池独立VM</text>
  <text x="35" y="190" font-size="9" fill="#333">bAttemptToAlignSmallBlocks // 尝试对齐小块</text>
  <text x="35" y="206" font-size="9" fill="#333">ReserveVM(Size) lambda // 预留VA的回调</text>
  <text x="35" y="222" font-size="9" fill="#333">bPerThreadCaches     // 启用TLS缓存</text>
  <text x="35" y="238" font-size="9" fill="#333">bUseStandardSmallPoolSizes // 标准小池尺寸</text>
  <text x="35" y="254" font-size="9" fill="#333">AdditionalBlockSizes[]   // 附加自定义池尺寸</text>
  <text x="35" y="270" font-size="9" fill="#333">PoolCount               // 实际使用的池数量</text>

  <!-- Column 2: Bundle & cache params -->
  <rect x="260" y="72" width="220" height="215" rx="4" fill="#d3f9d8" stroke="#40c057"/>
  <text x="370" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#2f9e44">Bundle 与缓存参数</text>
  <line x1="260" y1="94" x2="480" y2="94" stroke="#40c057" stroke-width="1"/>
  <text x="265" y="110" font-size="9" fill="#333">MaxSizePerBundle     // Bundle最大字节数</text>
  <text x="265" y="126" font-size="9" fill="#333">MaxStandardPoolSize  // 小块最大尺寸(128KB)</text>
  <text x="265" y="142" font-size="9" fill="#333">MaxBlocksPerBundle   // 每个Bundle最多块数(64)</text>
  <text x="265" y="158" font-size="9" fill="#333">MaxMemoryPerBlockSizeShift // 每池最大总内存</text>
  <text x="265" y="174" font-size="9" fill="#333">EmptyCacheAllocExtra // 预填TLS块数(32)</text>
  <text x="265" y="190" font-size="9" fill="#333">MaxGlobalBundles     // 全局回收器最大束数(32)</text>

  <!-- Column 3: Alloc lambdas -->
  <rect x="490" y="72" width="220" height="215" rx="4" fill="#ffe8cc" stroke="#f76707"/>
  <text x="600" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#6e2c00">大块分配 Lambda</text>
  <line x1="490" y1="94" x2="710" y2="94" stroke="#f76707" stroke-width="1"/>
  <text x="495" y="110" font-size="9" fill="#333">LargeBlockAlloc(Size, Alignment,</text>
  <text x="495" y="124" font-size="9" fill="#333">  CommitSize,</text>
  <text x="495" y="138" font-size="9" fill="#333">  VMSizeDivVirtualSizeAlignment)</text>
  <text x="495" y="154" font-size="9" fill="#555">→返回void*，并设置CommitSize</text>
  <text x="495" y="170" font-size="9" fill="#333">LargeBlockFree(void*)  // 释放大块</text>
  <text x="495" y="186" font-size="9" fill="#555">默认使用FVirtualMemory包装</text>
  <text x="495" y="202" font-size="9" fill="#555">可被子类替换实现GPU内存等</text>
  <text x="495" y="218" font-size="9" fill="#333">SmallBlockGetActualSize(void*) // 可选hook</text>

  <!-- Column 4: Alignment behavior -->
  <rect x="720" y="72" width="210" height="215" rx="4" fill="#ffe0f0" stroke="#c2255c"/>
  <text x="825" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#862e4a">对齐行为控制</text>
  <line x1="720" y1="94" x2="930" y2="94" stroke="#c2255c" stroke-width="1"/>
  <text x="725" y="110" font-size="9" fill="#333">AdjustSmallBlockSizeForAlignment(</text>
  <text x="725" y="124" font-size="9" fill="#333">  Size, Alignment)</text>
  <text x="725" y="138" font-size="9" fill="#555">→将size向上取整到对齐要求</text>
  <text x="725" y="154" font-size="9" fill="#555">  的最小池尺寸</text>
  <text x="725" y="170" font-size="9" fill="#333">BoundSizeToPoolIndex(Size)</text>
  <text x="725" y="184" font-size="9" fill="#555">→二分查找 PoolSizes[] 数组</text>
  <text x="725" y="200" font-size="9" fill="#555">  找到不小于Size的最小池</text>
  <text x="725" y="216" font-size="9" fill="#333">SmallBlockSizes[] 继承自</text>
  <text x="725" y="230" font-size="9" fill="#333">TMallocBinnedCommon模板参数</text>
  <text x="725" y="246" font-size="9" fill="#555">最大池为MaxStandardPoolSize</text>

  <!-- Alloc flow -->
  <text x="20" y="312" font-size="13" font-weight="bold" fill="#7c4d00">分配路径</text>
  <rect x="20" y="320" width="920" height="185" rx="6" fill="#fff9db" stroke="#f59f00" stroke-width="1.5"/>

  <!-- Small path -->
  <rect x="30" y="335" width="130" height="155" rx="4" fill="#ffe8cc" stroke="#f76707" stroke-width="1.5"/>
  <text x="95" y="353" text-anchor="middle" font-size="10" font-weight="bold" fill="#6e2c00">① Size≤MaxStdPoolSize</text>
  <text x="95" y="370" text-anchor="middle" font-size="10" fill="#333">AdjustSmallBlockSize</text>
  <text x="95" y="385" text-anchor="middle" font-size="10" fill="#333">ForAlignment</text>
  <text x="95" y="400" text-anchor="middle" font-size="10" fill="#333">→ PoolIndex</text>
  <text x="95" y="418" text-anchor="middle" font-size="10" fill="#555">TLS FastPath</text>
  <text x="95" y="433" text-anchor="middle" font-size="9" fill="#555">→回收器</text>
  <text x="95" y="448" text-anchor="middle" font-size="9" fill="#555">→PoolTable(锁)</text>
  <text x="95" y="464" text-anchor="middle" font-size="9" fill="#555">→AllocRegularBlock</text>
  <text x="95" y="479" text-anchor="middle" font-size="9" fill="#2f9e44">同Binned3机制</text>

  <line x1="160" y1="413" x2="180" y2="413" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Large path -->
  <rect x="180" y="335" width="160" height="155" rx="4" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="1.5"/>
  <text x="260" y="353" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b5bdb">② Size&gt;MaxStdPoolSize</text>
  <text x="260" y="370" text-anchor="middle" font-size="10" fill="#333">ArenaParams.LargeBlockAlloc</text>
  <text x="260" y="385" text-anchor="middle" font-size="10" fill="#333">(Size, Alignment,</text>
  <text x="260" y="400" text-anchor="middle" font-size="10" fill="#333"> CommitSize, VMSizeDiv)</text>
  <text x="260" y="418" text-anchor="middle" font-size="10" fill="#555">获取OS内存块</text>
  <text x="260" y="433" text-anchor="middle" font-size="10" fill="#555">GetOrCreatePoolInfoLarge</text>
  <text x="260" y="448" text-anchor="middle" font-size="10" fill="#555">HashTable → FPoolInfoLarge</text>
  <text x="260" y="465" text-anchor="middle" font-size="10" fill="#555">Pool.SetOSAllocationSizes</text>
  <text x="260" y="481" text-anchor="middle" font-size="9" fill="#2f9e44">记录VMSize和CommitSize</text>

  <line x1="340" y1="413" x2="360" y2="413" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FPoolInfoLarge -->
  <rect x="360" y="335" width="200" height="155" rx="4" fill="#f8f0ff" stroke="#9c36b5" stroke-width="1.5"/>
  <text x="460" y="353" text-anchor="middle" font-size="10" font-weight="bold" fill="#862e9c">FPoolInfoLarge 结构</text>
  <text x="365" y="370" font-size="9" fill="#333">OSAllocationSize   // OS分配的总字节</text>
  <text x="365" y="384" font-size="9" fill="#333">CommitSize         // 已提交的物理内存</text>
  <text x="365" y="398" font-size="9" fill="#333">VMSizeDivVirtualSizeAlignment</text>
  <text x="365" y="412" font-size="9" fill="#555">Hash桶(同Binned1 hash方法)</text>
  <text x="365" y="428" font-size="9" fill="#333">Prev/Next 双向链表</text>
  <text x="365" y="444" font-size="9" fill="#555">释放: LargeBlockFree(ptr)</text>
  <text x="365" y="460" font-size="9" fill="#555">     + 从哈希表移除</text>
  <text x="365" y="476" font-size="9" fill="#555">     + 反算VMSize还原</text>

  <!-- Arena vs Binned3 comparison -->
  <rect x="575" y="335" width="355" height="155" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="1.5"/>
  <text x="752" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f9e44">BinnedArena vs Binned3 对比</text>
  <text x="580" y="372" font-size="9" fill="#333">特性                 BinnedArena     Binned3</text>
  <line x1="580" y1="378" x2="922" y2="378" stroke="#40c057" stroke-width="1"/>
  <text x="580" y="393" font-size="9" fill="#333">可配置性          ★★★★★(FArenaParams)  ★★★</text>
  <text x="580" y="409" font-size="9" fill="#333">大块分配           Lambda可替换     固定AllocVirtual</text>
  <text x="580" y="425" font-size="9" fill="#333">GPU内存支持        ✓ (BinnedGPU子类)  ✗</text>
  <text x="580" y="441" font-size="9" fill="#333">小池尺寸          动态/自定义       静态128KB上限</text>
  <text x="580" y="457" font-size="9" fill="#333">哈希查大块         ✓ HashBuckets      ✓ HashBuckets</text>
  <text x="580" y="473" font-size="9" fill="#333">VM-per-pool        可选(bSeparate)  Windows默认开</text>
  <text x="580" y="489" font-size="9" fill="#555">Arena是Binned3的参数化超集，共享TMallocBinnedCommon模板</text>
</svg>
