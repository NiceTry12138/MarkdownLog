<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cba6f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="480" y="32" fill="#cdd6f4" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">FGraphPanelPinFactory — 自定义引脚外观系统</text>
  <text x="480" y="52" fill="#6c7086" font-family="monospace" font-size="12" text-anchor="middle">Source/Editor/UnrealEd/Public/EdGraphUtilities.h  +  Private/NodeFactory.cpp</text>

  <!-- ===== TOP ROW: Three factory types ===== -->
  <text x="20" y="78" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">① 三种工厂类型（均在 EdGraphUtilities.h 定义）</text>

  <!-- FGraphPanelNodeFactory -->
  <rect x="20" y="88" width="280" height="100" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="160" y="110" fill="#a6e3a1" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">FGraphPanelNodeFactory</text>
  <text x="160" y="128" fill="#6c7086" font-family="monospace" font-size="10" text-anchor="middle">: TSharedFromThis&lt;...&gt;</text>
  <text x="32" y="148" fill="#f9e2af" font-family="monospace" font-size="10">virtual TSharedPtr&lt;SGraphNode&gt;</text>
  <text x="32" y="164" fill="#f9e2af" font-family="monospace" font-size="10">    CreateNode(UEdGraphNode* Node)</text>
  <text x="32" y="180" fill="#6c7086" font-family="monospace" font-size="9">  自定义节点的 Widget 外观</text>

  <!-- FGraphPanelPinFactory (CENTER - highlighted) -->
  <rect x="338" y="88" width="290" height="100" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="2.5"/>
  <rect x="338" y="88" width="290" height="24" rx="6" fill="#89b4fa" fill-opacity="0.15"/>
  <text x="483" y="110" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">FGraphPanelPinFactory  ← 重点</text>
  <text x="483" y="128" fill="#6c7086" font-family="monospace" font-size="10" text-anchor="middle">: TSharedFromThis&lt;...&gt;</text>
  <text x="350" y="148" fill="#f9e2af" font-family="monospace" font-size="10">virtual TSharedPtr&lt;SGraphPin&gt;</text>
  <text x="350" y="164" fill="#f9e2af" font-family="monospace" font-size="10">    CreatePin(UEdGraphPin* Pin)</text>
  <text x="350" y="180" fill="#6c7086" font-family="monospace" font-size="9">  返回 NULL = 使用默认，返回值 = 自定义</text>

  <!-- FGraphPanelPinConnectionFactory -->
  <rect x="664" y="88" width="280" height="100" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="804" y="110" fill="#cba6f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">FGraphPanelPinConnectionFactory</text>
  <text x="804" y="128" fill="#6c7086" font-family="monospace" font-size="10" text-anchor="middle">: TSharedFromThis&lt;...&gt;</text>
  <text x="676" y="148" fill="#f9e2af" font-family="monospace" font-size="10">virtual FConnectionDrawingPolicy*</text>
  <text x="676" y="164" fill="#f9e2af" font-family="monospace" font-size="10">    CreateConnectionPolicy(...)</text>
  <text x="676" y="180" fill="#6c7086" font-family="monospace" font-size="9">  自定义连线的绘制样式</text>

  <!-- Divider -->
  <line x1="20" y1="208" x2="940" y2="208" stroke="#313244" stroke-width="1"/>

  <!-- ===== MIDDLE: Registration & Lookup Flow ===== -->
  <text x="20" y="228" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">② 注册流程（模块启动时）</text>

  <!-- Module StartupModule -->
  <rect x="20" y="238" width="220" height="52" rx="5" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="130" y="258" fill="#a6e3a1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">YourModule::StartupModule()</text>
  <text x="130" y="276" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">创建 TSharedPtr&lt;FMyPinFactory&gt;</text>

  <line x1="240" y1="264" x2="278" y2="264" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RegisterVisualPinFactory -->
  <rect x="280" y="238" width="260" height="52" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="410" y="258" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">FEdGraphUtilities::</text>
  <text x="410" y="276" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">RegisterVisualPinFactory(Factory)</text>

  <line x1="540" y1="264" x2="578" y2="264" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- VisualPinFactories array -->
  <rect x="580" y="238" width="200" height="52" rx="5" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="680" y="258" fill="#f9e2af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">VisualPinFactories 数组</text>
  <text x="680" y="276" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">TArray&lt;TSharedPtr&lt;FGraphPanel</text>

  <!-- ShutdownModule unregister -->
  <rect x="20" y="308" width="220" height="36" rx="5" fill="#181825" stroke="#6c7086" stroke-width="1"/>
  <text x="130" y="322" fill="#6c7086" font-family="monospace" font-size="10" text-anchor="middle">ShutdownModule() 时</text>
  <text x="130" y="336" fill="#6c7086" font-family="monospace" font-size="10" text-anchor="middle">UnregisterVisualPinFactory(Factory)</text>

  <!-- Divider -->
  <line x1="20" y1="362" x2="940" y2="362" stroke="#313244" stroke-width="1"/>

  <!-- ===== BOTTOM: Lookup Call Chain ===== -->
  <text x="20" y="382" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">③ 查找调用链（SGraphPanel 构建节点时）</text>

  <!-- SGraphPanel -->
  <rect x="20" y="392" width="160" height="48" rx="5" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="100" y="412" fill="#cba6f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SGraphPanel</text>
  <text x="100" y="428" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">构建 SGraphNode 时</text>

  <line x1="180" y1="416" x2="210" y2="416" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FNodeFactory::CreatePinWidget -->
  <rect x="212" y="392" width="230" height="48" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="327" y="412" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">FNodeFactory::</text>
  <text x="327" y="428" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">CreatePinWidget(UEdGraphPin*)</text>

  <line x1="442" y1="416" x2="472" y2="416" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Iteration -->
  <rect x="474" y="392" width="230" height="48" rx="5" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="589" y="412" fill="#f9e2af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">遍历 VisualPinFactories</text>
  <text x="589" y="428" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">for each Factory: Factory-&gt;CreatePin(Pin)</text>

  <line x1="704" y1="416" x2="734" y2="416" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="736" y="392" width="190" height="48" rx="5" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="831" y="412" fill="#a6e3a1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">第一个非 NULL 返回值</text>
  <text x="831" y="428" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">= 最终使用的 SGraphPin Widget</text>

  <!-- Code Example -->
  <text x="20" y="462" fill="#f9e2af" font-family="monospace" font-size="12" font-weight="bold">④ 实现示例</text>
  <rect x="20" y="472" width="920" height="114" rx="4" fill="#11111b" stroke="#45475a" stroke-width="1"/>
  <text x="32" y="492" fill="#6c7086" font-family="monospace" font-size="10">// 1. 定义工厂</text>
  <text x="32" y="508" fill="#a6e3a1" font-family="monospace" font-size="11">class FMyPinFactory : public FGraphPanelPinFactory {</text>
  <text x="32" y="524" fill="#cdd6f4" font-family="monospace" font-size="11">    virtual TSharedPtr&lt;SGraphPin&gt; CreatePin(UEdGraphPin* Pin) const override {</text>
  <text x="32" y="540" fill="#cdd6f4" font-family="monospace" font-size="11">        if (Pin-&gt;PinType.PinCategory == MyCategory)  return SNew(SMyCustomPin, Pin);</text>
  <text x="32" y="556" fill="#cdd6f4" font-family="monospace" font-size="11">        return nullptr;  <tspan fill="#6c7086">// nullptr = 让下一个工厂或默认处理</tspan></text>
  <text x="32" y="572" fill="#cdd6f4" font-family="monospace" font-size="11">    }</text>
  <text x="32" y="588" fill="#a6adc8" font-family="monospace" font-size="11">};  <tspan fill="#6c7086">// 2. 在 StartupModule(): FEdGraphUtilities::RegisterVisualPinFactory(MakeShared&lt;FMyPinFactory&gt;());</tspan></text>
</svg>
