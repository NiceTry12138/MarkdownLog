<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cba6f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="720" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="490" y="32" fill="#cdd6f4" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">UEdGraphSchema — 图规则引擎</text>
  <text x="490" y="52" fill="#6c7086" font-family="monospace" font-size="12" text-anchor="middle">Source/Runtime/Engine/Classes/EdGraph/EdGraphSchema.h</text>

  <!-- ===== TOP: Flow diagram: drag-connect pins ===== -->
  <text x="20" y="78" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">① 拖拽连线时的判断流程</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="20" y="88" width="140" height="48" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="90" y="108" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">用户拖拽</text>
  <text x="90" y="124" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">SGraphPanel 检测鼠标</text>

  <line x1="160" y1="112" x2="190" y2="112" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="192" y="88" width="190" height="48" rx="5" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="287" y="108" fill="#cba6f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">Schema-&gt;CanCreateConnection</text>
  <text x="287" y="124" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">(PinA, PinB) → FPinConnectionResponse</text>

  <line x1="382" y1="112" x2="412" y2="112" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="490,88 556,112 490,136 424,112" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="490" y="108" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Response</text>
  <text x="490" y="122" fill="#f9e2af" font-family="monospace" font-size="10" text-anchor="middle">判断</text>

  <!-- DISALLOW branch (down) -->
  <line x1="490" y1="136" x2="490" y2="160" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="420" y="162" width="140" height="40" rx="5" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="490" y="178" fill="#f38ba8" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">DISALLOW</text>
  <text x="490" y="193" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">显示错误提示气泡</text>

  <!-- MAKE branch (right) -->
  <line x1="556" y1="112" x2="590" y2="112" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="592" y="88" width="170" height="48" rx="5" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="677" y="108" fill="#a6e3a1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">MAKE</text>
  <text x="677" y="124" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">Schema-&gt;TryCreateConnection(A,B)</text>

  <!-- BREAK_OTHERS branch -->
  <rect x="592" y="152" width="170" height="48" rx="5" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="677" y="172" fill="#f9e2af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">BREAK_OTHERS_A/B/AB</text>
  <text x="677" y="188" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">先断旧连接，再建立新连接</text>
  <line x1="677" y1="136" x2="677" y2="152" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- CONVERSION branch -->
  <rect x="592" y="216" width="170" height="48" rx="5" fill="#313244" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="677" y="236" fill="#74c7ec" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">MAKE_WITH_CONVERSION</text>
  <text x="677" y="252" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">自动插入类型转换节点</text>
  <line x1="677" y1="200" x2="677" y2="216" stroke="#74c7ec" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TryCreateConnection results in NotifyGraphChanged -->
  <line x1="762" y1="112" x2="820" y2="112" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="822" y="88" width="140" height="48" rx="5" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="892" y="108" fill="#a6e3a1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">Graph-&gt;Notify</text>
  <text x="892" y="124" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">GraphChanged()  刷新 UI</text>

  <!-- Divider -->
  <line x1="20" y1="290" x2="960" y2="290" stroke="#313244" stroke-width="1"/>

  <!-- ===== BOTTOM LEFT: GetGraphContextActions flow ===== -->
  <text x="20" y="312" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">② 右键菜单构建流程 (GetGraphContextActions)</text>

  <rect x="20" y="322" width="150" height="48" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="95" y="342" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">用户右键</text>
  <text x="95" y="358" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">空白区域或从引脚拖出</text>

  <line x1="170" y1="346" x2="200" y2="346" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="202" y="322" width="200" height="48" rx="5" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="302" y="342" fill="#cba6f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">Schema-&gt;GetGraphContext</text>
  <text x="302" y="358" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">Actions(FGraphContextMenuBuilder)</text>

  <line x1="402" y1="346" x2="432" y2="346" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="434" y="322" width="200" height="48" rx="5" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="534" y="342" fill="#f9e2af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">Builder.AddAction()</text>
  <text x="534" y="358" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">填充 FEdGraphSchemaAction 列表</text>

  <line x1="634" y1="346" x2="664" y2="346" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="666" y="322" width="180" height="48" rx="5" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="756" y="342" fill="#a6e3a1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">显示菜单</text>
  <text x="756" y="358" fill="#a6adc8" font-family="monospace" font-size="9" text-anchor="middle">用户选中后调用 PerformAction()</text>

  <!-- Divider -->
  <line x1="20" y1="390" x2="960" y2="390" stroke="#313244" stroke-width="1"/>

  <!-- ===== BOTTOM: Key Virtual Methods ===== -->
  <text x="20" y="412" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">③ UEdGraphSchema 核心虚函数一览</text>

  <!-- Left column: Connection -->
  <rect x="20" y="422" width="290" height="270" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="165" y="442" fill="#cba6f7" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">连接判断</text>

  <text x="32" y="462" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">CanCreateConnection(A, B)</text>
  <text x="32" y="477" fill="#a6adc8" font-family="monospace" font-size="9">  → FPinConnectionResponse</text>
  <text x="32" y="492" fill="#6c7086" font-family="monospace" font-size="9">  核心：决定是否允许两引脚连接</text>

  <text x="32" y="512" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">TryCreateConnection(A, B)</text>
  <text x="32" y="527" fill="#a6adc8" font-family="monospace" font-size="9">  → bool（实际建立连接，修改数据）</text>

  <text x="32" y="547" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">BreakPinLinks(Pin, bNotify)</text>
  <text x="32" y="562" fill="#a6adc8" font-family="monospace" font-size="9">  断开某引脚所有连接</text>

  <text x="32" y="582" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">BreakSinglePinLink(PinA, PinB)</text>
  <text x="32" y="597" fill="#a6adc8" font-family="monospace" font-size="9">  断开两引脚之间的连接</text>

  <text x="32" y="617" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">CreateAutomaticConversionNode</text>
  <text x="32" y="632" fill="#a6adc8" font-family="monospace" font-size="9">  自动插入转换节点</text>

  <text x="32" y="652" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">CanRelinkConnectionToPin()</text>
  <text x="32" y="667" fill="#a6adc8" font-family="monospace" font-size="9">  是否允许重新拖拽已有连线</text>

  <!-- Middle column: Context/Actions -->
  <rect x="326" y="422" width="290" height="270" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="471" y="442" fill="#a6e3a1" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">菜单 / 动作</text>

  <text x="338" y="462" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">GetGraphContextActions(Builder)</text>
  <text x="338" y="477" fill="#a6adc8" font-family="monospace" font-size="9">  填充右键弹出的 Action 列表</text>
  <text x="338" y="492" fill="#6c7086" font-family="monospace" font-size="9">  也是 "从引脚拖出" 的建议节点来源</text>

  <text x="338" y="512" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">GetContextMenuActions(Menu, Ctx)</text>
  <text x="338" y="527" fill="#a6adc8" font-family="monospace" font-size="9">  节点/引脚右键具体菜单项</text>

  <text x="338" y="547" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">GetNodeTitleColor(Node)</text>
  <text x="338" y="562" fill="#a6adc8" font-family="monospace" font-size="9">  → FLinearColor  节点标题栏颜色</text>

  <text x="338" y="582" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">GetPinTypeColor(PinType)</text>
  <text x="338" y="597" fill="#a6adc8" font-family="monospace" font-size="9">  → FLinearColor  引脚颜色</text>

  <text x="338" y="617" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">ShouldAlwaysPurgeOnModification()</text>
  <text x="338" y="632" fill="#a6adc8" font-family="monospace" font-size="9">  修改后是否总是清除图</text>

  <text x="338" y="652" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">GetGraphDisplayInformation()</text>
  <text x="338" y="667" fill="#a6adc8" font-family="monospace" font-size="9">  图标题 / tooltip / 文档链接</text>

  <!-- Right column: Pin defaults -->
  <rect x="632" y="422" width="320" height="270" rx="6" fill="#181825" stroke="#89dceb" stroke-width="1.5"/>
  <text x="792" y="442" fill="#89dceb" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">引脚默认值 / 验证</text>

  <text x="644" y="462" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">TrySetDefaultValue(Pin, Value)</text>
  <text x="644" y="477" fill="#a6adc8" font-family="monospace" font-size="9">  设置引脚文本默认值</text>

  <text x="644" y="497" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">TrySetDefaultObject(Pin, Object)</text>
  <text x="644" y="512" fill="#a6adc8" font-family="monospace" font-size="9">  设置引脚 Object 默认值</text>

  <text x="644" y="532" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">IsPinDefaultValid(Pin, NewValue)</text>
  <text x="644" y="547" fill="#a6adc8" font-family="monospace" font-size="9">  → FString(空=合法, 否则为错误原因)</text>

  <text x="644" y="567" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">ResetPinToAutogeneratedDefault(Pin)</text>
  <text x="644" y="582" fill="#a6adc8" font-family="monospace" font-size="9">  重置引脚为自动生成的默认值</text>

  <text x="644" y="602" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">ShouldHidePinDefaultValue(Pin)</text>
  <text x="644" y="617" fill="#a6adc8" font-family="monospace" font-size="9">  是否隐藏该引脚的默认值输入框</text>

  <text x="644" y="637" fill="#f9e2af" font-family="monospace" font-size="10" font-weight="bold">CreateDefaultValueWidget(Pin)</text>
  <text x="644" y="652" fill="#a6adc8" font-family="monospace" font-size="9">  创建引脚默认值的自定义控件</text>

  <text x="644" y="672" fill="#6c7086" font-family="monospace" font-size="9">  SubClass: K2Schema, MaterialGraphSchema...</text>
</svg>
