<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 980" font-family="'Segoe UI',sans-serif">
  <rect width="1100" height="980" fill="#1e1e2e" rx="12"/>
  <text x="550" y="36" fill="#cba6f7" font-size="18" font-weight="bold" text-anchor="middle">蓝图虚拟机执行全流程 — SetHP(NewHP=100) 完整步骤</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#89b4fa"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#a6e3a1"/>
    </marker>
    <marker id="ay" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f9e2af"/>
    </marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f38ba8"/>
    </marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#cba6f7"/>
    </marker>
  </defs>

  <!-- ── STEP 1: 调用触发 ── -->
  <rect x="30" y="56" width="220" height="76" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
  <text x="40" y="76" fill="#89b4fa" font-size="12" font-weight="bold">Step 1  调用触发</text>
  <text x="40" y="93" fill="#a6adc8" font-size="10.5">C++/BP 调用:</text>
  <text x="40" y="108" fill="#89dceb" font-size="10" font-family="Consolas,'Courier New'">Enemy->ProcessEvent(</text>
  <text x="40" y="122" fill="#89dceb" font-size="10" font-family="Consolas,'Courier New'">  SetHP_Func, &amp;Parms);</text>

  <!-- ── STEP 2: ProcessEvent ── -->
  <rect x="30" y="160" width="220" height="100" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
  <text x="40" y="180" fill="#89b4fa" font-size="12" font-weight="bold">Step 2  UObject::ProcessEvent</text>
  <text x="40" y="197" fill="#a6adc8" font-size="10.5">① 检查对象合法性</text>
  <text x="40" y="212" fill="#a6adc8" font-size="10.5">② 分配 Frame 本地内存</text>
  <text x="40" y="227" fill="#a6adc8" font-size="10.5">③ Memcpy Parms → Frame.Locals</text>
  <text x="40" y="242" fill="#a6adc8" font-size="10.5">④ 构建 FFrame 执行帧</text>

  <!-- ── STEP 3: FFrame init ── -->
  <rect x="30" y="288" width="220" height="112" rx="8" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
  <text x="40" y="308" fill="#cba6f7" font-size="12" font-weight="bold">Step 3  FFrame 初始化</text>
  <text x="40" y="324" fill="#a6adc8" font-size="10.5">Node    = UFunction SetHP</text>
  <text x="40" y="339" fill="#a6adc8" font-size="10.5">Object  = BP_Enemy instance</text>
  <text x="40" y="354" fill="#a6adc8" font-size="10.5">Code    = &amp;Script[0]  ← 字节码起点</text>
  <text x="40" y="369" fill="#a6adc8" font-size="10.5">Locals  = 本地变量内存块</text>
  <text x="40" y="384" fill="#a6adc8" font-size="10.5">FlowStack / OutParms</text>

  <!-- ── STEP 4: Function::Invoke ── -->
  <rect x="30" y="428" width="220" height="76" rx="8" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
  <text x="40" y="448" fill="#cba6f7" font-size="12" font-weight="bold">Step 4  Function::Invoke</text>
  <text x="40" y="465" fill="#a6adc8" font-size="10.5">Script[0] ≠ Native</text>
  <text x="40" y="480" fill="#a6adc8" font-size="10.5">→ 调用 ProcessInternal</text>
  <text x="40" y="495" fill="#a6adc8" font-size="10.5">进入字节码解释循环</text>

  <!-- ── STEP 5: ProcessInternal loop ── -->
  <rect x="30" y="532" width="220" height="68" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
  <text x="40" y="552" fill="#f9e2af" font-size="12" font-weight="bold">Step 5  ProcessInternal 循环</text>
  <text x="40" y="569" fill="#a6adc8" font-size="10.5">while (*Stack.Code != EX_Return)</text>
  <text x="40" y="584" fill="#a6adc8" font-size="10.5">    Stack.Step(Object, tmpResult)</text>

  <!-- ── STEP 6 ── -->
  <rect x="30" y="628" width="220" height="80" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
  <text x="40" y="648" fill="#f9e2af" font-size="12" font-weight="bold">Step 6  FFrame::Step</text>
  <text x="40" y="665" fill="#a6adc8" font-size="10.5">opcode = *Code++  读取1字节</text>
  <text x="40" y="680" fill="#a6adc8" font-size="10.5">GNatives[opcode](Context, Stack, Result)</text>
  <text x="40" y="695" fill="#a6adc8" font-size="10.5">分派到具体 exec 函数</text>

  <!-- Steps 1-6 vertical arrows -->
  <line x1="140" y1="132" x2="140" y2="160" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="140" y1="260" x2="140" y2="288" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="140" y1="400" x2="140" y2="428" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="140" y1="504" x2="140" y2="532" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="140" y1="600" x2="140" y2="628" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#ay)"/>

  <!-- Loop arrow for Step5/6 -->
  <path d="M 250,570 Q 295,570 295,660 Q 295,708 250,708" fill="none" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ay)"/>
  <text x="298" y="640" fill="#f9e2af" font-size="9">循环</text>

  <!-- ── right panel: per-opcode execution detail ── -->
  <line x1="292" y1="400" x2="320" y2="400" stroke="#585b70" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="325" y="56" fill="#cdd6f4" font-size="13" font-weight="bold">SetHP 节点字节码逐条执行</text>

  <!-- Timeline column -->
  <g transform="translate(325,70)">

    <!-- op1: EX_InstanceVariable bAlive -->
    <rect x="0" y="0" width="740" height="62" rx="6" fill="#181825" stroke="#89dceb" stroke-width="1.5"/>
    <text x="10" y="18" fill="#89dceb" font-size="11" font-weight="bold">① EX_InstanceVariable  → 读取 bAlive</text>
    <text x="10" y="34" fill="#a6adc8" font-size="10">execInstanceVariable: VarProp = Stack.ReadProperty()  → 返回 BP_Enemy::bAlive 的 FBoolProperty*</text>
    <text x="10" y="50" fill="#a6adc8" font-size="10">MostRecentPropertyAddress = VarProp→ContainerPtrToValuePtr(Stack.Object)   输出: &amp;bAlive 地址</text>

    <!-- op2: EX_JumpIfNot -->
    <rect x="0" y="72" width="740" height="62" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
    <text x="10" y="90" fill="#f9e2af" font-size="11" font-weight="bold">② EX_JumpIfNot  → Branch 判断</text>
    <text x="10" y="106" fill="#a6adc8" font-size="10">execJumpIfNot: Offset = Stack.ReadCodeSkipCount() [4字节] → 读取 false 分支目标偏移</text>
    <text x="10" y="122" fill="#a6adc8" font-size="10">Stack.Step(Object, &amp;Value) 求值 bAlive。若 bAlive==true → 继续; 若 false → Stack.Code = &amp;Script[Offset]</text>

    <!-- op3 true: EX_InstanceVariable HP -->
    <rect x="0" y="144" width="740" height="62" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="10" y="162" fill="#a6e3a1" font-size="11" font-weight="bold">③a EX_InstanceVariable  → 读取 HP (目标地址)  [仅 bAlive=true 分支]</text>
    <text x="10" y="178" fill="#a6adc8" font-size="10">execInstanceVariable: VarProp = HP 的 FIntProperty*</text>
    <text x="10" y="194" fill="#a6adc8" font-size="10">MostRecentPropertyAddress = &amp;Enemy→HP  ← 这是赋值目标</text>

    <!-- op4: EX_LocalVariable NewHP -->
    <rect x="0" y="216" width="740" height="62" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="10" y="234" fill="#a6e3a1" font-size="11" font-weight="bold">③b EX_LocalVariable  → 读取 NewHP (参数值)</text>
    <text x="10" y="250" fill="#a6adc8" font-size="10">execLocalVariable: VarProp = NewHP 的 FIntProperty*</text>
    <text x="10" y="266" fill="#a6adc8" font-size="10">MostRecentPropertyAddress = Stack.Locals + NewHP_Offset → 值为 100</text>

    <!-- op5: EX_Let HP=NewHP -->
    <rect x="0" y="288" width="740" height="62" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
    <text x="10" y="306" fill="#a6e3a1" font-size="11" font-weight="bold">④ EX_Let  → HP = NewHP  (赋值核心)</text>
    <text x="10" y="322" fill="#a6adc8" font-size="10">execLet: Step 求值目标表达式 → 得到 &amp;HP 地址;  Step 求值源表达式 → 读 NewHP=100 写入 &amp;HP</text>
    <text x="10" y="338" fill="#a6adc8" font-size="10">若 HP 有 Setter (BlueprintSetter) → 走 SetValue_InContainer 调用 Setter;  否则直接 Memcpy</text>

    <!-- false branch -->
    <rect x="0" y="360" width="740" height="62" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
    <text x="10" y="378" fill="#f38ba8" font-size="11" font-weight="bold">③c EX_FinalFunction(PrintString)  [仅 bAlive=false 分支]</text>
    <text x="10" y="394" fill="#a6adc8" font-size="10">execFinalFunction: FuncPtr = Stack.ReadObject() → PrintString UFunction*</text>
    <text x="10" y="410" fill="#a6adc8" font-size="10">CallFunction: 收集参数(EX_StringConst 等) → 递归 ProcessEvent(PrintString, Parms)</text>

    <!-- return -->
    <rect x="0" y="432" width="740" height="62" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
    <text x="10" y="450" fill="#cba6f7" font-size="11" font-weight="bold">⑤ EX_Return  → 函数返回</text>
    <text x="10" y="466" fill="#a6adc8" font-size="10">execReturn: 如有返回值 → Stack.Step(Object, &amp;ReturnValue);  退出 ProcessInternal 循环</text>
    <text x="10" y="482" fill="#a6adc8" font-size="10">ProcessEvent 尾部: 析构本地变量 / DestroyValue; 弹出 FFrame; ExitScriptContext</text>

    <!-- result -->
    <rect x="0" y="504" width="740" height="44" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
    <text x="10" y="522" fill="#a6e3a1" font-size="12" font-weight="bold">⑥ 执行完毕 — Enemy→HP 已被写入 100</text>
    <text x="10" y="540" fill="#a6adc8" font-size="10">调用者的 Parms 缓冲区通过 OutParms 机制同步回任何 by-ref 输出参数</text>

    <!-- vertical flow arrows -->
    <line x1="370" y1="62" x2="370" y2="72" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="370" y1="134" x2="370" y2="144" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="200" y1="206" x2="200" y2="216" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>
    <line x1="200" y1="278" x2="200" y2="288" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>
    <line x1="200" y1="350" x2="200" y2="432" stroke="#cba6f7" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ap)"/>
    <line x1="370" y1="422" x2="370" y2="432" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="370" y1="494" x2="370" y2="504" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- false branch label -->
    <text x="202" y="400" fill="#f38ba8" font-size="9">bAlive=false</text>
    <line x1="370" y1="206" x2="540" y2="360" stroke="#f38ba8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>
    <text x="480" y="280" fill="#f38ba8" font-size="9">false 跳转</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(30,900)">
    <text x="0" y="16" fill="#cdd6f4" font-size="12" font-weight="bold">GNatives 全局跳转表 (关键机制)</text>
    <text x="0" y="34" fill="#a6adc8" font-size="11">每个 IMPLEMENT_VM_FUNCTION(EX_xxx, execXxx) 宏在模块初始化时将 execXxx 函数指针写入 GNatives[EX_xxx]</text>
    <text x="0" y="52" fill="#a6adc8" font-size="11">FFrame::Step 读取 opcode → GNatives[opcode](&amp;Context, Stack, Result) — 本质是一个函数指针数组 O(1) 分派</text>
    <rect x="600" y="18" width="460" height="36" rx="5" fill="#11111b"/>
    <text x="610" y="34" fill="#89dceb" font-size="10" font-family="Consolas,'Courier New'">COREUOBJECT_API FNativeFuncPtr GNatives[EX_Max];   // EX_Max = 0xFF</text>
    <text x="610" y="50" fill="#89dceb" font-size="10" font-family="Consolas,'Courier New'">typedef void (*FNativeFuncPtr)(UObject*,FFrame&amp;,void*);</text>
  </g>
</svg>
