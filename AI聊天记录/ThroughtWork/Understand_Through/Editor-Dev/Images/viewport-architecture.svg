<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#89b4fa"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a6e3a1"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fab387"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#1e1e2e" rx="12"/>
  <text x="450" y="32" text-anchor="middle" fill="#cdd6f4" font-size="18" font-weight="bold" font-family="Arial">Viewport 渲染与交互架构</text>

  <!-- ====== Slate UI Layer ====== -->
  <rect x="30" y="50" width="840" height="75" rx="8" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="450" y="68" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold" font-family="Arial">UI 层（Slate Widget）</text>
  <!-- SSCSEditorViewport -->
  <rect x="60" y="76" width="360" height="40" rx="6" fill="#2a4a6f"/>
  <text x="240" y="92" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">SSCSEditorViewport : SEditorViewport</text>
  <text x="240" y="108" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">SSCSEditorViewport.cpp — Slate Widget 容器，含 ToolBar</text>
  <!-- SSCSEditorViewportToolBar -->
  <rect x="490" y="76" width="340" height="40" rx="6" fill="#2a4a6f"/>
  <text x="660" y="92" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">SSCSEditorViewportToolBar</text>
  <text x="660" y="108" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">Preview / Camera(透视/正交) / ViewMode(Lit/Wire)</text>

  <!-- Arrow down -->
  <line x1="240" y1="116" x2="240" y2="148" stroke="#89b4fa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ====== ViewportClient Layer ====== -->
  <rect x="30" y="148" width="840" height="95" rx="8" fill="#1a3d2e" stroke="#40a857" stroke-width="2"/>
  <text x="450" y="167" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold" font-family="Arial">渲染逻辑层（ViewportClient）</text>

  <rect x="60" y="173" width="390" height="60" rx="6" fill="#264d37"/>
  <text x="255" y="190" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">FSCSEditorViewportClient : FEditorViewportClient</text>
  <text x="255" y="206" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">SCSEditorViewportClient.cpp</text>
  <text x="255" y="220" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">Tick() → Draw(PDI) → DrawCanvas() → InputKey()</text>

  <rect x="480" y="173" width="360" height="60" rx="6" fill="#264d37"/>
  <text x="660" y="190" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">FEditorViewportClient (基类)</text>
  <text x="660" y="206" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">EditorViewportClient.cpp</text>
  <text x="660" y="220" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">相机控制 / Widget Gizmo / 投影矩阵</text>

  <!-- Arrow down -->
  <line x1="255" y1="233" x2="255" y2="263" stroke="#40a857" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="660" y1="233" x2="660" y2="263" stroke="#40a857" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ====== Scene Layer ====== -->
  <rect x="30" y="263" width="840" height="95" rx="8" fill="#3d2a1a" stroke="#fab387" stroke-width="2"/>
  <text x="450" y="282" text-anchor="middle" fill="#fab387" font-size="12" font-weight="bold" font-family="Arial">场景层（Preview Scene）</text>

  <rect x="60" y="288" width="300" height="60" rx="6" fill="#4d3a2a"/>
  <text x="210" y="306" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">FPreviewScene</text>
  <text x="210" y="322" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">PreviewScene.cpp</text>
  <text x="210" y="338" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">持有 UWorld + EditorFloor + SkyLight</text>

  <rect x="390" y="288" width="210" height="60" rx="6" fill="#4d3a2a"/>
  <text x="495" y="306" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">AActor 预览实例</text>
  <text x="495" y="322" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">SimpleConstructionScript</text>
  <text x="495" y="338" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">.GetComponentEditorActorInstance()</text>

  <rect x="625" y="288" width="215" height="60" rx="6" fill="#4d3a2a"/>
  <text x="732" y="306" text-anchor="middle" fill="#cdd6f4" font-size="11" font-weight="bold" font-family="Arial">FComponentVisualizer</text>
  <text x="732" y="322" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">GUnrealEd→FindComponentVisualizer()</text>
  <text x="732" y="338" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">DrawVisualization(Comp, View, PDI)</text>

  <!-- Arrow down from FPreviewScene -->
  <line x1="210" y1="348" x2="210" y2="378" stroke="#fab387" stroke-width="2" marker-end="url(#arrOrange)"/>

  <!-- ====== Render Layer ====== -->
  <rect x="30" y="378" width="840" height="75" rx="8" fill="#2a1a3d" stroke="#cba6f7" stroke-width="2"/>
  <text x="450" y="396" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold" font-family="Arial">渲染管线层（Rendering Pipeline）</text>

  <rect x="60" y="402" width="230" height="40" rx="6" fill="#3d2a5f"/>
  <text x="175" y="420" text-anchor="middle" fill="#cdd6f4" font-size="11" font-family="Arial">FSceneView</text>
  <text x="175" y="436" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">投影矩阵 / ViewUniformBuffer</text>

  <rect x="315" y="402" width="230" height="40" rx="6" fill="#3d2a5f"/>
  <text x="430" y="420" text-anchor="middle" fill="#cdd6f4" font-size="11" font-family="Arial">FPrimitiveDrawInterface (PDI)</text>
  <text x="430" y="436" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">DrawLine / DrawPoint / DrawMesh</text>

  <rect x="570" y="402" width="270" height="40" rx="6" fill="#3d2a5f"/>
  <text x="705" y="420" text-anchor="middle" fill="#cdd6f4" font-size="11" font-family="Arial">FCanvas → 2D HUD 覆盖</text>
  <text x="705" y="436" text-anchor="middle" fill="#a6adc8" font-size="10" font-family="Arial">DrawAngles() 旋转角度显示 (DrawCanvas)</text>

  <!-- ====== 数据流说明 ====== -->
  <rect x="30" y="468" width="840" height="82" rx="8" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="50" y="487" fill="#a6adc8" font-size="11" font-weight="bold" font-family="Arial">关键数据流</text>
  <text x="50" y="505" fill="#cdd6f4" font-size="10" font-family="Arial">1. 用户修改属性 (Details面板)  →  Blueprint 标记 dirty  →  FSCSEditorViewportClient::InvalidatePreview()  →  重建预览 Actor</text>
  <text x="50" y="521" fill="#cdd6f4" font-size="10" font-family="Arial">2. 每帧 Tick() → World::Tick() (仅编辑器模拟时) → Draw(PDI) → 逐个选中Component找Visualizer绘制辅助线</text>
  <text x="50" y="537" fill="#cdd6f4" font-size="10" font-family="Arial">3. 鼠标拖动 → InputWidgetDelta() → FWidget::UpdateDeltaRotation/Translation() → 修改Component Transform → bIsManipulating=true → DrawAngles()</text>
</svg>
