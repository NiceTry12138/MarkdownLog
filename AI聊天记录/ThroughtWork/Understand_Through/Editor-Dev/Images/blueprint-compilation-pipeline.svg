<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Segoe UI',sans-serif">
  <rect width="1000" height="560" fill="#1e1e2e" rx="12"/>
  <text x="500" y="34" fill="#cba6f7" font-size="17" font-weight="bold" text-anchor="middle">蓝图编译管线 — 节点图 → 字节码</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#89b4fa"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#a6e3a1"/>
    </marker>
  </defs>

  <!-- Phase boxes (horizontal pipeline) -->
  <!-- Phase 1 -->
  <rect x="20" y="56" width="140" height="420" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
  <text x="90" y="76" fill="#89b4fa" font-size="12" font-weight="bold" text-anchor="middle">Phase 1</text>
  <text x="90" y="90" fill="#89b4fa" font-size="11" text-anchor="middle">CompileClassLayout</text>
  <rect x="30" y="100" width="120" height="18" rx="3" fill="#313244"/>
  <text x="90" y="113" fill="#a6adc8" font-size="10" text-anchor="middle">CreateClassVariables</text>
  <rect x="30" y="122" width="120" height="18" rx="3" fill="#313244"/>
  <text x="90" y="135" fill="#a6adc8" font-size="10" text-anchor="middle">AddInterfaces</text>
  <rect x="30" y="144" width="120" height="18" rx="3" fill="#313244"/>
  <text x="90" y="157" fill="#a6adc8" font-size="10" text-anchor="middle">CreateFunctionList</text>
  <rect x="30" y="166" width="120" height="18" rx="3" fill="#313244"/>
  <text x="90" y="179" fill="#a6adc8" font-size="10" text-anchor="middle">PrecompileFunction</text>
  <rect x="30" y="188" width="120" height="18" rx="3" fill="#313244"/>
  <text x="90" y="201" fill="#a6adc8" font-size="10" text-anchor="middle">Bind &amp; StaticLink</text>
  <text x="90" y="230" fill="#585b70" font-size="10" text-anchor="middle">输出:</text>
  <text x="90" y="246" fill="#a6adc8" font-size="10" text-anchor="middle">UFunction 骨架</text>
  <text x="90" y="262" fill="#a6adc8" font-size="10" text-anchor="middle">FProperty 链表</text>
  <text x="90" y="278" fill="#a6adc8" font-size="10" text-anchor="middle">类内存布局确定</text>

  <!-- Arrow 1->2 -->
  <line x1="160" y1="266" x2="188" y2="266" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Phase 2 -->
  <rect x="188" y="56" width="160" height="420" rx="8" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
  <text x="268" y="76" fill="#cba6f7" font-size="12" font-weight="bold" text-anchor="middle">Phase 2</text>
  <text x="268" y="90" fill="#cba6f7" font-size="11" text-anchor="middle">CompileFunctions</text>
  <rect x="198" y="100" width="140" height="18" rx="3" fill="#313244"/>
  <text x="268" y="113" fill="#a6adc8" font-size="10" text-anchor="middle">CompileFunction(ctx)</text>
  <rect x="198" y="122" width="140" height="18" rx="3" fill="#313244"/>
  <text x="268" y="135" fill="#a6adc8" font-size="10" text-anchor="middle">  → 遍历节点有序列表</text>
  <rect x="198" y="144" width="140" height="18" rx="3" fill="#313244"/>
  <text x="268" y="157" fill="#a6adc8" font-size="10" text-anchor="middle">  → Node→GenerateCode</text>
  <rect x="198" y="166" width="140" height="18" rx="3" fill="#313244"/>
  <text x="268" y="179" fill="#a6adc8" font-size="10" text-anchor="middle">  → 产出 KCST_* 语句</text>
  <rect x="198" y="188" width="140" height="18" rx="3" fill="#313244"/>
  <text x="268" y="201" fill="#a6adc8" font-size="10" text-anchor="middle">PostcompileFunction</text>
  <text x="268" y="230" fill="#585b70" font-size="10" text-anchor="middle">KCST_* 中间表示示例:</text>
  <rect x="198" y="238" width="140" height="14" rx="2" fill="#11111b"/>
  <text x="268" y="249" fill="#f9e2af" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_GotoIfNot  → Branch</text>
  <rect x="198" y="256" width="140" height="14" rx="2" fill="#11111b"/>
  <text x="268" y="267" fill="#a6e3a1" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_Assignment HP=NewHP</text>
  <rect x="198" y="274" width="140" height="14" rx="2" fill="#11111b"/>
  <text x="268" y="285" fill="#f38ba8" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_CallFunction PrintStr</text>
  <rect x="198" y="292" width="140" height="14" rx="2" fill="#11111b"/>
  <text x="268" y="303" fill="#cba6f7" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_Return</text>

  <!-- Arrow 2->3 -->
  <line x1="348" y1="266" x2="376" y2="266" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Phase 3: VM Backend -->
  <rect x="376" y="56" width="180" height="420" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
  <text x="466" y="76" fill="#a6e3a1" font-size="12" font-weight="bold" text-anchor="middle">Phase 3</text>
  <text x="466" y="90" fill="#a6e3a1" font-size="11" text-anchor="middle">KismetCompilerVMBackend</text>
  <rect x="386" y="100" width="160" height="18" rx="3" fill="#313244"/>
  <text x="466" y="113" fill="#a6adc8" font-size="10" text-anchor="middle">GenerateCodeFromClass</text>
  <rect x="386" y="122" width="160" height="18" rx="3" fill="#313244"/>
  <text x="466" y="135" fill="#a6adc8" font-size="10" text-anchor="middle">ConstructFunction(ctx)</text>
  <rect x="386" y="144" width="160" height="18" rx="3" fill="#313244"/>
  <text x="466" y="157" fill="#a6adc8" font-size="10" text-anchor="middle">GenerateCodeForStatement</text>
  <text x="466" y="180" fill="#585b70" font-size="10" text-anchor="middle">KCST → EX 映射:</text>
  <rect x="386" y="188" width="160" height="14" rx="2" fill="#11111b"/>
  <text x="466" y="199" fill="#f9e2af" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_GotoIfNot → EX_JumpIfNot</text>
  <rect x="386" y="206" width="160" height="14" rx="2" fill="#11111b"/>
  <text x="466" y="217" fill="#a6e3a1" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_Assignment → EX_Let</text>
  <rect x="386" y="224" width="160" height="14" rx="2" fill="#11111b"/>
  <text x="466" y="235" fill="#f38ba8" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_CallFunction → EX_FinalFunction</text>
  <rect x="386" y="242" width="160" height="14" rx="2" fill="#11111b"/>
  <text x="466" y="253" fill="#cba6f7" font-size="9.5" text-anchor="middle" font-family="Consolas,'Courier New'">KCST_Return → EX_Return</text>
  <text x="466" y="276" fill="#585b70" font-size="10" text-anchor="middle">跳转地址修复:</text>
  <rect x="386" y="282" width="160" height="30" rx="2" fill="#11111b"/>
  <text x="466" y="295" fill="#a6adc8" font-size="9.5" text-anchor="middle">EmitPlaceholderSkip()</text>
  <text x="466" y="308" fill="#a6adc8" font-size="9.5" text-anchor="middle">PerformFixups() 回填地址</text>

  <!-- Arrow 3->4 -->
  <line x1="556" y1="266" x2="584" y2="266" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Phase 4: Result -->
  <rect x="584" y="56" width="200" height="420" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
  <text x="684" y="76" fill="#f9e2af" font-size="12" font-weight="bold" text-anchor="middle">Phase 4</text>
  <text x="684" y="90" fill="#f9e2af" font-size="11" text-anchor="middle">UFunction::Script 字节码</text>
  <rect x="594" y="100" width="180" height="280" rx="4" fill="#11111b"/>
  <text x="600" y="118" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">// SetHP bytecode</text>
  <text x="600" y="134" fill="#89dceb" font-size="10" font-family="Consolas,'Courier New'">0x00: EX_InstanceVariable</text>
  <text x="600" y="148" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">      [ptr: bAlive FProp]</text>
  <text x="600" y="164" fill="#f9e2af" font-size="10" font-family="Consolas,'Courier New'">0x09: EX_JumpIfNot</text>
  <text x="600" y="178" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">      [offset: 0x3C]</text>
  <text x="600" y="194" fill="#a6e3a1" font-size="10" font-family="Consolas,'Courier New'">0x0E: EX_InstanceVariable</text>
  <text x="600" y="208" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">      [ptr: HP FProp]</text>
  <text x="600" y="224" fill="#a6e3a1" font-size="10" font-family="Consolas,'Courier New'">0x17: EX_LocalVariable</text>
  <text x="600" y="238" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">      [ptr: NewHP FProp]</text>
  <text x="600" y="254" fill="#a6e3a1" font-size="10" font-family="Consolas,'Courier New'">0x20: EX_Let</text>
  <text x="600" y="268" fill="#f38ba8" font-size="10" font-family="Consolas,'Courier New'">0x3C: EX_FinalFunction</text>
  <text x="600" y="282" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">      [ptr: PrintString]</text>
  <text x="600" y="298" fill="#cba6f7" font-size="10" font-family="Consolas,'Courier New'">0x50: EX_Return</text>
  <text x="600" y="314" fill="#585b70" font-size="10" font-family="Consolas,'Courier New'">0x55: EX_EndOfScript</text>
  <text x="684" y="410" fill="#a6adc8" font-size="10" text-anchor="middle">存储于</text>
  <text x="684" y="426" fill="#89b4fa" font-size="10" text-anchor="middle">UFunction::Script (TArray&lt;uint8&gt;)</text>
  <text x="684" y="442" fill="#a6adc8" font-size="10" text-anchor="middle">序列化进 uasset Export 段</text>
  <text x="684" y="458" fill="#a6adc8" font-size="10" text-anchor="middle">运行时加载后直接可执行</text>

  <!-- Arrow 4->5 -->
  <line x1="784" y1="266" x2="812" y2="266" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Phase 5: Runtime load -->
  <rect x="812" y="56" width="168" height="420" rx="8" fill="#181825" stroke="#89dceb" stroke-width="2"/>
  <text x="896" y="76" fill="#89dceb" font-size="12" font-weight="bold" text-anchor="middle">Runtime</text>
  <text x="896" y="90" fill="#89dceb" font-size="11" text-anchor="middle">加载 &amp; 执行</text>
  <rect x="822" y="100" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="113" fill="#a6adc8" font-size="10" text-anchor="middle">LoadPackage uasset</text>
  <rect x="822" y="122" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="135" fill="#a6adc8" font-size="10" text-anchor="middle">反序列化 UFunction</text>
  <rect x="822" y="144" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="157" fill="#a6adc8" font-size="10" text-anchor="middle">Script[] 载入内存</text>
  <rect x="822" y="166" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="179" fill="#a6adc8" font-size="10" text-anchor="middle">SpawnActor → CDO copy</text>
  <rect x="822" y="188" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="201" fill="#a6adc8" font-size="10" text-anchor="middle">Call ProcessEvent</text>
  <rect x="822" y="210" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="223" fill="#a6adc8" font-size="10" text-anchor="middle">FFrame::Step 循环</text>
  <rect x="822" y="232" width="148" height="18" rx="3" fill="#313244"/>
  <text x="896" y="245" fill="#a6e3a1" font-size="10" text-anchor="middle">HP 写入 100 ✓</text>

  <!-- note -->
  <text x="500" y="510" fill="#585b70" font-size="11" text-anchor="middle">注意: 打包(cooked)后 UBlueprint/UEdGraph 节点数据被剥离, uasset 仅保留 UBlueprintGeneratedClass + UFunction::Script</text>
  <text x="500" y="530" fill="#585b70" font-size="11" text-anchor="middle">KCST_* 是编译器内部中间表示(IR), 不写入磁盘; EX_* 字节码才是最终产物</text>
</svg>
