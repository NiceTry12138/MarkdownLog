<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="'Segoe UI',sans-serif">
  <rect width="1080" height="720" fill="#1e1e2e" rx="12"/>
  <text x="540" y="32" fill="#cba6f7" font-size="16" font-weight="bold" text-anchor="middle">IPropertyTypeCustomization — 架构全景图</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#89b4fa"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#a6e3a1"/></marker>
    <marker id="ay" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#f9e2af"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#f38ba8"/></marker>
  </defs>

  <!-- ===== LEFT: Details Panel Visual ===== -->
  <text x="210" y="60" fill="#89b4fa" font-size="13" font-weight="bold" text-anchor="middle">Details Panel 视觉结构</text>

  <!-- Panel frame -->
  <rect x="30" y="70" width="360" height="290" rx="6" fill="#11111b" stroke="#313244" stroke-width="1.5"/>

  <!-- Header row (collapsed) -->
  <rect x="38" y="80" width="344" height="30" rx="4" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="52" y="100" fill="#89b4fa" font-size="11">▶  My Struct Property</text>
  <text x="300" y="100" fill="#a6adc8" font-size="10">[值预览]</text>
  <text x="46" y="118" fill="#89b4fa" font-size="9" font-style="italic">← CustomizeHeader 渲染此行</text>

  <!-- Arrow to expanded -->
  <text x="118" y="138" fill="#585b70" font-size="10">展开后（▼）：</text>

  <!-- Expanded header -->
  <rect x="38" y="146" width="344" height="30" rx="4" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="52" y="165" fill="#a6e3a1" font-size="11">▼  My Struct Property</text>
  <text x="300" y="165" fill="#a6adc8" font-size="10">[值预览]</text>

  <!-- Children rows -->
  <rect x="50" y="182" width="332" height="26" rx="3" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <text x="68" y="200" fill="#cdd6f4" font-size="11">Field A</text>
  <text x="240" y="200" fill="#a6adc8" font-size="10">默认 UE 渲染</text>
  
  <rect x="50" y="212" width="332" height="26" rx="3" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <text x="68" y="230" fill="#cdd6f4" font-size="11">Field B</text>
  <rect x="210" y="216" width="160" height="16" rx="3" fill="#89b4fa" opacity="0.3"/>
  <text x="290" y="228" fill="#89b4fa" font-size="9" text-anchor="middle">自定义 Slate Widget</text>

  <rect x="50" y="242" width="332" height="26" rx="3" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
  <text x="68" y="260" fill="#f9e2af" font-size="11">自定义整行</text>
  <text x="240" y="260" fill="#a6adc8" font-size="10">AddCustomRow()</text>

  <text x="210" y="292" fill="#a6e3a1" font-size="9" text-anchor="middle" font-style="italic">← CustomizeChildren 渲染这些子行</text>

  <!-- Legend -->
  <rect x="38" y="304" width="14" height="14" fill="none" stroke="#89b4fa" stroke-width="1.5" rx="2"/>
  <text x="56" y="315" fill="#a6adc8" font-size="10">= Header 行（CustomizeHeader）</text>
  <rect x="38" y="322" width="14" height="14" fill="none" stroke="#a6e3a1" stroke-width="1.5" rx="2"/>
  <text x="56" y="333" fill="#a6adc8" font-size="10">= Children 区域（CustomizeChildren）</text>

  <!-- ===== MIDDLE: Interface / Class ===== -->
  <text x="540" y="60" fill="#cba6f7" font-size="13" font-weight="bold" text-anchor="middle">IPropertyTypeCustomization 接口</text>

  <!-- Interface box -->
  <rect x="430" y="70" width="280" height="110" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="570" y="90" fill="#cba6f7" font-size="12" font-weight="bold" text-anchor="middle">IPropertyTypeCustomization</text>
  <line x1="435" y1="96" x2="705" y2="96" stroke="#313244" stroke-width="1"/>
  <text x="440" y="112" fill="#a6e3a1" font-size="10" font-family="Consolas,'Courier New'">virtual void CustomizeHeader(</text>
  <text x="450" y="126" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">  TSharedRef&lt;IPropertyHandle&gt;,</text>
  <text x="450" y="140" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">  FDetailWidgetRow&amp;, Utils&amp;) = 0;</text>
  <text x="440" y="154" fill="#a6e3a1" font-size="10" font-family="Consolas,'Courier New'">virtual void CustomizeChildren(</text>
  <text x="450" y="168" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">  ..., IDetailChildrenBuilder&amp;, ...) = 0;</text>

  <!-- IPropertyHandle -->
  <rect x="430" y="200" width="280" height="96" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="570" y="218" fill="#89b4fa" font-size="12" font-weight="bold" text-anchor="middle">IPropertyHandle</text>
  <line x1="435" y1="224" x2="705" y2="224" stroke="#313244" stroke-width="1"/>
  <text x="440" y="240" fill="#a6adc8" font-size="10">GetValue(T&amp;) / SetValue(T)</text>
  <text x="440" y="255" fill="#a6adc8" font-size="10">GetChildHandle(FName) → 子属性句柄</text>
  <text x="440" y="270" fill="#a6adc8" font-size="10">GetProperty() → FProperty*</text>
  <text x="440" y="285" fill="#a6adc8" font-size="10">AccessRawData() → void* 原始内存</text>

  <!-- FDetailWidgetRow -->
  <rect x="430" y="316" width="280" height="96" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="570" y="334" fill="#f9e2af" font-size="12" font-weight="bold" text-anchor="middle">FDetailWidgetRow</text>
  <line x1="435" y1="340" x2="705" y2="340" stroke="#313244" stroke-width="1"/>
  <text x="440" y="356" fill="#a6adc8" font-size="10">NameContent()[ SWidget ]</text>
  <text x="440" y="371" fill="#a6adc8" font-size="10">ValueContent()[ SWidget ]</text>
  <text x="440" y="386" fill="#a6adc8" font-size="10">WholeRowContent()[ SWidget ]</text>
  <text x="440" y="401" fill="#a6adc8" font-size="10">FilterString(FText)</text>

  <!-- IDetailChildrenBuilder -->
  <rect x="430" y="432" width="280" height="110" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="570" y="450" fill="#a6e3a1" font-size="12" font-weight="bold" text-anchor="middle">IDetailChildrenBuilder</text>
  <line x1="435" y1="456" x2="705" y2="456" stroke="#313244" stroke-width="1"/>
  <text x="440" y="472" fill="#a6adc8" font-size="10">AddProperty(Handle)  → 默认UE行</text>
  <text x="440" y="487" fill="#a6adc8" font-size="10">AddCustomRow(SearchStr) → 自定义行</text>
  <text x="440" y="502" fill="#a6adc8" font-size="10">AddGroup(Name, DisplayName)</text>
  <text x="440" y="517" fill="#a6adc8" font-size="10">AddExternalObjects(TArray&lt;UObject*&gt;)</text>
  <text x="440" y="532" fill="#a6adc8" font-size="10">GenerateStructValueWidget(Handle)</text>

  <!-- Arrows from interface to sub-types -->
  <line x1="570" y1="180" x2="570" y2="200" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="570" y1="296" x2="570" y2="316" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#ay)"/>
  <line x1="570" y1="412" x2="570" y2="432" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ===== RIGHT: Dispatch / Registration Flow ===== -->
  <text x="880" y="60" fill="#f38ba8" font-size="13" font-weight="bold" text-anchor="middle">注册 &amp; 分发机制</text>

  <!-- Module startup -->
  <rect x="760" y="70" width="290" height="50" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="905" y="90" fill="#f38ba8" font-size="11" text-anchor="middle">YourModule::StartupModule()</text>
  <text x="905" y="107" fill="#a6adc8" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">FPropertyEditorModule&amp; PM = ...</text>

  <line x1="905" y1="120" x2="905" y2="142" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- RegisterCustomPropertyTypeLayout -->
  <rect x="760" y="142" width="290" height="60" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="905" y="160" fill="#f9e2af" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">PM.RegisterCustomPropertyTypeLayout(</text>
  <text x="905" y="176" fill="#a6e3a1" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">  "MyStruct",  ← 结构体名称(不带F前缀)</text>
  <text x="905" y="190" fill="#a6adc8" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">  FOnGet...::CreateStatic(&amp;T::MakeInstance));</text>

  <line x1="905" y1="202" x2="905" y2="224" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#ay)"/>

  <!-- GlobalPropertyTypeToLayoutMap -->
  <rect x="760" y="224" width="290" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="905" y="246" fill="#89b4fa" font-size="11" text-anchor="middle">GlobalPropertyTypeToLayoutMap</text>
  <text x="905" y="258" fill="#a6adc8" font-size="9" text-anchor="middle">TMap&lt;FName, FPropertyTypeLayoutCallbackList&gt;</text>

  <!-- How UE queries -->
  <line x1="905" y1="260" x2="905" y2="280" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="912" y="274" fill="#585b70" font-size="9">运行时查询</text>
  <line x1="905" y1="280" x2="905" y2="300" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GetPropertyTypeCustomization -->
  <rect x="760" y="300" width="290" height="60" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="905" y="318" fill="#89b4fa" font-size="10" text-anchor="middle">PropertyEditorModule::</text>
  <text x="905" y="332" fill="#89b4fa" font-size="10" text-anchor="middle">GetPropertyTypeCustomization(Property)</text>
  <text x="905" y="348" fill="#585b70" font-size="9" text-anchor="middle">① FStructProperty → Struct→GetFName()</text>
  <text x="905" y="360" fill="#585b70" font-size="9" text-anchor="middle">② FEnumProperty → Enum→GetFName()</text>

  <line x1="905" y1="360" x2="905" y2="382" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Create instance -->
  <rect x="760" y="382" width="290" height="36" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="905" y="400" fill="#a6e3a1" font-size="11" text-anchor="middle">MakeInstance() → 创建 Customization 实例</text>
  <text x="905" y="415" fill="#a6adc8" font-size="9" text-anchor="middle">每次 Details Panel 显示该属性时调用</text>

  <line x1="905" y1="418" x2="905" y2="438" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Two calls -->
  <rect x="760" y="438" width="130" height="50" rx="5" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="825" y="458" fill="#cba6f7" font-size="10" text-anchor="middle">CustomizeHeader()</text>
  <text x="825" y="474" fill="#a6adc8" font-size="9" text-anchor="middle">填充 FDetailWidgetRow</text>

  <rect x="920" y="438" width="130" height="50" rx="5" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="985" y="458" fill="#a6e3a1" font-size="10" text-anchor="middle">CustomizeChildren()</text>
  <text x="985" y="474" fill="#a6adc8" font-size="9" text-anchor="middle">填充 ChildBuilder</text>

  <!-- ===== BOTTOM: Shutdown + IPropertyTypeIdentifier ===== -->
  <rect x="760" y="506" width="290" height="60" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="905" y="524" fill="#f38ba8" font-size="11" text-anchor="middle">YourModule::ShutdownModule()</text>
  <text x="905" y="540" fill="#a6adc8" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">PM.UnregisterCustomPropertyTypeLayout(</text>
  <text x="905" y="555" fill="#a6adc8" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">    "MyStruct");</text>

  <!-- NotifyCustomizationModuleChanged note -->
  <rect x="760" y="578" width="290" height="36" rx="6" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="905" y="596" fill="#f9e2af" font-size="10" text-anchor="middle">PM.NotifyCustomizationModuleChanged();</text>
  <text x="905" y="611" fill="#a6adc8" font-size="9" text-anchor="middle">注册/注销后都必须调用，通知重建面板</text>

  <!-- ===== BOTTOM: IPropertyTypeIdentifier note ===== -->
  <rect x="30" y="376" width="380" height="70" rx="6" fill="#181825" stroke="#89dceb" stroke-width="1.5"/>
  <text x="220" y="396" fill="#89dceb" font-size="11" font-weight="bold" text-anchor="middle">IPropertyTypeIdentifier（可选）</text>
  <text x="220" y="412" fill="#a6adc8" font-size="10" text-anchor="middle">允许对同一结构体注册多个 Customization，</text>
  <text x="220" y="427" fill="#a6adc8" font-size="10" text-anchor="middle">通过 IsPropertyTypeCustomized(PropertyHandle) 区分。</text>
  <text x="220" y="442" fill="#89dceb" font-size="9" text-anchor="middle">例：同一 FMyStruct，在 Actor A 上用 Customization1，在 Actor B 上用 Customization2</text>

  <!-- Child property handle note -->
  <rect x="30" y="460" width="380" height="60" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="220" y="480" fill="#cba6f7" font-size="11" font-weight="bold" text-anchor="middle">PropertyHandle 子属性访问模式</text>
  <text x="220" y="496" fill="#a6adc8" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">TSharedPtr&lt;IPropertyHandle&gt; FieldAHandle =</text>
  <text x="220" y="512" fill="#89b4fa" font-size="10" text-anchor="middle" font-family="Consolas,'Courier New'">    PropertyHandle-&gt;GetChildHandle(GET_MEMBER_NAME_CHECKED(FMyStruct, FieldA));</text>

  <!-- CreatePropertyNameWidget note -->
  <rect x="30" y="534" width="380" height="62" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="220" y="552" fill="#f9e2af" font-size="11" font-weight="bold" text-anchor="middle">默认 UE 外观复用</text>
  <text x="40" y="568" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">PropertyHandle-&gt;CreatePropertyNameWidget()  // 名称 Label</text>
  <text x="40" y="583" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">PropertyHandle-&gt;CreatePropertyValueWidget() // 值 Widget</text>
  <text x="40" y="597" fill="#a6adc8" font-size="10" font-family="Consolas,'Courier New'">ChildBuilder.AddProperty(ChildHandle)        // 整行默认样式</text>

  <!-- Connector: Details Panel → IPropertyTypeCustomization -->
  <line x1="394" y1="155" x2="428" y2="155" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="411" y="148" fill="#585b70" font-size="9">被调用</text>
  <line x1="394" y1="215" x2="428" y2="215" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>
</svg>
