<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2980B9"/>
    </marker>
  </defs>

  <rect width="960" height="440" fill="#F8FAFB" rx="8"/>
  <text x="480" y="28" font-family="Microsoft YaHei,sans-serif" font-size="17" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">Bunch 分包（Partial Bunch）机制</text>
  <text x="480" y="46" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#888">当 Bunch 数据大于 MAX_SINGLE_BUNCH_SIZE_BITS（≈11200 bits）时，UChannel::SendBunch() 自动拆分</text>

  <!-- ===== Original large bunch ===== -->
  <text x="60" y="76" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="#333">原始 Bunch（Actor 所有属性，包含大量数据）</text>
  <rect x="60" y="82" width="840" height="50" fill="#E67E22" rx="6" stroke="#D35400" stroke-width="1.5"/>
  <text x="480" y="104" font-family="Microsoft YaHei,sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">FOutBunch：完整属性数据（例如 28400 bits = 3550 字节）</text>
  <text x="480" y="122" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FDEBD0">bPartial=0（尚未分片）・ 超过 MAX_SINGLE_BUNCH_SIZE_BITS → 触发分片逻辑</text>

  <!-- Arrow down -->
  <line x1="480" y1="132" x2="480" y2="158" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="495" y="150" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#E67E22">UChannel::SendBunch() 内部拆分循环</text>

  <!-- ===== Partial bunches row ===== -->
  <!-- 28400 bits / 11200 = 3 partial bunches (last one may be smaller) -->
  <!-- Bunch 1: x=60, w=260 -->
  <rect x="60" y="162" width="260" height="72" fill="#7D3C98" rx="6"/>
  <text x="190" y="182" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Partial Bunch [1/3]</text>
  <rect x="68" y="190" width="244" height="18" fill="#9B59B6" rx="3"/>
  <text x="190" y="203" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartial=1, bPartialInitial=1</text>
  <text x="190" y="226" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#E8DAEF">bPartialFinal=0（不是最后一片）</text>

  <!-- Bunch 2: x=350, w=260 -->
  <rect x="350" y="162" width="260" height="72" fill="#7D3C98" rx="6"/>
  <text x="480" y="182" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Partial Bunch [2/3]</text>
  <rect x="358" y="190" width="244" height="18" fill="#9B59B6" rx="3"/>
  <text x="480" y="203" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartial=1, bPartialInitial=0</text>
  <text x="480" y="226" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#E8DAEF">bPartialFinal=0（中间片）</text>

  <!-- Bunch 3: x=640, w=260 -->
  <rect x="640" y="162" width="260" height="72" fill="#6C3483" rx="6"/>
  <text x="770" y="182" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Partial Bunch [3/3]</text>
  <rect x="648" y="190" width="244" height="18" fill="#8E44AD" rx="3"/>
  <text x="770" y="203" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartial=1, bPartialFinal=1</text>
  <text x="770" y="226" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#E8DAEF">bPartialInitial=0（最后一片）</text>

  <!-- Size bars below each partial bunch -->
  <text x="190" y="248" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#7D3C98">11200 bits (1400 B)</text>
  <text x="480" y="248" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#7D3C98">11200 bits (1400 B)</text>
  <text x="770" y="248" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#6C3483">6000 bits (750 B)</text>

  <!-- Arrow down: each partial → UDP packet -->
  <line x1="190" y1="252" x2="190" y2="278" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="480" y1="252" x2="480" y2="278" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="770" y1="252" x2="770" y2="278" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- UDP Packets -->
  <rect x="60" y="278" width="260" height="40" fill="#2980B9" rx="5"/>
  <text x="190" y="295" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white">UDP Packet #N</text>
  <text x="190" y="311" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#D6EAF8">OutPacketId = N</text>

  <rect x="350" y="278" width="260" height="40" fill="#2980B9" rx="5"/>
  <text x="480" y="295" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white">UDP Packet #N+1</text>
  <text x="480" y="311" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#D6EAF8">OutPacketId = N+1</text>

  <rect x="640" y="278" width="260" height="40" fill="#2980B9" rx="5"/>
  <text x="770" y="295" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white">UDP Packet #N+2</text>
  <text x="770" y="311" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#D6EAF8">OutPacketId = N+2</text>

  <!-- ===== Receive side reassembly ===== -->
  <text x="60" y="345" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="#333">接收端重组（客户端 DispatchPacket）</text>

  <!-- Arrow up: collect all partials -->
  <line x1="190" y1="356" x2="480" y2="388" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="356" x2="480" y2="388" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="770" y1="356" x2="480" y2="388" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="356" width="260" height="30" fill="#D5F5E3" rx="4" stroke="#27AE60"/>
  <text x="190" y="376" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#145A32">InPartialBunch 收到首片</text>

  <rect x="350" y="356" width="260" height="30" fill="#D5F5E3" rx="4" stroke="#27AE60"/>
  <text x="480" y="376" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#145A32">追加到 InPartialBunch</text>

  <rect x="640" y="356" width="260" height="30" fill="#A9DFBF" rx="4" stroke="#1E8449"/>
  <text x="770" y="376" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#145A32">收到尾片 → 合并完整 Bunch</text>

  <!-- Final reassembled bunch -->
  <rect x="280" y="392" width="400" height="36" fill="#1E8449" rx="6"/>
  <text x="480" y="409" font-family="Microsoft YaHei,sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">完整 Bunch → UActorChannel::ReceivedBunch()</text>
  <text x="480" y="422" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#D5F5E3">调用 FObjectReplicator::ReceivedBunch() → 应用 Actor 属性</text>
</svg>
