<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="#F8FAFB" rx="8"/>

  <!-- Title -->
  <text x="500" y="32" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">UE 网络三层架构总览</text>

  <!-- Center divider -->
  <line x1="500" y1="50" x2="500" y2="590" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="245" y="58" font-family="Microsoft YaHei,sans-serif" font-size="13" text-anchor="middle" fill="#666">Dedicated Server 端</text>
  <text x="755" y="58" font-family="Microsoft YaHei,sans-serif" font-size="13" text-anchor="middle" fill="#666">Game Client 端</text>

  <!-- ====== Layer 1: NetDriver ====== -->
  <!-- Layer label -->
  <rect x="4" y="72" width="16" height="100" fill="#7B68EE" rx="3"/>
  <text x="12" y="172" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="white" text-anchor="middle"
        transform="rotate(-90,12,172)">N e t D r i v e r</text>

  <!-- Server NetDriver box -->
  <rect x="60" y="68" width="380" height="80" fill="#7B68EE" rx="8" opacity="0.9"/>
  <text x="250" y="100" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold"
        text-anchor="middle" fill="white">UNetDriver（服务端）</text>
  <text x="250" y="120" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#E0D8FF">管理所有客户端连接 · 驱动 ServerReplicateActors()</text>
  <text x="250" y="138" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#E0D8FF">底层实现: UIpNetDriver（UDP Socket）</text>

  <!-- Client NetDriver box -->
  <rect x="555" y="68" width="385" height="80" fill="#7B68EE" rx="8" opacity="0.9"/>
  <text x="748" y="100" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold"
        text-anchor="middle" fill="white">UNetDriver（客户端）</text>
  <text x="748" y="120" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#E0D8FF">只有一个 ServerConnection · 接收服务端数据</text>
  <text x="748" y="138" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#E0D8FF">底层实现: UIpNetDriver（UDP Socket）</text>

  <!-- Arrows: NetDriver → Connections -->
  <line x1="130" y1="148" x2="100" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="148" x2="215" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="148" x2="340" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="748" y1="148" x2="748" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Layer 2: Connection ====== -->
  <rect x="4" y="205" width="16" height="100" fill="#2ECC71" rx="3"/>
  <text x="12" y="305" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="white" text-anchor="middle"
        transform="rotate(-90,12,305)">C o n n e c t i o n</text>

  <!-- Server: Connection 0 -->
  <rect x="60" y="205" width="120" height="75" fill="#27AE60" rx="6"/>
  <text x="120" y="228" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold"
        text-anchor="middle" fill="white">UNetConnection</text>
  <text x="120" y="246" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#D5F5E3">ClientConn[0]</text>
  <text x="120" y="264" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#A9DFBF">玩家 A · IP:5001</text>

  <!-- Server: Connection 1 -->
  <rect x="195" y="205" width="120" height="75" fill="#27AE60" rx="6"/>
  <text x="255" y="228" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold"
        text-anchor="middle" fill="white">UNetConnection</text>
  <text x="255" y="246" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#D5F5E3">ClientConn[1]</text>
  <text x="255" y="264" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#A9DFBF">玩家 B · IP:5002</text>

  <!-- Server: Connection N (ellipsis) -->
  <rect x="330" y="205" width="80" height="75" fill="#1E8449" rx="6" opacity="0.7"/>
  <text x="370" y="248" font-family="Microsoft YaHei,sans-serif" font-size="18"
        text-anchor="middle" fill="white">…</text>
  <text x="370" y="270" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#A9DFBF">更多连接</text>

  <!-- Client: ServerConnection -->
  <rect x="618" y="205" width="260" height="75" fill="#27AE60" rx="6"/>
  <text x="748" y="228" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold"
        text-anchor="middle" fill="white">UNetConnection</text>
  <text x="748" y="246" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#D5F5E3">ServerConnection（唯一）</text>
  <text x="748" y="264" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#A9DFBF">连接到服务器 · 含发送缓冲 SendBuffer</text>

  <!-- Arrows: Connection → Channels -->
  <line x1="100" y1="280" x2="90" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="130" y1="280" x2="145" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="280" x2="230" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="280" x2="280" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="280" x2="672" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="748" y1="280" x2="748" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="796" y1="280" x2="824" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Layer 3: Channels ====== -->
  <rect x="4" y="335" width="16" height="140" fill="#E67E22" rx="3"/>
  <text x="12" y="475" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="white" text-anchor="middle"
        transform="rotate(-90,12,475)">C h a n n e l</text>

  <!-- Channels under Conn[0] -->
  <rect x="60" y="335" width="70" height="50" fill="#E67E22" rx="5"/>
  <text x="95" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#0</text>
  <text x="95" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Control</text>

  <rect x="138" y="335" width="70" height="50" fill="#D35400" rx="5"/>
  <text x="173" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#1</text>
  <text x="173" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Actor</text>

  <!-- Channels under Conn[1] -->
  <rect x="195" y="335" width="70" height="50" fill="#E67E22" rx="5"/>
  <text x="230" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#0</text>
  <text x="230" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Control</text>

  <rect x="272" y="335" width="70" height="50" fill="#D35400" rx="5"/>
  <text x="307" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#2</text>
  <text x="307" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Actor</text>

  <!-- Channels under ServerConn -->
  <rect x="618" y="335" width="70" height="50" fill="#E67E22" rx="5"/>
  <text x="653" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#0</text>
  <text x="653" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Control</text>

  <rect x="698" y="335" width="70" height="50" fill="#D35400" rx="5"/>
  <text x="733" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#1</text>
  <text x="733" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Actor</text>

  <rect x="778" y="335" width="70" height="50" fill="#D35400" rx="5"/>
  <text x="813" y="356" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="white">#2</text>
  <text x="813" y="373" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#FDEBD0">Actor</text>

  <!-- Channel descriptions -->
  <text x="95" y="400" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#666">…更多 Actor</text>
  <text x="230" y="400" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#666">…更多 Actor</text>
  <text x="748" y="400" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#666">…对应服务端所有 Actor</text>

  <!-- ====== Legend ====== -->
  <rect x="60" y="430" width="860" height="80" fill="#EEF0F5" rx="8" stroke="#DDD"/>
  <text x="490" y="450" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold"
        text-anchor="middle" fill="#333">关键说明</text>
  <text x="70" y="470" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#444">
    ● UNetDriver：网络驱动的核心，持有所有连接，每 Tick 调用 TickDispatch 收包、TickFlush 发包
  </text>
  <text x="70" y="488" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#444">
    ● UNetConnection：代表一条逻辑连接（对应一个 UDP 端点），持有发送缓冲 SendBuffer 和 PacketHandler 链
  </text>
  <text x="70" y="506" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#444">
    ● UChannel：同一连接内的逻辑子流，#0 固定为 ControlChannel（控制命令），#1+ 为各 Actor 的数据流
  </text>

  <!-- Legend color boxes -->
  <rect x="60" y="520" width="16" height="16" fill="#7B68EE" rx="3"/>
  <text x="82" y="533" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#333">NetDriver 层</text>
  <rect x="170" y="520" width="16" height="16" fill="#27AE60" rx="3"/>
  <text x="192" y="533" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#333">Connection 层</text>
  <rect x="290" y="520" width="16" height="16" fill="#E67E22" rx="3"/>
  <text x="312" y="533" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#333">Channel 层</text>

  <!-- UDP label bottom -->
  <text x="490" y="545" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#999">
    底层传输协议：UDP（不可靠、无连接）→ UE 在应用层实现可靠性保证
  </text>
</svg>
