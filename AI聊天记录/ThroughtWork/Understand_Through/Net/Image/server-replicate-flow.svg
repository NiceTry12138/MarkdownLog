<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="860" viewBox="0 0 1000 860">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27AE60"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#E74C3C"/>
    </marker>
  </defs>

  <rect width="1000" height="860" fill="#F8FAFB" rx="8"/>
  <text x="500" y="30" font-family="Microsoft YaHei,sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">ServerReplicateActors() 执行流程</text>
  <text x="500" y="48" font-family="Microsoft YaHei,sans-serif" font-size="11"
        text-anchor="middle" fill="#888">每次服务端 Tick（TickFlush）触发，对每个客户端连接遍历所有需同步的 Actor</text>

  <!-- Helper macros: box at cx,cy w,h label sublabel color -->
  <!-- Step 0: Entry -->
  <rect x="370" y="60" width="260" height="44" fill="#7B68EE" rx="6"/>
  <text x="500" y="79" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">UNetDriver::ServerReplicateActors()</text>
  <text x="500" y="96" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#E0D8FF">每帧调用一次（在 TickFlush 中触发）</text>

  <line x1="500" y1="104" x2="500" y2="130" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: Check connections -->
  <rect x="350" y="130" width="300" height="44" fill="#5DADE2" rx="6"/>
  <text x="500" y="149" font-family="Microsoft YaHei,sans-serif" font-size="12" text-anchor="middle" fill="white">PrepConnections( DeltaSeconds )</text>
  <text x="500" y="165" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#EBF5FB">计算本帧可以 tick 多少个连接（带宽预算）</text>

  <line x1="500" y1="174" x2="500" y2="200" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: BuildConsiderList -->
  <rect x="320" y="200" width="360" height="56" fill="#2ECC71" rx="6"/>
  <text x="500" y="220" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">① BuildConsiderList()</text>
  <text x="500" y="236" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#E8F8F5">遍历 NetworkObjectList 中所有 Active Actor</text>
  <text x="500" y="249" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#E8F8F5">过滤：PendingKill / RemoteRole==None / 初始化未完成 / 休眠</text>

  <line x1="500" y1="256" x2="500" y2="282" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CallPreReplication note (right) -->
  <rect x="700" y="200" width="250" height="56" fill="#EBF5FB" rx="5" stroke="#AED6F1"/>
  <text x="825" y="218" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1A5276">Actor::CallPreReplication()</text>
  <text x="825" y="232" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">每个候选 Actor 调用此函数</text>
  <text x="825" y="246" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">游戏代码可在此更新 dirty 标记</text>
  <text x="825" y="260" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">（Push Model 模式下尤其重要）</text>
  <line x1="680" y1="228" x2="700" y2="228" stroke="#AED6F1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 3: For each connection -->
  <rect x="350" y="282" width="300" height="40" fill="#F39C12" rx="6"/>
  <text x="500" y="298" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">遍历每个 ClientConnection</text>
  <text x="500" y="312" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FEF9E7">（外层 for 循环，i = 0..NumClientsToTick-1）</text>

  <line x1="500" y1="322" x2="500" y2="348" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: PrioritizeActors -->
  <rect x="320" y="348" width="360" height="56" fill="#E67E22" rx="6"/>
  <text x="500" y="368" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">② PrioritizeActors()</text>
  <text x="500" y="384" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FDEBD0">根据距离/重要性计算每个 Actor 的优先级分值</text>
  <text x="500" y="398" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FDEBD0">排序结果：优先级高的 Actor 先被复制</text>

  <!-- Priority note right -->
  <rect x="700" y="348" width="250" height="56" fill="#FEF9E7" rx="5" stroke="#F39C12"/>
  <text x="825" y="364" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#7D6608">优先级 = 基础值 × 距离衰减</text>
  <text x="825" y="378" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">长时间未发送的 Actor 优先级提升</text>
  <text x="825" y="392" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">Actor::GetNetPriority() 可重写</text>
  <text x="825" y="404" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">CPU 繁忙时自动削减候选数量</text>
  <line x1="680" y1="376" x2="700" y2="376" stroke="#F39C12" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="500" y1="404" x2="500" y2="430" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Relevancy check -->
  <rect x="280" y="430" width="160" height="50" fill="#8E44AD" rx="6"/>
  <text x="360" y="449" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">③ 相关性判断</text>
  <text x="360" y="464" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#F4ECF7">IsActorRelevantToConnection()</text>

  <!-- Decision diamond: Relevant? -->
  <polygon points="490,480 555,455 620,480 555,505" fill="#8E44AD" opacity="0.8"/>
  <text x="555" y="483" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">相关？</text>
  <line x1="440" y1="455" x2="490" y2="480" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Not relevant: close channel -->
  <rect x="650" y="455" width="150" height="50" fill="#E74C3C" rx="5"/>
  <text x="725" y="473" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">关闭 ActorChannel</text>
  <text x="725" y="488" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FADBD8">EChannelCloseReason::Relevancy</text>
  <text x="725" y="500" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#FADBD8">客户端销毁该 Actor</text>
  <line x1="620" y1="480" x2="650" y2="480" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="634" y="473" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#E74C3C">否</text>

  <!-- Relevant: open/update channel -->
  <line x1="555" y1="505" x2="500" y2="530" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="520" y="523" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#27AE60">是</text>

  <!-- Step 6: Open/find channel -->
  <rect x="340" y="530" width="320" height="44" fill="#27AE60" rx="6"/>
  <text x="500" y="549" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">④ 查找或创建 ActorChannel</text>
  <text x="500" y="565" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#E8F8F5">首次相关 → CreateChannelByName(NAME_Actor) → SetChannelActor()</text>

  <line x1="500" y1="574" x2="500" y2="600" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7: ReplicateActor -->
  <rect x="300" y="600" width="400" height="70" fill="#1A5276" rx="6"/>
  <text x="500" y="620" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">⑤ UActorChannel::ReplicateActor()</text>
  <text x="500" y="638" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#AED6F1">a) 序列化 Actor 属性 → FObjectReplicator::ReplicateProperties()</text>
  <text x="500" y="651" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#AED6F1">b) 序列化子对象 → DoSubObjectReplication()</text>
  <text x="500" y="664" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#AED6F1">c) 写入 FOutBunch → SendBunch()</text>

  <line x1="500" y1="670" x2="500" y2="696" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 8: SendBunch / FlushNet -->
  <rect x="320" y="696" width="360" height="56" fill="#2C3E50" rx="6"/>
  <text x="500" y="716" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">⑥ UChannel::SendBunch()</text>
  <text x="500" y="732" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#BDC3C7">过大 → 分割为 PartialBunch</text>
  <text x="500" y="746" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#BDC3C7">写入 Connection::SendBuffer → FlushNet() → UDP 发出</text>

  <!-- Saturation check (right side of step 7) -->
  <rect x="700" y="600" width="240" height="56" fill="#F7F9F9" rx="5" stroke="#AAB7B8"/>
  <text x="820" y="616" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">连接带宽饱和检查</text>
  <text x="820" y="630" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">Connection::IsNetReady(0)</text>
  <text x="820" y="644" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">若饱和，跳过当前 Actor</text>
  <text x="820" y="657" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">并标记 bPendingNetUpdate=true</text>
  <line x1="700" y1="635" x2="700" y2="635" stroke="#AAB7B8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="628" x2="700" y2="628" stroke="#AAB7B8"/>
  <line x1="640" y1="628" x2="700" y2="628" stroke="#AAB7B8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Loop back arrow -->
  <path d="M 320 722 Q 260 722 260 600 Q 260 508 320 480" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="235" y="620" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888" transform="rotate(-90,235,620)">下一个 Actor（按优先级顺序）</text>

  <!-- Back to connections loop -->
  <path d="M 320 348 Q 240 348 240 300 Q 240 282 320 282" fill="none" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="230" y="315" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#E67E22" transform="rotate(-90,230,315)">下一个连接</text>

  <!-- Legend bottom -->
  <rect x="30" y="800" width="840" height="46" fill="#EEF0F5" rx="6" stroke="#DDD"/>
  <text x="450" y="817" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#555" font-weight="bold">函数调用关系：ServerReplicateActors → [BuildConsiderList, PrioritizeActors, ReplicateActor] → SendBunch → FlushNet</text>
  <text x="450" y="835" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">整个流程确保：每帧只把"有变化且对该客户端相关"的 Actor 数据发出；带宽不足时先发优先级高的 Actor</text>
</svg>
