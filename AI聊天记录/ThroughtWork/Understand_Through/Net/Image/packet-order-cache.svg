<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27AE60"/>
    </marker>
  </defs>

  <rect width="960" height="480" fill="#F8FAFB" rx="8"/>
  <text x="480" y="28" font-family="Microsoft YaHei,sans-serif" font-size="17" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">乱序数据包缓存与还原（PacketOrderCache）</text>

  <!-- Timeline top -->
  <text x="60" y="60" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="#333">
    场景：连续收到 Packet #N+2 先于 #N+1（UDP 乱序到达）
  </text>

  <!-- ===== Packets in arrival order ===== -->
  <!-- Arrival timeline row -->
  <text x="60" y="85" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555">到达顺序：</text>
  <rect x="150" y="70" width="90" height="36" fill="#27AE60" rx="5"/>
  <text x="195" y="89" font-family="Consolas,monospace" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Pkt #N</text>
  <text x="195" y="101" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#D5F5E3">正常到达</text>

  <line x1="240" y1="88" x2="270" y2="88" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="270" y="70" width="90" height="36" fill="#E74C3C" rx="5"/>
  <text x="315" y="89" font-family="Consolas,monospace" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+2</text>
  <text x="315" y="101" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#FADBD8">乱序！跳过#N+1</text>

  <line x1="360" y1="88" x2="390" y2="88" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="390" y="70" width="90" height="36" fill="#F39C12" rx="5"/>
  <text x="435" y="89" font-family="Consolas,monospace" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+3</text>
  <text x="435" y="101" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#FEF9E7">继续乱序</text>

  <line x1="480" y1="88" x2="510" y2="88" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="510" y="70" width="90" height="36" fill="#27AE60" rx="5"/>
  <text x="555" y="89" font-family="Consolas,monospace" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+1</text>
  <text x="555" y="101" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#D5F5E3">迟到的 #N+1</text>

  <!-- ===== Cache array ===== -->
  <text x="60" y="132" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#7D3C98">PacketOrderCache（循环数组，容量 = CVarNetPacketOrderMaxCachedPackets）</text>

  <!-- Array cells -->
  <rect x="150" y="140" width="90" height="50" fill="#F4ECF7" rx="4" stroke="#7D3C98"/>
  <text x="195" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#6C3483">Index 0</text>
  <text x="195" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#888">empty</text>

  <rect x="250" y="140" width="90" height="50" fill="#E8DAEF" rx="4" stroke="#7D3C98" stroke-width="2"/>
  <text x="295" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Index 1</text>
  <text x="295" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#6C3483">→ Pkt #N+2</text>
  <rect x="250" y="140" width="90" height="50" fill="#9B59B6" rx="4" stroke="#7D3C98" stroke-width="2"/>
  <text x="295" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Slot[1]</text>
  <text x="295" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#E8DAEF">Pkt #N+2</text>

  <rect x="350" y="140" width="90" height="50" fill="#8E44AD" rx="4" stroke="#7D3C98" stroke-width="2"/>
  <text x="395" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Slot[2]</text>
  <text x="395" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#E8DAEF">Pkt #N+3</text>

  <rect x="450" y="140" width="90" height="50" fill="#F4ECF7" rx="4" stroke="#7D3C98"/>
  <text x="495" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#6C3483">Slot[3]</text>
  <text x="495" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#888">empty</text>

  <rect x="550" y="140" width="90" height="50" fill="#F4ECF7" rx="4" stroke="#7D3C98"/>
  <text x="595" y="163" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#6C3483">Slot[4]</text>
  <text x="595" y="178" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#888">empty</text>

  <!-- Arrows from packets to cache -->
  <line x1="315" y1="106" x2="295" y2="140" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="435" y1="106" x2="395" y2="140" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== FlushPacketOrderCache step ===== -->
  <text x="60" y="220" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#27AE60">
    当 Pkt #N+1 到达 → FlushPacketOrderCache() → 按序处理缓存
  </text>

  <!-- Flush order arrows -->
  <rect x="150" y="230" width="90" height="36" fill="#27AE60" rx="5"/>
  <text x="195" y="249" font-family="Consolas,monospace" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+1</text>
  <text x="195" y="261" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#D5F5E3">立即处理</text>

  <line x1="240" y1="248" x2="268" y2="248" stroke="#27AE60" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="268" y="230" width="90" height="36" fill="#1E8449" rx="5"/>
  <text x="313" y="249" font-family="Consolas,monospace" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+2</text>
  <text x="313" y="261" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#D5F5E3">从缓存取出</text>

  <line x1="358" y1="248" x2="386" y2="248" stroke="#27AE60" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="386" y="230" width="90" height="36" fill="#1E8449" rx="5"/>
  <text x="431" y="249" font-family="Consolas,monospace" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Pkt #N+3</text>
  <text x="431" y="261" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="#D5F5E3">从缓存取出</text>

  <text x="550" y="252" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#1E8449">✓ 恢复正确顺序！</text>

  <!-- ===== Notes ===== -->
  <rect x="40" y="288" width="880" height="80" fill="#EEF0F5" rx="6" stroke="#DDD"/>
  <text x="480" y="306" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">设计细节</text>
  <text x="55" y="324" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● TotalOutOfOrderPacketsLost 达到 CVarNetPacketOrderCorrectionEnableThreshold（默认 4）时才开启缓存（避免过早启用增加内存消耗）
  </text>
  <text x="55" y="340" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 缓存容量由 CVarNetPacketOrderMaxCachedPackets 控制（RoundUpToPowerOfTwo），用循环数组（TCircularBuffer）实现
  </text>
  <text x="55" y="356" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 超出缓存范围的极乱序包直接放入最后一个 Slot（bLastCacheEntry=true），确保不丢失；若接收方已存在该序号则作为重复包丢弃
  </text>

  <!-- Drop scenario note -->
  <rect x="40" y="382" width="880" height="80" fill="#FADBD8" rx="6" stroke="#E74C3C"/>
  <text x="480" y="400" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#C0392B">无法恢复的情况：PacketSequenceDelta ≤ 0（包序号倒退）</text>
  <text x="55" y="418" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 若收到的序号 ≤ 已处理序号（过期重复包）→ TotalOutOfOrderPacketsLost++ → 直接丢弃，不入缓存
  </text>
  <text x="55" y="434" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 这是防重放攻击（Replay Attack）的关键：已处理过的序号不会再次执行 RPC，防止恶意重发旧指令
  </text>
  <text x="55" y="450" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 不可靠属性（Unreliable）丢失后直接放弃（下帧会有新值）；可靠包（Reliable Bunch）由 NumNaks 机制重发
  </text>
</svg>
