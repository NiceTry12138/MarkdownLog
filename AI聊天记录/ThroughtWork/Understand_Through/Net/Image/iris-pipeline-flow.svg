<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 870" width="700" height="870">
  <rect x="0" y="0" width="700" height="870" fill="#F8FAFC"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 Z" fill="#64748B"/>
    </marker>
  </defs>
  <!-- Title -->
  <rect x="0" y="0" width="700" height="44" fill="#1E293B"/>
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Iris 数据处理管线（服务端发送路径）</text>

  <!-- Phase 1: y=55 -->
  <rect x="90" y="55" width="520" height="72" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <rect x="90" y="55" width="44" height="72" rx="6" fill="#3B82F6"/>
  <text x="112" y="96" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">01</text>
  <text x="365" y="81" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E3A8A">属性脏标记（Push Model）</text>
  <text x="365" y="99" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1D4ED8">游戏逻辑调用 MARK_PROPERTY_DIRTY_FROM_NAME() → DirtyNetObjectTracker.MarkNetObjectDirty()</text>
  <text x="365" y="116" text-anchor="middle" font-family="monospace" font-size="10" fill="#3B82F6">FDirtyNetObjectTracker::AccumulatedDirtyNetObjects （FNetBitArray）</text>
  <!-- Arrow 1→2 -->
  <line x1="350" y1="129" x2="350" y2="148" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: y=150 -->
  <rect x="90" y="150" width="520" height="72" rx="6" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
  <rect x="90" y="150" width="44" height="72" rx="6" fill="#A855F7"/>
  <text x="112" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">02</text>
  <text x="365" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4A1772">预过滤 FilterPrePoll()</text>
  <text x="365" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B21A8">按 Group / Owner / 连接属性做 BitArray AND 运算，构建每连接 ObjectsInScope</text>
  <text x="365" y="211" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7">FReplicationFiltering::FilterPrePoll() → GetRelevantObjectsInScope(connId)</text>
  <!-- Arrow 2→3 -->
  <line x1="350" y1="224" x2="350" y2="243" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: y=245 -->
  <rect x="90" y="245" width="520" height="72" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <rect x="90" y="245" width="44" height="72" rx="6" fill="#F59E0B"/>
  <text x="112" y="286" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">03</text>
  <text x="365" y="271" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#78350F">轮询 + 量化  ObjectPoller::PollAndCopyObjects()</text>
  <text x="365" y="289" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">只对 AccumulatedDirtyObjects 置位对象调用 PreReplication()；Quantize() 每对象每帧仅一次</text>
  <text x="365" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97706">FObjectPoller + FNetSerializer::Quantize()（SourceType → QuantizedType POD）</text>
  <!-- Arrow 3→4 -->
  <line x1="350" y1="319" x2="350" y2="338" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 4: y=340 -->
  <rect x="90" y="340" width="520" height="72" rx="6" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
  <rect x="90" y="340" width="44" height="72" rx="6" fill="#A855F7"/>
  <text x="112" y="381" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">04</text>
  <text x="365" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4A1772">后过滤 FilterPostPoll()</text>
  <text x="365" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B21A8">基于世界位置（WorldLocations）做动态空间过滤（NetCullDistance 等），完成最终 Scope 列表</text>
  <text x="365" y="401" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7">FReplicationFiltering::FilterPostPoll()（fragment-based dynamic filters）</text>
  <!-- Arrow 4→5 -->
  <line x1="350" y1="414" x2="350" y2="433" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 5: y=435 -->
  <rect x="90" y="435" width="520" height="72" rx="6" fill="#DCFCE7" stroke="#10B981" stroke-width="2"/>
  <rect x="90" y="435" width="44" height="72" rx="6" fill="#10B981"/>
  <text x="112" y="476" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">05</text>
  <text x="365" y="461" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#14532D">批量优先级计算 Prioritize()</text>
  <text x="365" y="479" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#15803D">UNetObjectPrioritizer 批量处理；只对脏对象调用 NotifyPrioritizersOfDirtyObjects()</text>
  <text x="365" y="496" text-anchor="middle" font-family="monospace" font-size="10" fill="#10B981">FReplicationPrioritization::Prioritize() → TArray&lt;float&gt; Priorities per connection</text>
  <!-- Arrow 5→6 -->
  <line x1="350" y1="509" x2="350" y2="528" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 6: y=530 -->
  <rect x="90" y="530" width="520" height="72" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <rect x="90" y="530" width="44" height="72" rx="6" fill="#F97316"/>
  <text x="112" y="571" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">06</text>
  <text x="365" y="556" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7C2D12">调度写入 ReplicationWriter::Write()</text>
  <text x="365" y="574" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#C2410C">部分排序 Top-128（PartialSortObjectCount=128）；状态机 EReplicatedObjectState 推进</text>
  <text x="365" y="591" text-anchor="middle" font-family="monospace" font-size="10" fill="#F97316">FReplicationWriter（FWriteContext + FReplicationInfo 16字节/对象/连接）</text>
  <!-- Arrow 6→7 -->
  <line x1="350" y1="604" x2="350" y2="623" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 7: y=625 -->
  <rect x="90" y="625" width="520" height="72" rx="6" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <rect x="90" y="625" width="44" height="72" rx="6" fill="#EC4899"/>
  <text x="112" y="666" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">07</text>
  <text x="365" y="651" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#831843">Delta 压缩序列化 SerializeDelta()</text>
  <text x="365" y="669" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9D174D">对比 LastAckedBaselineIndex（0/1）的基线；相同值仅写 1 bit；差值走 FNetSerializer</text>
  <text x="365" y="686" text-anchor="middle" font-family="monospace" font-size="10" fill="#EC4899">FDeltaCompressionBaselineManager（MaxBaselineCount=2） + FNetSerializer::SerializeDelta()</text>
  <!-- Arrow 7→8 -->
  <line x1="350" y1="699" x2="350" y2="718" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 8: y=720 -->
  <rect x="90" y="720" width="520" height="72" rx="6" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <rect x="90" y="720" width="44" height="72" rx="6" fill="#0F172A"/>
  <text x="112" y="761" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#94A3B8">08</text>
  <text x="365" y="746" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">DataStream → FlushNet → UDP 发送</text>
  <text x="365" y="764" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94A3B8">FReplicationDataStream 写入 UDataStreamChannel；FlushNet() 提交平台 socket</text>
  <text x="365" y="781" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748B">UDataStreamChannel / FReplicationDataStream / UNetConnection::FlushNet()</text>

  <!-- Legend -->
  <rect x="90" y="808" width="520" height="50" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="350" y="827" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#475569">关键优化：Quantize 仅执行一次（Phase 03），结果供所有连接复用 → N 连接不重复量化</text>
  <text x="350" y="846" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748B">Phase 01-04 为全局阶段；Phase 05-08 为每连接阶段（并行执行潜力）</text>
</svg>