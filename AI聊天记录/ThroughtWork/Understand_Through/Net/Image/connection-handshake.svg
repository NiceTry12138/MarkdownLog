<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="900" height="680" fill="#F8FAFB" rx="8"/>
  <text x="450" y="30" font-family="Microsoft YaHei,sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">Client ↔ Dedicated Server 连接建立时序</text>

  <!-- ===== Timeline columns ===== -->
  <!-- Client column -->
  <rect x="60" y="50" width="160" height="40" fill="#2980B9" rx="6"/>
  <text x="140" y="75" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle" fill="white">Game Client</text>
  <line x1="140" y1="90" x2="140" y2="640" stroke="#2980B9" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Server column -->
  <rect x="680" y="50" width="160" height="40" fill="#C0392B" rx="6"/>
  <text x="760" y="75" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle" fill="white">Dedicated Server</text>
  <line x1="760" y1="90" x2="760" y2="640" stroke="#C0392B" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ===== Step boxes + arrows ===== -->
  <!-- Y positions for each step: 110, 170, 230, 290, 350, 410, 470, 530, 590 -->

  <!-- Step 1: InitConnect -->
  <rect x="60" y="108" width="160" height="36" fill="#D6EAF8" rx="5" stroke="#2980B9"/>
  <text x="140" y="124" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#1A5276">UIpNetDriver::InitConnect()</text>
  <text x="140" y="138" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">创建 Socket 并设为 USOCK_Pending</text>
  <!-- Arrow right -->
  <line x1="220" y1="126" x2="555" y2="155" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="145" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#2980B9">① 发送 Hello 包（Stateless 握手请求）</text>
  <text x="380" y="158" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">UDP 包：包含 ClientCookie，协议版本</text>

  <!-- Step 2: Server receives Hello, sends Challenge -->
  <rect x="680" y="170" width="160" height="36" fill="#FADBD8" rx="5" stroke="#C0392B"/>
  <text x="760" y="183" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#7B241C">ProcessConnectionlessPacket()</text>
  <text x="760" y="197" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">StatelessConnect 接收 Hello</text>
  <!-- Arrow left (challenge) -->
  <line x1="680" y1="194" x2="245" y2="215" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="450" y="210" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#C0392B">② 返回 Challenge 包（含随机 Cookie）</text>
  <text x="450" y="222" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">防 DDoS：客户端必须回应正确 Cookie</text>

  <!-- Step 3: Client sends Challenge Response -->
  <rect x="60" y="230" width="160" height="36" fill="#D6EAF8" rx="5" stroke="#2980B9"/>
  <text x="140" y="246" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#1A5276">StatelessConnectHandler</text>
  <text x="140" y="260" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">回复 Cookie（Challenge 应答）</text>
  <line x1="220" y1="248" x2="555" y2="277" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="268" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#2980B9">③ Challenge Response（HMAC 签名的 Cookie）</text>

  <!-- Step 4: Server creates UNetConnection -->
  <rect x="680" y="290" width="160" height="48" fill="#FADBD8" rx="5" stroke="#C0392B"/>
  <text x="760" y="305" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#7B241C">CreateNewConnection()</text>
  <text x="760" y="319" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">分配 UNetConnection 对象</text>
  <text x="760" y="331" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">USOCK_Pending → USOCK_Open</text>

  <!-- Step 5: Control Channel Hello NMT_Hello -->
  <line x1="680" y1="320" x2="245" y2="357" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="450" y="347" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#C0392B">④ NMT_Hello（Control Channel #0 打开）</text>
  <text x="450" y="360" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#888">包含协议版本、封包序号初始值</text>

  <!-- Step 6: Client replies NMT_Login -->
  <rect x="60" y="365" width="160" height="36" fill="#D6EAF8" rx="5" stroke="#2980B9"/>
  <text x="140" y="378" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#1A5276">ReceivedBunch(Control)</text>
  <text x="140" y="392" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">收到 NMT_Hello，回送登录信息</text>
  <line x1="220" y1="380" x2="555" y2="410" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="400" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#2980B9">⑤ NMT_Login（玩家名称、URL 参数）</text>

  <!-- Step 7: Server authenticates and welcomes -->
  <rect x="680" y="415" width="160" height="48" fill="#FADBD8" rx="5" stroke="#C0392B"/>
  <text x="760" y="430" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#7B241C">NotifyNewIncomingConnection()</text>
  <text x="760" y="444" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">验证登录 · 创建 PlayerController</text>
  <text x="760" y="458" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">发送 NMT_Welcome</text>
  <line x1="680" y1="440" x2="245" y2="477" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="450" y="470" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#C0392B">⑥ NMT_Welcome（地图名、游戏模式）</text>

  <!-- Step 8: Client loads map, sends NMT_NetSpeed + NMT_Join -->
  <rect x="60" y="487" width="160" height="36" fill="#D6EAF8" rx="5" stroke="#2980B9"/>
  <text x="140" y="500" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#1A5276">加载地图 · SetWorld()</text>
  <text x="140" y="514" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">客户端加载关卡完成</text>
  <line x1="220" y1="502" x2="555" y2="530" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="523" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#2980B9">⑦ NMT_Join（加入游戏请求）</text>

  <!-- Step 9: Connection fully open, replication begins -->
  <rect x="60" y="545" width="160" height="36" fill="#D5F5E3" rx="5" stroke="#1E8449"/>
  <text x="140" y="559" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#145A32">USOCK_Open ✓</text>
  <text x="140" y="573" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">开始接收 Actor 数据</text>

  <rect x="680" y="545" width="160" height="36" fill="#D5F5E3" rx="5" stroke="#1E8449"/>
  <text x="760" y="559" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#145A32">连接完全建立 ✓</text>
  <text x="760" y="573" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">ServerReplicateActors() 开始发 Actor</text>

  <!-- Double arrow between them -->
  <line x1="220" y1="563" x2="680" y2="563" stroke="#1E8449" stroke-width="2" marker-end="url(#arr)"/>
  <text x="450" y="557" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="#1E8449">⑧ 正常同步数据流（Unreliable/Reliable Bunches）</text>

  <!-- Disconnect note -->
  <rect x="270" y="600" width="360" height="50" fill="#FFF9C4" rx="6" stroke="#F9A825"/>
  <text x="450" y="616" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#7D6608">断开连接</text>
  <text x="450" y="632" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#7D6608">任意一方调用 UNetConnection::Close() → 发 NMT_Goodbye</text>
  <text x="450" y="645" font-family="Microsoft YaHei,sans-serif" font-size="10"
        text-anchor="middle" fill="#7D6608">或心跳超时（LastReceiveTime 超过 Timeout 阈值）→ 自动关闭</text>
</svg>
