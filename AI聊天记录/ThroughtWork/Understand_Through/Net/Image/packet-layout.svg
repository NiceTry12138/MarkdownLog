<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <rect width="980" height="420" fill="#F8FAFB" rx="8"/>
  <text x="490" y="28" font-family="Microsoft YaHei,sans-serif" font-size="17" font-weight="bold"
        text-anchor="middle" fill="#1A1A2E">UDP 数据包内存布局（出方向，位流视图）</text>

  <!-- ===== Packet outer border ===== -->
  <rect x="20" y="50" width="940" height="90" fill="none" stroke="#333" stroke-width="2" rx="4"/>
  <text x="30" y="70" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555" font-weight="bold">UDP Payload（一个物理数据包，最大 ~1400 字节）</text>

  <!-- Segment 1: Packet Header (PacketNotify) -->
  <!-- Start at x=20, segments fill the 940px width proportionally -->
  <!-- Header ~40 bits, AckBits ~32 bits, PacketInfo ~12 bits, Bunches variable, Terminator 1 bit -->
  <!-- Let's use fixed widths: Header=120, AckHistory=110, PacketInfo=90, BunchA=200, BunchB=180, BunchC=150, Pad=90 -->
  
  <!-- Header segment: x=20, w=120 -->
  <rect x="20" y="90" width="120" height="50" fill="#2980B9" rx="3"/>
  <text x="80" y="111" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">包头</text>
  <text x="80" y="127" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#D6EAF8">OutSeq + InSeq</text>

  <!-- AckHistory: x=140, w=110 -->
  <rect x="140" y="90" width="110" height="50" fill="#1A5276" rx="3"/>
  <text x="195" y="111" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">AckHistory</text>
  <text x="195" y="127" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#AED6F1">256-bit 位图</text>

  <!-- PacketInfo/Jitter: x=250, w=90 -->
  <rect x="250" y="90" width="90" height="50" fill="#2471A3" rx="3"/>
  <text x="295" y="111" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">PacketInfo</text>
  <text x="295" y="127" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#AED6F1">Jitter 时钟</text>

  <!-- Bunch 1 (Actor X): x=340, w=200 -->
  <rect x="340" y="90" width="200" height="50" fill="#E67E22" rx="3"/>
  <text x="440" y="108" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Bunch（Actor #1）</text>
  <text x="440" y="122" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#FDEBD0">BunchHeader | ChIndex | Payload</text>
  <text x="440" y="134" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#FDEBD0">属性 delta 数据</text>

  <!-- Bunch 2 (Actor Y): x=540, w=160 -->
  <rect x="540" y="90" width="160" height="50" fill="#D35400" rx="3"/>
  <text x="620" y="108" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Bunch（Actor #2）</text>
  <text x="620" y="122" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#FDEBD0">BunchHeader | ChIndex | Payload</text>
  <text x="620" y="134" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#FDEBD0">属性 delta 数据</text>

  <!-- Bunch 3 (partial): x=700, w=160 -->
  <rect x="700" y="90" width="160" height="50" fill="#7D3C98" rx="3"/>
  <text x="780" y="108" font-family="Microsoft YaHei,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Partial Bunch [1/3]</text>
  <text x="780" y="122" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#E8DAEF">bPartial=1, bPartialInitial=1</text>
  <text x="780" y="134" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#E8DAEF">大 Actor 的第一分片</text>

  <!-- Terminator bit: x=860, w=30 -->
  <rect x="860" y="90" width="30" height="50" fill="#555" rx="3"/>
  <text x="875" y="111" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">1</text>
  <text x="875" y="127" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#DDD">终止</text>

  <!-- Padding: x=890 -->
  <rect x="890" y="90" width="70" height="50" fill="#BDC3C7" rx="3" opacity="0.6"/>
  <text x="925" y="111" font-family="Microsoft YaHei,sans-serif" font-size="10" text-anchor="middle" fill="#555">填充位</text>
  <text x="925" y="127" font-family="Microsoft YaHei,sans-serif" font-size="9" text-anchor="middle" fill="#777">字节对齐</text>

  <!-- Bit count labels below -->
  <text x="80" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#2980B9">~14 bits</text>
  <text x="195" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#1A5276">256 bits</text>
  <text x="295" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#2471A3">~12 bits</text>
  <text x="440" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#E67E22">可变长</text>
  <text x="620" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#D35400">可变长</text>
  <text x="780" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#7D3C98">最大 ~11200 bits</text>
  <text x="875" y="155" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="#555">1 bit</text>

  <!-- ===== Bunch header zoom-in ===== -->
  <text x="490" y="185" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#333">Bunch 头部字段分解（FInBunch / FOutBunch）</text>

  <!-- Bunch header fields, y=200 -->
  <!-- 14 fields, each ~62px wide, total = 868px, start at x=60 -->
  <!-- Fields: bControl(1) bOpen(1) bClose(1) CloseReason(4) bReliable(1) ChIndex(var) bHasPkgMapExports(1) bHasMustBeGUIDs(1) bPartial(1) ChSequence(var) bPartialInitial(1) bPartialFinal(1) ChName(var) Payload -->

  <!-- Row 2: Bunch header segments -->
  <rect x="20" y="200" width="940" height="50" fill="none" stroke="#AAA" stroke-width="1.5" rx="4"/>

  <!-- individual cells x positions: 20,66,112,158,222,268,314,378,424,470,516,562,608,672,920 -->
  <!-- widths:                         46, 46, 46, 64, 46, 46, 64, 46, 46, 46, 46, 46, 64,248 -->

  <rect x="20"  y="200" width="45"  height="50" fill="#C0392B" rx="2"/>
  <text x="42"  y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bControl</text>
  <text x="42"  y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">1 bit</text>
  <text x="42"  y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">有控制位?</text>

  <rect x="65"  y="200" width="45"  height="50" fill="#E74C3C" rx="2"/>
  <text x="87"  y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bOpen</text>
  <text x="87"  y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">cond.</text>
  <text x="87"  y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">首包?</text>

  <rect x="110" y="200" width="45"  height="50" fill="#E74C3C" rx="2"/>
  <text x="132" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bClose</text>
  <text x="132" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">cond.</text>
  <text x="132" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">关闭?</text>

  <rect x="155" y="200" width="60"  height="50" fill="#C0392B" rx="2"/>
  <text x="185" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">CloseReason</text>
  <text x="185" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">4 bits</text>
  <text x="185" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FADBD8">关闭原因</text>

  <rect x="215" y="200" width="50"  height="50" fill="#8E44AD" rx="2"/>
  <text x="240" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bReliable</text>
  <text x="240" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#F4ECF7">1 bit</text>
  <text x="240" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#F4ECF7">可靠?</text>

  <rect x="265" y="200" width="65"  height="50" fill="#6C3483" rx="2"/>
  <text x="297" y="219" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">ChIndex</text>
  <text x="297" y="232" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#E8DAEF">SerializeIntPacked</text>
  <text x="297" y="245" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#E8DAEF">通道编号</text>

  <rect x="330" y="200" width="60"  height="50" fill="#1A8F5B" rx="2"/>
  <text x="360" y="219" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bHasPkgMap</text>
  <text x="360" y="232" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D5F5E3">Exports</text>
  <text x="360" y="245" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D5F5E3">有 GUID?</text>

  <rect x="390" y="200" width="60"  height="50" fill="#1E8449" rx="2"/>
  <text x="420" y="219" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bMustBeMapped</text>
  <text x="420" y="232" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D5F5E3">GUIDs</text>
  <text x="420" y="245" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D5F5E3">必须映射?</text>

  <rect x="450" y="200" width="45"  height="50" fill="#2E86C1" rx="2"/>
  <text x="472" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartial</text>
  <text x="472" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">1 bit</text>
  <text x="472" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">分片?</text>

  <rect x="495" y="200" width="60"  height="50" fill="#1A5276" rx="2"/>
  <text x="525" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">ChSequence</text>
  <text x="525" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#AED6F1">ReadInt</text>
  <text x="525" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#AED6F1">可靠序号</text>

  <rect x="555" y="200" width="55"  height="50" fill="#2E86C1" rx="2"/>
  <text x="582" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartialInit</text>
  <text x="582" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">cond.</text>
  <text x="582" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">首分片?</text>

  <rect x="610" y="200" width="55"  height="50" fill="#2874A6" rx="2"/>
  <text x="637" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">bPartialFinal</text>
  <text x="637" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">cond.</text>
  <text x="637" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D6EAF8">末分片?</text>

  <rect x="665" y="200" width="65"  height="50" fill="#117A65" rx="2"/>
  <text x="697" y="222" font-family="Consolas,monospace" font-size="9" text-anchor="middle" fill="white">ChName</text>
  <text x="697" y="235" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D1F2EB">可变长 FName</text>
  <text x="697" y="246" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#D1F2EB">通道类型名</text>

  <rect x="730" y="200" width="230" height="50" fill="#F39C12" rx="2"/>
  <text x="845" y="219" font-family="Consolas,monospace" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Payload（有效载荷）</text>
  <text x="845" y="232" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FEF9E7">Actor 属性值 + RPC 调用数据 + 子对象数据</text>
  <text x="845" y="245" font-family="Consolas,monospace" font-size="8" text-anchor="middle" fill="#FEF9E7">由 FRepLayout::SendProperties() 写入</text>

  <!-- Note -->
  <rect x="20" y="265" width="940" height="60" fill="#EEF0F5" rx="6" stroke="#DDD"/>
  <text x="490" y="282" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#333">关键设计要点</text>
  <text x="30" y="298" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ① 一个 UDP 包（SendBuffer）可以携带多个 Bunch——这叫"Bunch 合并"，减少每帧发送的 UDP 包数量，降低网络开销
  </text>
  <text x="30" y="314" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ② 包头中的 OutSeq / AckHistory 字段实现了 UE 自己的可靠性保证机制（类似 TCP，但基于 UDP 实现，可按需使用）
  </text>

  <!-- Size note -->
  <rect x="20" y="338" width="940" height="68" fill="#FFF9C4" rx="6" stroke="#F9A825"/>
  <text x="490" y="355" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#7D6608">数据大小限制</text>
  <text x="30" y="370" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● MAX_SINGLE_BUNCH_SIZE_BITS = Connection::GetMaxSingleBunchSizeBits()  ≈ 11200 bits（约 1400 字节，MTU 友好）
  </text>
  <text x="30" y="385" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 若 Bunch 超过此限制 → UChannel::SendBunch() 自动拆分为 PartialBunch（bPartial=1, bPartialInitial/bPartialFinal 标记首尾）
  </text>
  <text x="30" y="400" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#555">
    ● 整个构建好的 Bunch（含拆分前）不得超过 NetMaxConstructedPartialBunchSizeBytes（默认 ~256KB）否则报错丢弃
  </text>
</svg>
