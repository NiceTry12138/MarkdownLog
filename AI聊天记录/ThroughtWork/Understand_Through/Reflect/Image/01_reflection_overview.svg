<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1E293B">UE 反射系统总览：从源代码到运行时</text>

  <!-- Phase 1: Developer writes C++ -->
  <rect x="20" y="55" width="230" height="160" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1D4ED8">① 开发者写代码（源文件）</text>
  <rect x="35" y="88" width="200" height="115" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="45" y="108" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">UCLASS()</text>
  <text x="45" y="124" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">class APatrolNPC</text>
  <text x="45" y="140" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">  : public ACharacter {</text>
  <text x="45" y="156" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">  GENERATED_BODY()</text>
  <text x="45" y="172" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">  UPROPERTY() float Speed;</text>
  <text x="45" y="188" font-family="Consolas,monospace" font-size="11" fill="#1E3A5F">  UFUNCTION() void Attack();</text>

  <!-- Arrow 1->2 -->
  <line x1="250" y1="135" x2="295" y2="135" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="272" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#2563EB">UHT</text>

  <!-- Phase 2: UHT generates code -->
  <rect x="295" y="55" width="230" height="160" rx="8" fill="#D1FAE5" stroke="#16A34A" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#15803D">② UHT生成文件</text>
  <rect x="310" y="88" width="200" height="55" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="320" y="106" font-family="Arial" font-size="11" font-weight="bold" fill="#166534">MyClass.generated.h</text>
  <text x="320" y="124" font-family="Consolas,monospace" font-size="10" fill="#166534">/* GENERATED_BODY宏的具体内容 */</text>
  <text x="320" y="138" font-family="Consolas,monospace" font-size="10" fill="#166534">StaticClass(), __DefaultConstructor</text>
  <rect x="310" y="152" width="200" height="53" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="320" y="170" font-family="Arial" font-size="11" font-weight="bold" fill="#166534">MyClass.gen.cpp</text>
  <text x="320" y="188" font-family="Consolas,monospace" font-size="10" fill="#166534">IMPLEMENT_CLASS(APatrolNPC,...)</text>
  <text x="320" y="200" font-family="Consolas,monospace" font-size="10" fill="#166534">Z_Construct_UClass_APatrolNPC()</text>

  <!-- Arrow 2->3 -->
  <line x1="525" y1="135" x2="570" y2="135" stroke="#16A34A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="547" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#16A34A">编译</text>

  <!-- Phase 3: Runtime UClass -->
  <rect x="570" y="55" width="310" height="160" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="725" y="78" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#B45309">③ 运行时反射数据（内存）</text>
  <!-- UClass box -->
  <rect x="585" y="88" width="280" height="118" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="725" y="106" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#92400E">UClass (APatrolNPC)</text>
  <line x1="585" y1="110" x2="865" y2="110" stroke="#FCD34D" stroke-width="1"/>
  <text x="595" y="126" font-family="Consolas,monospace" font-size="10" fill="#78350F">FuncMap["Attack"] → UFunction*</text>
  <text x="595" y="142" font-family="Consolas,monospace" font-size="10" fill="#78350F">ChildProperties → FFloatProperty*</text>
  <text x="595" y="158" font-family="Consolas,monospace" font-size="10" fill="#78350F">SuperStruct → UClass(ACharacter)</text>
  <text x="595" y="174" font-family="Consolas,monospace" font-size="10" fill="#78350F">ClassDefaultObject → CDO实例</text>
  <text x="595" y="190" font-family="Consolas,monospace" font-size="10" fill="#78350F">ClassConstructor → 构造函数指针</text>

  <!-- Section 2: The Object Instance -->
  <rect x="20" y="250" width="380" height="230" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="210" y="273" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6D28D9">APatrolNPC 的实例（内存布局）</text>

  <!-- UObjectBase fields -->
  <rect x="35" y="282" width="350" height="30" rx="4" fill="#7C3AED"/>
  <text x="210" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="white">UObjectBase 字段</text>
  <rect x="35" y="312" width="350" height="20" rx="2" fill="#EDE9FE"/>
  <text x="210" y="327" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#4C1D95">ClassPrivate → UClass*(APatrolNPC) 指向上方的UClass</text>
  <rect x="35" y="332" width="350" height="20" rx="2" fill="#EDE9FE"/>
  <text x="210" y="347" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#4C1D95">NamePrivate = "PatrolNPC_1"    OuterPrivate → ULevel*</text>
  <rect x="35" y="352" width="350" height="20" rx="2" fill="#EDE9FE"/>
  <text x="210" y="367" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#4C1D95">InternalIndex → GUObjectArray中的索引</text>

  <!-- ACharacter data -->
  <rect x="35" y="375" width="350" height="30" rx="4" fill="#8B5CF6"/>
  <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="white">继承自 ACharacter 的字段（省略）</text>

  <!-- APatrolNPC own data -->
  <rect x="35" y="408" width="350" height="30" rx="4" fill="#A78BFA"/>
  <text x="210" y="428" text-anchor="middle" font-family="Arial" font-size="11" fill="white">APatrolNPC 自己的字段</text>
  <rect x="35" y="438" width="350" height="22" rx="2" fill="#EDE9FE"/>
  <text x="210" y="454" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#4C1D95">float Speed; (offset=某个数值, 由FProperty.Offset_Internal记录)</text>
  <rect x="35" y="460" width="350" height="12" rx="2" fill="#C4B5FD"/>
  <text x="210" y="470" text-anchor="middle" font-family="Arial" font-size="9" fill="#4C1D95">...Attack()函数代码段独立存在，不在实例内存中...</text>

  <!-- Section 3: FProperty/UFunction -->
  <rect x="450" y="250" width="430" height="230" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="665" y="273" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#BE123C">反射元数据节点（详情）</text>

  <!-- FProperty -->
  <rect x="465" y="282" width="190" height="110" rx="4" fill="#FECDD3" stroke="#FDA4AF" stroke-width="1"/>
  <text x="560" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9F1239">FFloatProperty (Speed)</text>
  <line x1="465" y1="302" x2="655" y2="302" stroke="#FDA4AF" stroke-width="1"/>
  <text x="475" y="316" font-family="Consolas,monospace" font-size="10" fill="#881337">Offset_Internal = 384</text>
  <text x="475" y="332" font-family="Consolas,monospace" font-size="10" fill="#881337">ElementSize = 4</text>
  <text x="475" y="348" font-family="Consolas,monospace" font-size="10" fill="#881337">PropertyFlags = CPF_Edit|</text>
  <text x="475" y="360" font-family="Consolas,monospace" font-size="10" fill="#881337">  CPF_BlueprintVisible</text>
  <text x="475" y="376" font-family="Consolas,monospace" font-size="10" fill="#881337">Next → (下一个FProperty)</text>

  <!-- UFunction -->
  <rect x="665" y="282" width="200" height="110" rx="4" fill="#FECDD3" stroke="#FDA4AF" stroke-width="1"/>
  <text x="765" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9F1239">UFunction (Attack)</text>
  <line x1="665" y1="302" x2="865" y2="302" stroke="#FDA4AF" stroke-width="1"/>
  <text x="675" y="316" font-family="Consolas,monospace" font-size="10" fill="#881337">FunctionFlags = FUNC_Native|</text>
  <text x="675" y="328" font-family="Consolas,monospace" font-size="10" fill="#881337">  FUNC_BlueprintCallable</text>
  <text x="675" y="344" font-family="Consolas,monospace" font-size="10" fill="#881337">NumParms = 0</text>
  <text x="675" y="360" font-family="Consolas,monospace" font-size="10" fill="#881337">ReturnValueOffset = 0</text>
  <text x="675" y="376" font-family="Consolas,monospace" font-size="10" fill="#881337">Func → &amp;APatrolNPC::Attack</text>

  <!-- Runtime use example -->
  <rect x="465" y="400" width="400" height="70" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="665" y="418" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C2410C">运行时访问示例</text>
  <text x="475" y="436" font-family="Consolas,monospace" font-size="10" fill="#7C2D12">FProperty* p = Obj-&gt;GetClass()-&gt;FindPropertyByName("Speed");</text>
  <text x="475" y="452" font-family="Consolas,monospace" font-size="10" fill="#7C2D12">float* v = p-&gt;ContainerPtrToValuePtr&lt;float&gt;(Obj); // = Obj+offset</text>
  <text x="475" y="464" font-family="Consolas,monospace" font-size="10" fill="#7C2D12">Obj-&gt;ProcessEvent(Func, Params);  // 调用UFunction</text>

  <!-- Connecting arrow: instance ClassPrivate -> UClass box -->
  <line x1="385" y1="320" x2="570" y2="140" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="510" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#6D28D9">ClassPrivate指向</text>
</svg>
