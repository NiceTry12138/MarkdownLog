<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="560" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" font-family="Arial,sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">PAK 文件二进制布局（File Binary Layout）</text>
  <text x="450" y="52" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#666">数据从文件头到文件尾依次排列，FPakInfo 在文件末尾（Trailer）</text>

  <!-- ===== Left: PAK File Block ===== -->
  <text x="30" y="88" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">PAK 文件整体结构</text>

  <!-- File offset label -->
  <text x="30" y="106" font-family="Arial,sans-serif" font-size="11" fill="#888">偏移 0</text>

  <!-- File Data Blocks -->
  <rect x="30" y="112" width="280" height="44" fill="#4a90d9" rx="4"/>
  <text x="170" y="132" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">文件数据区（File Payloads）</text>
  <text x="170" y="148" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#d0e8ff">每个文件的实际数据（可压缩/加密）连续写入</text>

  <!-- Individual file entries within data block -->
  <rect x="30" y="162" width="82" height="34" fill="#357abd" rx="3"/>
  <text x="71" y="181" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white">File 1 Data</text>
  <text x="71" y="193" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cde">(Offset₁, Size₁)</text>

  <rect x="116" y="162" width="82" height="34" fill="#357abd" rx="3"/>
  <text x="157" y="181" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white">File 2 Data</text>
  <text x="157" y="193" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cde">(Offset₂, Size₂)</text>

  <rect x="202" y="162" width="82" height="34" fill="#357abd" rx="3"/>
  <text x="243" y="181" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white">File N Data</text>
  <text x="243" y="193" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cde">(OffsetN, SizeN)</text>

  <!-- dots between file 2 and N -->
  <text x="173" y="183" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="#aaa">···</text>

  <!-- Primary Index -->
  <rect x="30" y="202" width="280" height="50" fill="#27ae60" rx="4"/>
  <text x="170" y="222" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Primary Index（主索引）</text>
  <text x="170" y="238" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#cef">MountPoint | NumEntries | PathHashSeed | EncodedPakEntries | NonEncodableEntries</text>
  <text x="170" y="250" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#cef">SecondaryIndex 的位置占位符（Offset/Size/Hash）</text>

  <!-- Path Hash Index -->
  <rect x="30" y="258" width="280" height="46" fill="#8e44ad" rx="4"/>
  <text x="170" y="277" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">PathHashIndex（路径哈希索引）</text>
  <text x="170" y="293" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#e8d8ff">TMap&lt;uint64(path_hash), FPakEntryLocation&gt; + PrunedDirectoryIndex</text>
  <text x="170" y="305" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#e8d8ff">用于发行版（Shipping），内存占用小</text>

  <!-- Full Directory Index -->
  <rect x="30" y="310" width="280" height="46" fill="#e67e22" rx="4"/>
  <text x="170" y="329" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">FullDirectoryIndex（完整目录索引）</text>
  <text x="170" y="345" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#ffe8cc">TMap&lt;DirPath, TMap&lt;FileName, FPakEntryLocation&gt;&gt;</text>
  <text x="170" y="357" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#ffe8cc">用于开发工具，支持完整目录遍历</text>

  <!-- FPakInfo Footer -->
  <rect x="30" y="362" width="280" height="64" fill="#c0392b" rx="4"/>
  <text x="170" y="382" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">FPakInfo（文件尾/Trailer）</text>
  <text x="170" y="398" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#fdd">Magic(4B) | Version(4B) | IndexOffset(8B) | IndexSize(8B)</text>
  <text x="170" y="412" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#fdd">IndexHash(20B) | bEncryptedIndex(1B) | EncryptionKeyGuid(16B)</text>
  <text x="170" y="424" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#fdd">CompressionMethods(5×32B) = Magic: 0x5A6F12E1</text>

  <!-- ===== Right: FPakEntry Detail ===== -->
  <text x="370" y="88" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">每个文件的元数据：FPakEntry（存储在索引区）</text>

  <rect x="370" y="95" width="500" height="220" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>

  <!-- FPakEntry fields -->
  <!-- Field rows -->
  <rect x="380" y="105" width="160" height="28" fill="#4a90d9" rx="3"/>
  <text x="460" y="123" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">Offset（int64, 8B）</text>

  <rect x="548" y="105" width="312" height="28" fill="#eaf4ff" rx="3" stroke="#4a90d9" stroke-width="1"/>
  <text x="704" y="119" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">该文件数据在 PAK 中的字节偏移量</text>
  <text x="704" y="131" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#888">（指向 File Data 区中该文件的起始位置）</text>

  <rect x="380" y="137" width="160" height="28" fill="#27ae60" rx="3"/>
  <text x="460" y="155" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">Size（int64, 8B）</text>

  <rect x="548" y="137" width="312" height="28" fill="#efffef" rx="3" stroke="#27ae60" stroke-width="1"/>
  <text x="704" y="151" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">序列化（磁盘）上的大小（可能是压缩后）</text>
  <text x="704" y="163" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#888">压缩时 Size &lt; UncompressedSize</text>

  <rect x="380" y="169" width="160" height="28" fill="#27ae60" rx="3"/>
  <text x="460" y="187" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">UncompressedSize（8B）</text>

  <rect x="548" y="169" width="312" height="28" fill="#efffef" rx="3" stroke="#27ae60" stroke-width="1"/>
  <text x="704" y="183" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">原始（解压后）文件字节数</text>
  <text x="704" y="195" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#888">加载进内存后的真实大小</text>

  <rect x="380" y="201" width="160" height="28" fill="#e67e22" rx="3"/>
  <text x="460" y="219" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">Hash（SHA1, 20B）</text>

  <rect x="548" y="201" width="312" height="28" fill="#fff8ee" rx="3" stroke="#e67e22" stroke-width="1"/>
  <text x="704" y="219" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">原始数据的 SHA1，用于校验数据完整性</text>

  <rect x="380" y="233" width="160" height="28" fill="#8e44ad" rx="3"/>
  <text x="460" y="247" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">CompressionMethodIndex</text>
  <text x="460" y="259" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#e8d8ff">（uint32, 4B）</text>

  <rect x="548" y="233" width="312" height="28" fill="#f5eeff" rx="3" stroke="#8e44ad" stroke-width="1"/>
  <text x="704" y="251" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">0=不压缩, 1=Zlib, 2=Gzip, 3=Oodle</text>

  <rect x="380" y="265" width="160" height="28" fill="#c0392b" rx="3"/>
  <text x="460" y="279" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">Flags（uint8, 1B）</text>
  <text x="460" y="291" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#fdd">（0x01=加密, 0x02=删除记录）</text>

  <rect x="548" y="265" width="312" height="28" fill="#fff0ef" rx="3" stroke="#c0392b" stroke-width="1"/>
  <text x="704" y="283" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">标记位：Encrypted / Deleted</text>

  <rect x="380" y="297" width="160" height="16" fill="#357abd" rx="3"/>
  <text x="460" y="309" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">CompressionBlocks[]（变长）</text>

  <rect x="548" y="297" width="312" height="16" fill="#eaf4ff" rx="3" stroke="#4a90d9" stroke-width="1"/>
  <text x="704" y="309" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#555">每个 64KB 压缩块的起止偏移（仅压缩时存在）</text>

  <!-- ===== Bottom: FPakInfo detail ===== -->
  <text x="370" y="350" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">FPakInfo 字段详解（文件末尾 Trailer）</text>

  <rect x="370" y="358" width="500" height="170" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>

  <!-- FPakInfo fields layout -->
  <rect x="378" y="366" width="60" height="26" fill="#c0392b" rx="3"/>
  <text x="408" y="383" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">KeyGuid</text>
  <text x="408" y="392" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">16B</text>

  <rect x="442" y="366" width="40" height="26" fill="#c0392b" rx="3"/>
  <text x="462" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">Enc</text>
  <text x="462" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">1B</text>

  <rect x="486" y="366" width="50" height="26" fill="#c0392b" rx="3"/>
  <text x="511" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">Magic</text>
  <text x="511" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">4B</text>

  <rect x="540" y="366" width="50" height="26" fill="#c0392b" rx="3"/>
  <text x="565" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">Version</text>
  <text x="565" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">4B</text>

  <rect x="594" y="366" width="68" height="26" fill="#c0392b" rx="3"/>
  <text x="628" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">IndexOffset</text>
  <text x="628" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">8B</text>

  <rect x="666" y="366" width="60" height="26" fill="#c0392b" rx="3"/>
  <text x="696" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">IndexSize</text>
  <text x="696" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">8B</text>

  <rect x="730" y="366" width="130" height="26" fill="#c0392b" rx="3"/>
  <text x="795" y="381" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">IndexHash（SHA1）</text>
  <text x="795" y="391" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#fcc">20B</text>

  <!-- CompressionMethods row -->
  <rect x="378" y="396" width="480" height="26" fill="#8e44ad" rx="3"/>
  <text x="618" y="414" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white">CompressionMethods: 5 × 32 字节 ANSI 字符串 = 160B（"None","Zlib","Gzip","Oodle","..."）</text>

  <!-- Explanation text -->
  <text x="380" y="438" font-family="Arial,sans-serif" font-size="11" fill="#333">UE 读取 PAK 时从文件末尾开始：</text>
  <text x="380" y="455" font-family="Arial,sans-serif" font-size="11" fill="#555">① 倒推 sizeof(FPakInfo) 字节，Seek 到该位置</text>
  <text x="380" y="471" font-family="Arial,sans-serif" font-size="11" fill="#555">② 读取并验证 Magic = 0x5A6F12E1，确认这是有效 PAK</text>
  <text x="380" y="487" font-family="Arial,sans-serif" font-size="11" fill="#555">③ 获取 IndexOffset 和 IndexSize，Seek 到索引区</text>
  <text x="380" y="503" font-family="Arial,sans-serif" font-size="11" fill="#555">④ 读取并解密索引（若 bEncryptedIndex=1），用 IndexHash 校验完整性</text>
  <text x="380" y="519" font-family="Arial,sans-serif" font-size="11" fill="#555">⑤ 解析 PathHashIndex / DirectoryIndex，建立内存中的文件路径→位置映射表</text>

  <!-- Arrows from FPakInfo to annotations -->
  <line x1="628" y1="392" x2="628" y2="438" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="560" y="449" font-family="Arial,sans-serif" font-size="10" fill="#888">IndexOffset 指向 Primary Index 的起始位置</text>

</svg>
