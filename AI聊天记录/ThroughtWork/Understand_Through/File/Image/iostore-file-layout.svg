<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680">
  <rect x="0" y="0" width="1000" height="680" fill="#f8f9fa" rx="8"/>
  <text x="500" y="30" font-family="Arial,sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1a1a2e">IoStore 文件布局：.utoc（目录）+ .ucas（数据）</text>
  <text x="500" y="50" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#666">源码：Engine/Source/Runtime/Core/Internal/IO/IoStore.h  FIoStoreTocHeader / FIoStoreTocResource</text>

  <!-- ===== .utoc file ===== -->
  <text x="60" y="76" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">① xxxx.utoc（Table of Contents，目录索引文件）</text>

  <!-- utoc header -->
  <rect x="60" y="84" width="420" height="46" fill="#2980b9" rx="4"/>
  <text x="270" y="103" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">FIoStoreTocHeader（固定大小头部）</text>
  <text x="270" y="119" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#d0e8ff">TocMagic(16B) | Version(1B) | TocEntryCount | TocCompressedBlockEntryCount | CompressionBlockSize</text>
  <text x="270" y="129" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#d0e8ff">ContainerId | EncryptionKeyGuid | ContainerFlags | PartitionCount | PartitionSize</text>

  <!-- ChunkIds array -->
  <rect x="60" y="134" width="420" height="36" fill="#27ae60" rx="4"/>
  <text x="270" y="152" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">ChunkIds[]（FIoChunkId 数组，每个 12B）</text>
  <text x="270" y="166" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#cef">每个 Chunk 的唯一标识：PackageId(8B) + ChunkIndex(2B) + ChunkType(1B) + padding</text>

  <!-- ChunkOffsetLengths -->
  <rect x="60" y="174" width="420" height="36" fill="#16a085" rx="4"/>
  <text x="270" y="192" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">ChunkOffsetLengths[]（FIoOffsetAndLength 数组，每个 10B）</text>
  <text x="270" y="206" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#cef">每个 Chunk 在 .ucas 分区中的偏移（40位）和长度（24位）</text>

  <!-- CompressionBlocks -->
  <rect x="60" y="214" width="420" height="36" fill="#8e44ad" rx="4"/>
  <text x="270" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CompressionBlocks[]（FIoStoreTocCompressedBlockEntry 数组，每个 12B）</text>
  <text x="270" y="246" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#e8d8ff">压缩块：Offset(40位) | CompressedSize(24位) | UncompressedSize(24位) | CompressionMethodIndex(8位)</text>

  <!-- CompressionMethodNames -->
  <rect x="60" y="254" width="420" height="30" fill="#e67e22" rx="4"/>
  <text x="270" y="270" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">CompressionMethodNames（N × 32B ANSI 字符串）</text>
  <text x="270" y="282" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#fcc">例如："None","Oodle","Zlib" 等压缩算法名称</text>

  <!-- PerfectHashSeeds -->
  <rect x="60" y="288" width="420" height="28" fill="#c0392b" rx="4"/>
  <text x="270" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">ChunkPerfectHashSeeds[]（可选，用于完美哈希快速查找）</text>

  <!-- DirectoryIndex -->
  <rect x="60" y="320" width="420" height="36" fill="#2c3e50" rx="4"/>
  <text x="270" y="338" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">DirectoryIndex（可选，目录字符串索引）</text>
  <text x="270" y="354" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="#aec">虚拟路径目录结构 → ChunkId 的映射（用于调试/编辑器模式）</text>

  <!-- ChunkBlockSignatures -->
  <rect x="60" y="360" width="420" height="28" fill="#1a5276" rx="4"/>
  <text x="270" y="380" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">ChunkBlockSignatures[]（可选，每块签名用于完整性校验）</text>

  <!-- ===== .ucas file ===== -->
  <text x="510" y="76" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">② xxxx.ucas（数据文件，分区存储）</text>

  <!-- Partition 0 -->
  <rect x="510" y="84" width="460" height="22" fill="#2980b9" rx="3"/>
  <text x="740" y="99" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">分区 0（xxxx.ucas）—— 最多 PartitionSize 字节</text>

  <rect x="510" y="110" width="100" height="56" fill="#27ae60" rx="3"/>
  <text x="560" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Chunk 0</text>
  <text x="560" y="144" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cef">压缩块 0</text>
  <text x="560" y="156" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cef">压缩块 1</text>
  <text x="560" y="165" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cef">...</text>

  <rect x="614" y="110" width="100" height="56" fill="#16a085" rx="3"/>
  <text x="664" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Chunk 1</text>
  <text x="664" y="144" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cef">压缩块 0</text>
  <text x="664" y="156" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#cef">压缩块 1</text>

  <rect x="718" y="110" width="60" height="56" fill="#555" rx="3"/>
  <text x="748" y="143" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#aaa">···</text>

  <rect x="782" y="110" width="100" height="56" fill="#8e44ad" rx="3"/>
  <text x="832" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Chunk N</text>
  <text x="832" y="144" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#e8d8ff">压缩块 0</text>
  <text x="832" y="156" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#e8d8ff">···</text>

  <!-- Partition 1 (split) -->
  <rect x="510" y="172" width="460" height="22" fill="#c0392b" rx="3"/>
  <text x="740" y="187" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">分区 1（xxxx_s1.ucas）—— 超过 PartitionSize 后自动分文件</text>

  <rect x="510" y="198" width="120" height="40" fill="#7f8c8d" rx="3"/>
  <text x="570" y="218" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white">Chunk N+1</text>
  <text x="570" y="232" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#ddd">继续写入...</text>

  <text x="650" y="220" font-family="Arial,sans-serif" font-size="11" fill="#888">（以此类推，最多支持多个分区文件）</text>

  <!-- ===== .pak (in IoStore context) ===== -->
  <text x="60" y="430" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">③ global.pak / [game].pak（IoStore 模式下的 PAK）</text>

  <rect x="60" y="440" width="880" height="60" fill="#fff" rx="6" stroke="#4a90d9" stroke-width="2"/>
  <text x="500" y="460" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#333">IoStore 模式中仍生成一个 .pak 文件，但主要内容变为：</text>
  <text x="500" y="478" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#555">FIoContainerHeader（包含 PackageId→PackageName 的映射，import/export 信息）+ 极少量"仅 PAK 兼容"的文件</text>
  <text x="500" y="492" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#888">实际的 Asset 数据已在 .ucas 中，.pak 作为"元数据载体"让引擎知道容器里有哪些包（Package）</text>

  <!-- FIoChunkId Detail -->
  <text x="60" y="528" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">FIoChunkId 结构（Chunk 的唯一 ID，12 字节）</text>
  <rect x="60" y="536" width="880" height="110" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>

  <rect x="70" y="548" width="200" height="32" fill="#2980b9" rx="3"/>
  <text x="170" y="568" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">PackageId（uint64, 8B）</text>

  <rect x="278" y="548" width="140" height="32" fill="#27ae60" rx="3"/>
  <text x="348" y="568" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">ChunkIndex（uint16, 2B）</text>

  <rect x="426" y="548" width="140" height="32" fill="#8e44ad" rx="3"/>
  <text x="496" y="568" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">ChunkType（uint8, 1B）</text>

  <rect x="574" y="548" width="100" height="32" fill="#7f8c8d" rx="3"/>
  <text x="624" y="568" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="white">Padding（1B）</text>

  <text x="70" y="602" font-family="Arial,sans-serif" font-size="11" fill="#555">PackageId：FNV64 对包名的哈希（如 "/Game/Blueprints/BP_Enemy" → 某个 uint64）</text>
  <text x="70" y="618" font-family="Arial,sans-serif" font-size="11" fill="#555">ChunkType：0=ExportBundleData（主数据）, 1=BulkData, 2=OptionalBulkData, 3=MemoryMappedBulkData, 4=ScriptObjects...</text>
  <text x="70" y="634" font-family="Arial,sans-serif" font-size="11" fill="#555">ChunkIndex：同一包内有多个 Chunk（如多个 ExportBundle）时区分使用的索引</text>

  <!-- Compression block detail -->
  <text x="60" y="660" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">压缩块（FIoStoreTocCompressedBlockEntry，12B 紧凑编码）：</text>
  <text x="60" y="676" font-family="Arial,sans-serif" font-size="11" fill="#555">Data[0-4]（5B）= Offset 低 40 位（PartitionOffset）  |  Data[5-6]（2B+高字节）= CompressedSize（24位）  |  Data[9-11]（3B低位）= UncompressedSize（24位）  |  最高 8 位 = CompressionMethodIndex</text>
</svg>
