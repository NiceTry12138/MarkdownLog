<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="960" viewBox="0 0 1100 960">
  <rect x="0" y="0" width="1100" height="960" fill="#f8f9fa" rx="8"/>
  <text x="550" y="28" font-family="Arial,sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1a1a2e">完整资源加载管道：从路径字符串到 UClass*</text>
  <text x="550" y="48" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#666">示例：LoadObjectAsync&lt;UBlueprintGeneratedClass&gt;("/Game/Blueprints/BP_Enemy.BP_Enemy_C")</text>

  <!-- Step 1 -->
  <rect x="60" y="64" width="980" height="50" fill="#1a1a2e" rx="6"/>
  <text x="100" y="84" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ecca3">① 解析路径 / StaticLoadObject</text>
  <text x="100" y="102" font-family="Arial,sans-serif" font-size="11" fill="#ccc">StaticLoadObject() / LoadObjectAsync() → FPackagePath::FromPackageName("/Game/Blueprints/BP_Enemy") → 分离 Package 路径 和 Object 名</text>

  <line x1="550" y1="114" x2="550" y2="130" stroke="#555" stroke-width="2"/>
  <polygon points="544,127 556,127 550,134" fill="#555"/>

  <!-- Step 2 -->
  <rect x="60" y="132" width="980" height="62" fill="#2c3e50" rx="6"/>
  <text x="100" y="152" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ecca3">② LoadPackageInternal → 计算 PackageId → 入队</text>
  <text x="100" y="170" font-family="Arial,sans-serif" font-size="11" fill="#ccc">FAsyncLoadingThread2::LoadPackageInternal(PackageName) → PackageId = FPackageId::FromName(PackageName)（FNV64 哈希）</text>
  <text x="100" y="186" font-family="Arial,sans-serif" font-size="11" fill="#ccc">→ 若 PackageId 不在 LoadedPackageStore 中 → 创建 FPackageRequest → 推入 PackageRequestQueue（线程安全队列）</text>

  <line x1="550" y1="194" x2="550" y2="210" stroke="#555" stroke-width="2"/>
  <polygon points="544,207 556,207 550,214" fill="#555"/>

  <!-- Step 3 -->
  <rect x="60" y="212" width="980" height="50" fill="#2c3e50" rx="6"/>
  <text x="100" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ecca3">③ AsyncLoading2 工作线程：CreateAsyncPackagesFromQueue</text>
  <text x="100" y="250" font-family="Arial,sans-serif" font-size="11" fill="#ccc">FAsyncLoadingThread2 从 PackageRequestQueue 取出请求 → new FAsyncPackage2 → 调用 StartLoading()</text>

  <line x1="550" y1="262" x2="550" y2="278" stroke="#555" stroke-width="2"/>
  <polygon points="544,275 556,275 550,282" fill="#555"/>

  <!-- Step 4: IoDispatcher read -->
  <rect x="60" y="280" width="980" height="72" fill="#c0392b" rx="6"/>
  <text x="100" y="300" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">④ 发起异步 I/O 请求</text>
  <text x="100" y="318" font-family="Arial,sans-serif" font-size="11" fill="#fdd">FAsyncPackage2::StartLoading() → 调用 IoDispatcher.ReadWithCallback(CreatePackageDataChunkId(PackageId), ...)</text>
  <text x="100" y="334" font-family="Arial,sans-serif" font-size="11" fill="#fdd">CreatePackageDataChunkId = FIoChunkId{PackageId, 0, EIoChunkType::ExportBundleData}</text>
  <text x="100" y="350" font-family="Arial,sans-serif" font-size="11" fill="#fdd">请求加入 FIoDispatcher 队列（FIoBatch），立即返回，等待回调</text>

  <line x1="550" y1="352" x2="550" y2="368" stroke="#555" stroke-width="2"/>
  <polygon points="544,365 556,365 550,372" fill="#555"/>

  <!-- Step 5: FFileIoStore resolve -->
  <rect x="60" y="370" width="980" height="82" fill="#e67e22" rx="6"/>
  <text x="100" y="390" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">⑤ FFileIoStore 解析 ChunkId → 读取 .ucas 块 → 解压</text>
  <text x="100" y="408" font-family="Arial,sans-serif" font-size="11" fill="#fff0cc">FFileIoStoreReader::Resolve(ChunkId) → 查询 Perfect Hash Map（ChunkId → FIoOffsetAndLength）</text>
  <text x="100" y="424" font-family="Arial,sans-serif" font-size="11" fill="#fff0cc">→ Seek .ucas 到 Offset，按 CompressionBlocks[] 依次读取 64KB 压缩块</text>
  <text x="100" y="440" font-family="Arial,sans-serif" font-size="11" fill="#fff0cc">→ Oodle/LZ4 解压（若加密则先解密）→ 拼合成完整 FIoBuffer → 回调触发 → 交给 AsyncPackage2</text>

  <line x1="550" y1="452" x2="550" y2="468" stroke="#555" stroke-width="2"/>
  <polygon points="544,465 556,465 550,472" fill="#555"/>

  <!-- Step 6: ProcessPackageSummary -->
  <rect x="60" y="470" width="980" height="60" fill="#27ae60" rx="6"/>
  <text x="100" y="490" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">⑥ Event_ProcessPackageSummary（状态机事件）</text>
  <text x="100" y="508" font-family="Arial,sans-serif" font-size="11" fill="#cef">解析 FIoBuffer 起始字节 → FPackageFileSummary（header） → NameMap → ImportMap → ExportMap</text>
  <text x="100" y="522" font-family="Arial,sans-serif" font-size="11" fill="#cef">建立每个 FObjectExport / FObjectImport 的内存结构，记录依赖关系</text>

  <line x1="550" y1="530" x2="550" y2="546" stroke="#555" stroke-width="2"/>
  <polygon points="544,543 556,543 550,550" fill="#555"/>

  <!-- Step 7: Recursive imports -->
  <rect x="60" y="548" width="980" height="72" fill="#8e44ad" rx="6"/>
  <text x="100" y="568" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">⑦ ImportPackagesRecursiveInner（递归加载依赖）</text>
  <text x="100" y="586" font-family="Arial,sans-serif" font-size="11" fill="#e8d8ff">遍历 ImportMap → 发现 /Game/Blueprints/BP_EnemyBase.BP_EnemyBase_C（父类，跨包引用）</text>
  <text x="100" y="602" font-family="Arial,sans-serif" font-size="11" fill="#e8d8ff">→ 递归触发步骤 ②～⑥ 加载 BP_EnemyBase 包（若未加载）</text>
  <text x="100" y="616" font-family="Arial,sans-serif" font-size="11" fill="#e8d8ff">→ 所有依赖 Ready 后，进入下一步（等待依赖是 WaitingForDependencies 状态）</text>

  <line x1="550" y1="620" x2="550" y2="636" stroke="#555" stroke-width="2"/>
  <polygon points="544,633 556,633 550,640" fill="#555"/>

  <!-- Step 8: ProcessExportBundle -->
  <rect x="60" y="638" width="980" height="70" fill="#2980b9" rx="6"/>
  <text x="100" y="658" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">⑧ Event_ProcessExportBundle（反序列化导出数据）</text>
  <text x="100" y="676" font-family="Arial,sans-serif" font-size="11" fill="#d0e8ff">依次处理 ExportMap 中每个 Export：FLinkerLoad::CreateExport() → 调用 UObjectFactory → new UBlueprintGeneratedClass</text>
  <text x="100" y="692" font-family="Arial,sans-serif" font-size="11" fill="#d0e8ff">从 FIoBuffer Export Data 区域反序列化字节流 → 填充 UClass 属性（包括继承自 BP_EnemyBase_C 的 Hp 等属性）</text>
  <text x="100" y="706" font-family="Arial,sans-serif" font-size="11" fill="#d0e8ff">SuperIndex（FPackageIndex）解析 → 指向 ImportMap[1] = BP_EnemyBase_C → 已加载的 UClass* 对象</text>

  <line x1="550" y1="708" x2="550" y2="724" stroke="#555" stroke-width="2"/>
  <polygon points="544,721 556,721 550,728" fill="#555"/>

  <!-- Step 9: PostLoad -->
  <rect x="60" y="726" width="980" height="56" fill="#1a5276" rx="6"/>
  <text x="100" y="746" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">⑨ Event_ExportsDone / PostLoad / 注册 UClass</text>
  <text x="100" y="764" font-family="Arial,sans-serif" font-size="11" fill="#aec">PostLoad() 在所有依赖完成后调用 → UBlueprintGeneratedClass::Link()（链接属性偏移）→ 注册到 GObjectLookupTable</text>
  <text x="100" y="780" font-family="Arial,sans-serif" font-size="11" fill="#aec">FAsyncPackage2::PackageLoadedCallback 触发 → 调用者的 Delegate/Lambda 被调用</text>

  <line x1="550" y1="782" x2="550" y2="798" stroke="#555" stroke-width="2"/>
  <polygon points="544,795 556,795 550,802" fill="#555"/>

  <!-- Step 10: Return -->
  <rect x="60" y="800" width="980" height="46" fill="#4ecca3" rx="6"/>
  <text x="550" y="820" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">⑩ 调用方收到 UBlueprintGeneratedClass* （即 BP_Enemy_C）→ 可以 SpawnActor/NewObject 使用</text>
  <text x="550" y="838" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#1a5276">FindObject&lt;UClass&gt;(nullptr, "/Game/Blueprints/BP_Enemy.BP_Enemy_C") 也可直接从 GObjectLookupTable 返回已缓存的指针</text>

  <!-- Legend -->
  <rect x="60" y="860" width="980" height="82" fill="#fff" rx="6" stroke="#ccc" stroke-width="1"/>
  <text x="80" y="878" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#333">关键代码入口：</text>
  <text x="80" y="896" font-family="Arial,sans-serif" font-size="10" fill="#555">LoadObjectAsync: Engine/Source/Runtime/CoreUObject/Public/UObject/UObjectGlobals.h</text>
  <text x="80" y="910" font-family="Arial,sans-serif" font-size="10" fill="#555">FAsyncLoadingThread2: Engine/Source/Runtime/CoreUObject/Private/Serialization/AsyncLoadingThread2.h/cpp</text>
  <text x="80" y="924" font-family="Arial,sans-serif" font-size="10" fill="#555">FAsyncPackage2::StartLoading: AsyncLoadingThread2.cpp - StartLoading() + 状态机 Event_ProcessPackageSummary/Event_ProcessExportBundle</text>
  <text x="80" y="938" font-family="Arial,sans-serif" font-size="10" fill="#555">FIoDispatcher / FFileIoStore: Engine/Source/Runtime/Core/Private/IO/IoDispatcher.cpp  Runtime/PakFile/Private/IoDispatcherFileBackend.cpp</text>
</svg>
