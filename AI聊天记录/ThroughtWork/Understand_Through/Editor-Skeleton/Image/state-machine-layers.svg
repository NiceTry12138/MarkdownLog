<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#12121f"/>
  <text x="440" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#e0e0ff" font-family="Arial, sans-serif">动画蓝图分层状态机结构</text>

  <!-- Main AnimBP box -->
  <rect x="20" y="55" width="840" height="480" rx="10" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="40" y="78" font-size="13" fill="#888" font-family="Arial, sans-serif">主 AnimBlueprint（UAnimBlueprintGeneratedClass）</text>

  <!-- AnimGraph Area -->
  <rect x="30" y="88" width="820" height="200" rx="8" fill="#1e1e3a" stroke="#4060a0" stroke-width="1.5"/>
  <text x="50" y="108" font-size="14" font-weight="bold" fill="#8090ff" font-family="Arial, sans-serif">AnimGraph（主图）</text>

  <!-- Output Pose -->
  <rect x="700" y="118" width="120" height="44" rx="6" fill="#2d4a1e" stroke="#6ab04c" stroke-width="1.5"/>
  <text x="760" y="135" text-anchor="middle" font-size="11" fill="#a0d060" font-family="Arial, sans-serif">OutputPose</text>
  <text x="760" y="150" text-anchor="middle" font-size="10" fill="#609040" font-family="Arial, sans-serif">最终姿势输出</text>

  <!-- Slot Node -->
  <rect x="540" y="118" width="130" height="44" rx="6" fill="#2d2d1e" stroke="#b0a040" stroke-width="1.5"/>
  <text x="605" y="135" text-anchor="middle" font-size="11" fill="#e0d060" font-family="Arial, sans-serif">DefaultSlot</text>
  <text x="605" y="150" text-anchor="middle" font-size="10" fill="#908030" font-family="Arial, sans-serif">Montage 插入点</text>
  <line x1="670" y1="140" x2="700" y2="140" stroke="#b0a040" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- State Machine 1 -->
  <rect x="50" y="110" width="250" height="160" rx="8" fill="#1e2a3a" stroke="#4080b0" stroke-width="1.5"/>
  <text x="175" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#6090d0" font-family="Arial, sans-serif">状态机 A（Locomotion）</text>

  <!-- States inside SM A -->
  <ellipse cx="90" cy="175" rx="30" ry="22" fill="#1e3a4a" stroke="#4090a0" stroke-width="1.5"/>
  <text x="90" y="172" text-anchor="middle" font-size="10" fill="#80c0d0" font-family="Arial, sans-serif">Idle</text>
  <text x="90" y="183" text-anchor="middle" font-size="9" fill="#60909a" font-family="Arial, sans-serif">空闲</text>

  <ellipse cx="175" cy="175" rx="30" ry="22" fill="#1e3a4a" stroke="#4090a0" stroke-width="1.5"/>
  <text x="175" y="172" text-anchor="middle" font-size="10" fill="#80c0d0" font-family="Arial, sans-serif">Walk</text>
  <text x="175" y="183" text-anchor="middle" font-size="9" fill="#60909a" font-family="Arial, sans-serif">行走</text>

  <ellipse cx="258" cy="175" rx="28" ry="22" fill="#1e3a4a" stroke="#4090a0" stroke-width="1.5"/>
  <text x="258" y="172" text-anchor="middle" font-size="10" fill="#80c0d0" font-family="Arial, sans-serif">Run</text>
  <text x="258" y="183" text-anchor="middle" font-size="9" fill="#60909a" font-family="Arial, sans-serif">跑步</text>

  <!-- Arrows between states -->
  <line x1="120" y1="175" x2="145" y2="175" stroke="#4090a0" stroke-width="1" marker-end="url(#arrowAqua)"/>
  <line x1="205" y1="175" x2="230" y2="175" stroke="#4090a0" stroke-width="1" marker-end="url(#arrowAqua)"/>

  <!-- Condition label -->
  <text x="130" y="168" text-anchor="middle" font-size="9" fill="#608090" font-family="Arial, sans-serif">Speed>10</text>
  <text x="218" y="168" text-anchor="middle" font-size="9" fill="#608090" font-family="Arial, sans-serif">Speed>200</text>

  <!-- Jump Sub-state -->
  <rect x="60" y="216" width="200" height="36" rx="4" fill="#2a3040" stroke="#6080a0" stroke-width="1"/>
  <text x="160" y="234" text-anchor="middle" font-size="10" fill="#8090b0" font-family="Arial, sans-serif">Jump（状态内可含子状态机）</text>
  <text x="160" y="246" text-anchor="middle" font-size="9" fill="#506070" font-family="Arial, sans-serif">InAir → Land → Recover</text>

  <!-- Arrow SM A → Slot -->
  <line x1="300" y1="165" x2="540" y2="165" stroke="#4080b0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="420" y="158" text-anchor="middle" font-size="10" fill="#608090" font-family="Arial, sans-serif">输出 Pose</text>

  <!-- ===== Layer Area ===== -->
  <rect x="30" y="310" width="820" height="210" rx="8" fill="#1e1e1e" stroke="#606060" stroke-width="1.5"/>
  <text x="50" y="330" font-size="14" font-weight="bold" fill="#c0c0c0" font-family="Arial, sans-serif">动画层接口（Animation Layer Interface）</text>

  <!-- Interface box -->
  <rect x="40" y="340" width="200" height="70" rx="6" fill="#2d1e4a" stroke="#9060e0" stroke-width="1.5"/>
  <text x="140" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#c090ff" font-family="Arial, sans-serif">UAnimLayerInterface</text>
  <text x="140" y="378" text-anchor="middle" font-size="10" fill="#9070c0" font-family="Arial, sans-serif">FullBody_AnimLayers</text>
  <text x="140" y="392" text-anchor="middle" font-size="10" fill="#9070c0" font-family="Arial, sans-serif">UpperBody_AnimLayers</text>
  <text x="140" y="406" text-anchor="middle" font-size="9" fill="#705090" font-family="Arial, sans-serif">（定义 Layer 接口 = 函数签名）</text>

  <!-- Arrow Interface → Linked Layer Node -->
  <line x1="240" y1="375" x2="290" y2="375" stroke="#9060e0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Linked Layer Node -->
  <rect x="292" y="340" width="200" height="70" rx="6" fill="#2d1e4a" stroke="#9060e0" stroke-width="1.5"/>
  <text x="392" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#c090ff" font-family="Arial, sans-serif">FAnimNode_LinkedAnimLayer</text>
  <text x="392" y="378" text-anchor="middle" font-size="10" fill="#9070c0" font-family="Arial, sans-serif">Interface + Layer 属性</text>
  <text x="392" y="392" text-anchor="middle" font-size="10" fill="#9070c0" font-family="Arial, sans-serif">持有 TargetInstance 指针</text>
  <text x="392" y="406" text-anchor="middle" font-size="9" fill="#705090" font-family="Arial, sans-serif">（AnimGraph 中的节点）</text>

  <line x1="492" y1="375" x2="542" y2="375" stroke="#9060e0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Linked Instance (e.g. CharacterAnimBP_Arms) -->
  <rect x="544" y="330" width="260" height="100" rx="6" fill="#1e2d2d" stroke="#40a0a0" stroke-width="1.5"/>
  <text x="674" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="#60e0e0" font-family="Arial, sans-serif">Linked AnimInstance</text>
  <text x="674" y="368" text-anchor="middle" font-size="11" fill="#408080" font-family="Arial, sans-serif">（独立的 AnimBlueprint）</text>
  <text x="674" y="384" text-anchor="middle" font-size="10" fill="#306060" font-family="Arial, sans-serif">Arms_AnimBP / Legs_AnimBP</text>
  <text x="674" y="400" text-anchor="middle" font-size="10" fill="#306060" font-family="Arial, sans-serif">实现 Interface 中定义的层</text>
  <text x="674" y="415" text-anchor="middle" font-size="9" fill="#204040" font-family="Arial, sans-serif">LinkAnimClassLayers() 在运行时动态换绑</text>
  
  <!-- BakedStateMachine reference -->
  <rect x="40" y="430" width="820" height="76" rx="6" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="450" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#aaa" font-family="Arial, sans-serif">编译器（AnimBPCompiler）工作：</text>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#888" font-family="Arial, sans-serif">Editor 中蓝图节点图 → 编译为 FBakedAnimationStateMachine（只读状态机描述数据） + 节点属性偏移</text>
  <text x="450" y="486" text-anchor="middle" font-size="10" fill="#666" font-family="Arial, sans-serif">Runtime 时 FAnimNode_StateMachine 持有 StateMachineIndexInClass，从 UAnimBlueprintGeneratedClass 中读取 FBakedAnimationStateMachine</text>
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">每帧 Update: 遍历 ExitTransitions → 评估条件 → ActiveTransitions 列表 → 混合 Alpha → 生成 Pose</text>

  <defs>
    <marker id="arrowYellow" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#b0a040"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#4080b0"/></marker>
    <marker id="arrowAqua" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#4090a0"/></marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#9060e0"/></marker>
  </defs>
</svg>
