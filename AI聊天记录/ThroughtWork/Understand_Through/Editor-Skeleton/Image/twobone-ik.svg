<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660">
  <defs>
    <marker id="arrowYellow2" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#e0c020"/>
    </marker>
    <marker id="arrowYellowDash" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#a0a030"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#ff6060"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#60e060"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#12121f"/>
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#e0e0ff" font-family="Arial, sans-serif">TwoBoneIK：余弦定理求解关节位置（计算前后对照）</text>

  <!-- ===================================================== -->
  <!-- BEFORE panel  (y=44 – 292)                            -->
  <!-- ===================================================== -->
  <rect x="10" y="44" width="430" height="248" rx="6" fill="#181828" stroke="#664422" stroke-width="1.5"/>
  <text x="225" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#e08040" font-family="Arial, sans-serif">① 计算前：初始姿势（末端未到达目标）</text>

  <!-- Root -->
  <circle cx="110" cy="255" r="10" fill="#4060b0" stroke="#80a0ff" stroke-width="2"/>
  <text x="94" y="252" text-anchor="end" font-size="12" fill="#80a0ff" font-family="Arial, sans-serif">Root</text>
  <text x="94" y="266" text-anchor="end" font-size="10" fill="#506090" font-family="Arial, sans-serif">(上臂根)</text>

  <!-- Joint (initial) -->
  <circle cx="170" cy="158" r="10" fill="#60a040" stroke="#a0e060" stroke-width="2"/>
  <text x="182" y="155" font-size="12" fill="#a0e060" font-family="Arial, sans-serif">Joint</text>
  <text x="182" y="168" font-size="10" fill="#608030" font-family="Arial, sans-serif">(初始，偏右偏上)</text>

  <!-- End (initial, NOT at target) -->
  <circle cx="224" cy="230" r="9" fill="#905030" stroke="#e07040" stroke-width="2"/>
  <text x="236" y="228" font-size="12" fill="#e07040" font-family="Arial, sans-serif">End</text>
  <text x="236" y="242" font-size="10" fill="#705030" font-family="Arial, sans-serif">(末端，未到目标)</text>

  <!-- Target (desired) -->
  <circle cx="230" cy="138" r="13" fill="none" stroke="#ff6060" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="222" y1="130" x2="238" y2="146" stroke="#ff6060" stroke-width="2.5"/>
  <line x1="238" y1="130" x2="222" y2="146" stroke="#ff6060" stroke-width="2.5"/>
  <text x="246" y="135" font-size="12" fill="#ff6060" font-family="Arial, sans-serif">Target T</text>
  <text x="246" y="148" font-size="10" fill="#904040" font-family="Arial, sans-serif">(期望位置)</text>

  <!-- Bone a -->
  <line x1="110" y1="255" x2="170" y2="158" stroke="#80a0ff" stroke-width="2.5"/>
  <text x="120" y="200" font-size="12" fill="#80a0ff" font-family="Arial, sans-serif">a=110</text>

  <!-- Bone b -->
  <line x1="170" y1="158" x2="224" y2="230" stroke="#a0e060" stroke-width="2.5"/>
  <text x="208" y="188" font-size="12" fill="#a0e060" font-family="Arial, sans-serif">b=90</text>

  <!-- Error vector End → Target -->
  <line x1="224" y1="230" x2="233" y2="152" stroke="#ff6060" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="250" y="196" font-size="11" fill="#ff6060" font-family="Arial, sans-serif">误差Δe ≈93</text>

  <text x="22" y="275" font-size="10" fill="#666688" font-family="Arial, sans-serif">当前 Joint(170,158)→End(224,230)，与 Target(230,138) 相差约 93 单位</text>
  <text x="22" y="289" font-size="10" fill="#504860" font-family="Arial, sans-serif">需通过余弦定理重新求解 Joint 位置使 End 精确命中 Target</text>

  <!-- ===== Divider arrow ===== -->
  <polygon points="215,301 225,317 235,301" fill="#60e060"/>
  <text x="248" y="313" font-size="11" fill="#60e060" font-family="Arial, sans-serif">TwoBoneIK 求解 →</text>

  <!-- ===================================================== -->
  <!-- AFTER panel  (y=320 – 648)                            -->
  <!-- ===================================================== -->
  <rect x="10" y="320" width="430" height="328" rx="6" fill="#181828" stroke="#226622" stroke-width="1.5"/>
  <text x="225" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#60e060" font-family="Arial, sans-serif">② 计算后：IK 求解，末端精确到达 Target ✓</text>

  <!-- Root (unchanged) -->
  <circle cx="110" cy="580" r="10" fill="#4060b0" stroke="#80a0ff" stroke-width="2"/>
  <text x="94" y="577" text-anchor="end" font-size="12" fill="#80a0ff" font-family="Arial, sans-serif">Root</text>
  <text x="94" y="590" text-anchor="end" font-size="10" fill="#506090" font-family="Arial, sans-serif">(固定不变)</text>

  <!-- d dashed line Root → Target -->
  <line x1="110" y1="580" x2="230" y2="470" stroke="#ff9060" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="148" y="541" font-size="11" fill="#ff9060" font-family="Arial, sans-serif">d≈163</text>

  <!-- Joint (solved — shifted left vs initial) -->
  <circle cx="140" cy="474" r="10" fill="#60a040" stroke="#a0e060" stroke-width="2"/>
  <text x="125" y="471" text-anchor="end" font-size="12" fill="#a0e060" font-family="Arial, sans-serif">Joint</text>
  <text x="125" y="484" text-anchor="end" font-size="10" fill="#608030" font-family="Arial, sans-serif">(已求解，偏左)</text>

  <!-- End = Target coincide -->
  <circle cx="230" cy="470" r="12" fill="#c05030" stroke="#60e060" stroke-width="2.5"/>
  <line x1="222" y1="462" x2="238" y2="478" stroke="#ff6060" stroke-width="2"/>
  <line x1="238" y1="462" x2="222" y2="478" stroke="#ff6060" stroke-width="2"/>
  <text x="245" y="467" font-size="12" fill="#60e060" font-family="Arial, sans-serif">End = Target ✓</text>
  <text x="245" y="480" font-size="10" fill="#408040" font-family="Arial, sans-serif">(末端精确到达)</text>

  <!-- Bone a (solved) -->
  <line x1="110" y1="580" x2="140" y2="474" stroke="#80a0ff" stroke-width="3"/>
  <text x="112" y="530" font-size="11" fill="#80a0ff" font-family="Arial, sans-serif">a=110</text>

  <!-- Bone b (solved) -->
  <line x1="140" y1="474" x2="230" y2="470" stroke="#a0e060" stroke-width="3"/>
  <text x="183" y="461" text-anchor="middle" font-size="11" fill="#a0e060" font-family="Arial, sans-serif">b=90</text>

  <!-- θ angle arc -->
  <path d="M 135 573 A 28 28 0 0 0 116 555" fill="none" stroke="#ffff60" stroke-width="1.8"/>
  <text x="148" y="556" font-size="12" fill="#ffff60" font-family="Arial, sans-serif">θ≈32°</text>

  <!-- ProjJointDist -->
  <line x1="110" y1="594" x2="152" y2="594" stroke="#e0c020" stroke-width="1.5" marker-end="url(#arrowYellow2)"/>
  <text x="130" y="610" text-anchor="middle" font-size="10" fill="#e0c020" font-family="Arial, sans-serif">ProjJointDist</text>

  <!-- JointLineDist -->
  <line x1="152" y1="480" x2="152" y2="594" stroke="#40e0e0" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="160" y="542" font-size="10" fill="#40e0e0" font-family="Arial, sans-serif">JointLineDist</text>

  <!-- BendDir arrow -->
  <line x1="140" y1="474" x2="94" y2="432" stroke="#c0c040" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowYellowDash)"/>
  <text x="70" y="430" font-size="10" fill="#a0a030" text-anchor="end" font-family="Arial, sans-serif">BendDir</text>

  <!-- JointTarget hint -->
  <circle cx="80" cy="400" r="7" fill="none" stroke="#a0a030" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="68" y="396" font-size="9" fill="#c0c040" text-anchor="end" font-family="Arial, sans-serif">JointTarget</text>
  <text x="68" y="407" font-size="9" fill="#808020" text-anchor="end" font-family="Arial, sans-serif">(hint点)</text>
  <line x1="140" y1="474" x2="84" y2="406" stroke="#a0a030" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="22" y="355" font-size="10" fill="#408040" font-family="Arial, sans-serif">Joint 从 (170,158) 移至 (140,474)，弯曲方向由 JointTarget hint 控制</text>
  <text x="22" y="370" font-size="10" fill="#408040" font-family="Arial, sans-serif">End(230,470) 与 Target(230,138相对) 精确重合，误差 = 0</text>

  <!-- ===================================================== -->
  <!-- RIGHT: Formula block  (x=450 – 950, y=44 – 648)       -->
  <!-- ===================================================== -->
  <rect x="450" y="44" width="500" height="605" rx="8" fill="#1e1e2d" stroke="#5060a0" stroke-width="1.5"/>
  <text x="700" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#a0a0ff" font-family="Arial, sans-serif">SolveTwoBoneIK() 核心数学</text>
  <text x="700" y="84" text-anchor="middle" font-size="11" fill="#666" font-family="Arial, sans-serif">源码：AnimationCore/TwoBoneIK.cpp</text>

  <text x="464" y="108" font-size="12" fill="#c0c0ff" font-family="Arial, sans-serif">参数：a = 上臂长度，b = 小臂长度</text>
  <text x="464" y="125" font-size="12" fill="#c0c0ff" font-family="Arial, sans-serif">      d = |Target − Root|  （目标距离）</text>

  <!-- Step 1 -->
  <rect x="460" y="136" width="478" height="50" rx="4" fill="#1a2a1a" stroke="#4a6a4a" stroke-width="1"/>
  <text x="699" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="#80c080" font-family="Arial, sans-serif">步骤 1：伸展检测</text>
  <text x="472" y="176" font-size="11" fill="#608060" font-family="Arial, sans-serif">if d ≥ (a+b):  完全伸展，Joint = Root + a · d̂（如图①极端情况）</text>

  <!-- Step 2 -->
  <rect x="460" y="196" width="478" height="108" rx="4" fill="#1a1a2a" stroke="#4a4a8a" stroke-width="1"/>
  <text x="699" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#a0a0e0" font-family="Arial, sans-serif">步骤 2：余弦定理求角度 θ（对应图②中 θ≈32°）</text>
  <text x="472" y="238" font-size="12" fill="#e0e080" font-family="monospace">           a² + d² − b²</text>
  <text x="472" y="256" font-size="12" fill="#e0e080" font-family="monospace">cos θ = ─────────────────</text>
  <text x="472" y="274" font-size="12" fill="#e0e080" font-family="monospace">              2 × a × d</text>
  <text x="472" y="292" font-size="11" fill="#c0c060" font-family="monospace">θ = ACos(cosθ)，sinθ = √(1 − cos²θ)</text>

  <!-- Step 3 -->
  <rect x="460" y="314" width="478" height="118" rx="4" fill="#2a1a1a" stroke="#8a4a4a" stroke-width="1"/>
  <text x="699" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#e08080" font-family="Arial, sans-serif">步骤 3：计算 Joint 实际位置（图②中标注的两个分量）</text>
  <text x="472" y="354" font-size="11" fill="#c06060" font-family="Arial, sans-serif">JointLineDist = a · sinθ    ← Joint 到 Root-Target 连线的垂直距离</text>
  <text x="472" y="372" font-size="11" fill="#c06060" font-family="Arial, sans-serif">ProjJointDist = a · cosθ    ← 沿 d̂ 方向的投影长度</text>
  <text x="472" y="390" font-size="11" fill="#c06060" font-family="Arial, sans-serif">d̂ = normalize(Target − Root)  ← 目标方向单位向量</text>
  <text x="472" y="415" font-size="12" fill="#ff8080" font-family="monospace">Joint = Root + ProjJointDist·d̂ + JointLineDist·BendDir</text>

  <!-- Step 4 -->
  <rect x="460" y="442" width="478" height="88" rx="4" fill="#1a2a2a" stroke="#4a8a8a" stroke-width="1"/>
  <text x="699" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#60e0e0" font-family="Arial, sans-serif">步骤 4：确定弯曲方向（图②中 BendDir 箭头）</text>
  <text x="472" y="482" font-size="11" fill="#40a0a0" font-family="Arial, sans-serif">JointTargetDelta = JointTarget − Root</text>
  <text x="472" y="500" font-size="11" fill="#40a0a0" font-family="Arial, sans-serif">BendDir = JointTargetDelta − dot(JointTargetDelta, d̂) · d̂</text>
  <text x="472" y="518" font-size="10" fill="#308080" font-family="Arial, sans-serif">（JointTarget 投影到垂直于 d̂ 的平面 = 控制膝/肘朝向）</text>

  <!-- Step 5 -->
  <rect x="460" y="540" width="478" height="48" rx="4" fill="#2a1a2a" stroke="#8a4a8a" stroke-width="1"/>
  <text x="699" y="560" text-anchor="middle" font-size="11" font-weight="bold" fill="#d080d0" font-family="Arial, sans-serif">步骤 5：转换为骨骼旋转增量</text>
  <text x="472" y="578" font-size="11" fill="#a060a0" font-family="Arial, sans-serif">ΔR = FQuat::FindBetweenNormals(OldBoneDir, NewBoneDir)</text>

  <!-- Connecting note -->
  <rect x="460" y="598" width="478" height="42" rx="4" fill="#141424" stroke="#445" stroke-width="1"/>
  <text x="699" y="615" text-anchor="middle" font-size="11" font-weight="bold" fill="#8080a0" font-family="Arial, sans-serif">图示对照</text>
  <text x="472" y="630" font-size="10" fill="#606080" font-family="Arial, sans-serif">① 前：Joint(170,158) End(224,230) ≠ Target(230,138)  →  误差≈93</text>
  <text x="472" y="642" font-size="10" fill="#60a060" font-family="Arial, sans-serif">② 后：Joint(140,474) End≡Target(230,470)  →  误差=0，θ≈32°</text>
</svg>
