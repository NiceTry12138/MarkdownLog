<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580">
  <rect width="860" height="580" fill="#12121f"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#e0e0ff" font-family="Arial, sans-serif">TwoBoneIK：余弦定理求解关节位置</text>

  <!-- ===== Geometry Diagram (left) ===== -->
  <!-- Root bone point -->
  <circle cx="160" cy="300" r="10" fill="#4060b0" stroke="#80a0ff" stroke-width="2"/>
  <text x="120" y="300" text-anchor="end" font-size="12" fill="#80a0ff" font-family="Arial, sans-serif">Root</text>
  <text x="120" y="315" text-anchor="end" font-size="10" fill="#506090" font-family="Arial, sans-serif">(上臂根)</text>

  <!-- Joint point (upper position) -->
  <circle cx="270" cy="160" r="10" fill="#60a040" stroke="#a0e060" stroke-width="2"/>
  <text x="285" y="155" text-anchor="start" font-size="12" fill="#a0e060" font-family="Arial, sans-serif">Joint</text>
  <text x="285" y="168" text-anchor="start" font-size="10" fill="#608030" font-family="Arial, sans-serif">(肘/膝关节)</text>

  <!-- End Effector -->
  <circle cx="400" cy="310" r="10" fill="#e06040" stroke="#ff9060" stroke-width="2"/>
  <text x="415" y="308" text-anchor="start" font-size="12" fill="#ff9060" font-family="Arial, sans-serif">Effector</text>
  <text x="415" y="322" text-anchor="start" font-size="10" fill="#905030" font-family="Arial, sans-serif">(目标位置)</text>

  <!-- Joint Target (hint) -->
  <circle cx="220" cy="90" r="8" fill="none" stroke="#a0a030" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="235" y="88" text-anchor="start" font-size="11" fill="#c0c040" font-family="Arial, sans-serif">JointTarget</text>
  <text x="235" y="100" text-anchor="start" font-size="9" fill="#808020" font-family="Arial, sans-serif">(控制肘/膝朝向的hint)</text>

  <!-- Upper limb (a) -->
  <line x1="160" y1="300" x2="270" y2="160" stroke="#80a0ff" stroke-width="2.5"/>
  <text x="195" y="218" text-anchor="middle" font-size="12" fill="#80a0ff" font-family="Arial, sans-serif">a</text>
  <text x="180" y="228" text-anchor="middle" font-size="10" fill="#506090" font-family="Arial, sans-serif">(上臂)</text>

  <!-- Lower limb (b) -->
  <line x1="270" y1="160" x2="400" y2="310" stroke="#a0e060" stroke-width="2.5"/>
  <text x="345" y="225" text-anchor="middle" font-size="12" fill="#a0e060" font-family="Arial, sans-serif">b</text>
  <text x="355" y="235" text-anchor="middle" font-size="10" fill="#608030" font-family="Arial, sans-serif">(小臂)</text>

  <!-- Root to Effector (d) -->
  <line x1="160" y1="300" x2="400" y2="310" stroke="#ff9060" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="280" y="325" text-anchor="middle" font-size="12" fill="#ff9060" font-family="Arial, sans-serif">d</text>
  <text x="280" y="340" text-anchor="middle" font-size="10" fill="#905030" font-family="Arial, sans-serif">(目标距离)</text>

  <!-- Angle arc at root -->
  <path d="M 195 296 A 35 35 0 0 1 163 268" fill="none" stroke="#ffff60" stroke-width="1.5"/>
  <text x="200" y="272" font-size="12" fill="#ffff60" font-family="Arial, sans-serif">θ</text>

  <!-- JointBendDir vertical line -->
  <line x1="280" y1="300" x2="280" y2="160" stroke="#c0c030" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="305" x2="280" y2="320" stroke="#c0c030" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="310" y="275" font-size="10" fill="#a0a030" font-family="Arial, sans-serif">JointLineDist</text>
  <line x1="275" y1="160" x2="275" y2="310" stroke="#c0c030" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ProjJointDist arrow -->
  <line x1="160" y1="315" x2="280" y2="315" stroke="#e0c020" stroke-width="1.5" marker-end="url(#arrowYellow2)"/>
  <text x="220" y="335" text-anchor="middle" font-size="10" fill="#e0c020" font-family="Arial, sans-serif">ProjJointDist</text>

  <!-- JointTarget hint direction -->
  <line x1="270" y1="160" x2="220" y2="90" stroke="#a0a030" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowYellowDash)"/>

  <!-- ===== Formula Block (right) ===== -->
  <rect x="450" y="50" width="390" height="490" rx="8" fill="#1e1e2d" stroke="#5060a0" stroke-width="1.5"/>
  <text x="645" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#a0a0ff" font-family="Arial, sans-serif">SolveTwoBoneIK() 核心数学</text>
  <text x="645" y="90" text-anchor="middle" font-size="11" fill="#666" font-family="Arial, sans-serif">源码：AnimationCore/TwoBoneIK.cpp</text>

  <!-- Variables -->
  <text x="465" y="115" font-size="12" fill="#c0c0ff" font-family="Arial, sans-serif">参数：a=上臂长度，b=小臂长度</text>
  <text x="465" y="132" font-size="12" fill="#c0c0ff" font-family="Arial, sans-serif">      d=|Effector - Root|（目标距离）</text>

  <!-- Step 1: stretch check -->
  <rect x="460" y="144" width="365" height="50" rx="4" fill="#1a2a1a" stroke="#4a6a4a" stroke-width="1"/>
  <text x="642" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#80c080" font-family="Arial, sans-serif">步骤 1：伸展检测</text>
  <text x="475" y="180" font-size="11" fill="#608060" font-family="Arial, sans-serif">if d ≥ (a+b):  完全伸展，Joint = Root + a·dhat</text>

  <!-- Step 2: Law of Cosines -->
  <rect x="460" y="204" width="365" height="100" rx="4" fill="#1a1a2a" stroke="#4a4a8a" stroke-width="1"/>
  <text x="642" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#a0a0e0" font-family="Arial, sans-serif">步骤 2：余弦定理求角度 θ</text>
  <text x="475" y="244" font-size="12" fill="#e0e080" font-family="monospace">           a² + d² - b²</text>
  <text x="475" y="261" font-size="12" fill="#e0e080" font-family="monospace">cos θ = ─────────────────</text>
  <text x="475" y="278" font-size="12" fill="#e0e080" font-family="monospace">                2 × a × d</text>
  <text x="475" y="296" font-size="11" fill="#c0c060" font-family="monospace">θ = ACos(cosθ)</text>

  <!-- Step 3: Joint position -->
  <rect x="460" y="314" width="365" height="110" rx="4" fill="#2a1a1a" stroke="#8a4a4a" stroke-width="1"/>
  <text x="642" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#e08080" font-family="Arial, sans-serif">步骤 3：计算关节实际位置</text>
  <text x="475" y="354" font-size="11" fill="#c06060" font-family="Arial, sans-serif">JointLineDist = a · sin(θ)   ← 关节到 Root-Effector 线的距离</text>
  <text x="475" y="372" font-size="11" fill="#c06060" font-family="Arial, sans-serif">ProjJointDist = √(a² - JointLineDist²)  ← 沿目标方向分量</text>
  <text x="475" y="390" font-size="11" fill="#c06060" font-family="Arial, sans-serif">dhat = normalize(Effector - Root)   ← 目标方向单位向量</text>
  <text x="475" y="412" font-size="12" fill="#ff8080" font-family="monospace">OutJoint = Root + ProjJointDist·dhat + JointLineDist·BendDir</text>

  <!-- Step 4: BendDir -->
  <rect x="460" y="434" width="365" height="80" rx="4" fill="#1a2a2a" stroke="#4a8a8a" stroke-width="1"/>
  <text x="642" y="454" text-anchor="middle" font-size="11" font-weight="bold" fill="#60e0e0" font-family="Arial, sans-serif">步骤 4：确定弯曲平面法线</text>
  <text x="475" y="474" font-size="11" fill="#40a0a0" font-family="Arial, sans-serif">PlaneNormal = normalize(dhat × JointTargetDelta)</text>
  <text x="475" y="492" font-size="11" fill="#40a0a0" font-family="Arial, sans-serif">BendDir = JointTargetDelta - dot(JointTargetDelta,dhat)·dhat</text>
  <text x="475" y="508" font-size="10" fill="#308080" font-family="Arial, sans-serif">（JointTarget投影到垂直于dhat的平面 = 控制弯曲方向）</text>

  <!-- Apply rotation note -->
  <text x="465" y="530" font-size="10" fill="#808080" font-family="Arial, sans-serif">步骤5: 将 Delta 转换为骨骼旋转:  FQuat::FindBetweenNormals(OldDir, NewDir)</text>

  <defs>
    <marker id="arrowYellow2" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#e0c020"/>
    </marker>
    <marker id="arrowYellowDash" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#a0a030"/>
    </marker>
  </defs>
</svg>
