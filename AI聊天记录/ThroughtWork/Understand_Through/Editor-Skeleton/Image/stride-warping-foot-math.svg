<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" width="920" height="580">
  <defs>
    <marker id="arrW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e6edf3"/>
    </marker>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0c060"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56d364"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff7b72"/>
    </marker>
    <marker id="arrYrev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#f0c060"/>
    </marker>
    <marker id="arrGrev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#56d364"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="580" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#e6edf3" font-family="Arial, sans-serif">StrideWarping 脚部几何计算（侧视图，步幅方向 = +X，上方 = +Z）</text>

  <!-- ============================= LEFT: GEOMETRY DIAGRAM ============================= -->
  <!-- Panel background -->
  <rect x="16" y="40" width="520" height="530" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="276" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b949e" font-family="Arial, sans-serif">几何视图（组件空间 XZ 截面）</text>

  <!-- Floor line -->
  <line x1="36" y1="470" x2="520" y2="470" stroke="#444c56" stroke-width="2"/>
  <text x="530" y="474" font-size="11" fill="#444c56" font-family="Arial, sans-serif">地板</text>

  <!-- Gravity arrow (world down) -->
  <line x1="80" y1="90" x2="80" y2="130" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="86" y="115" font-size="10" fill="#79c0ff" font-family="Arial, sans-serif">Gravity (-Z)</text>

  <!-- Floor normal arrow -->
  <line x1="80" y1="470" x2="80" y2="430" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="86" y="448" font-size="10" fill="#79c0ff" font-family="Arial, sans-serif">FloorNormal (+Z)</text>

  <!-- Stride direction arrow -->
  <line x1="120" y1="500" x2="220" y2="500" stroke="#56d364" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="126" y="516" font-size="11" fill="#56d364" font-family="Arial, sans-serif">StrideDirection (+X)</text>

  <!-- === PELVIS === -->
  <!-- Pelvis dot at (230, 165) -->
  <circle cx="230" cy="165" r="7" fill="#d2a8ff" stroke="#8957e5" stroke-width="1.5"/>
  <text x="244" y="170" font-size="11" fill="#d2a8ff" font-family="Arial, sans-serif">Pelvis</text>

  <!-- === THIGH === -->
  <!-- Thigh dot at (230, 240) -->
  <circle cx="230" cy="240" r="6" fill="#ffa657" stroke="#d1812b" stroke-width="1.5"/>
  <text x="244" y="245" font-size="11" fill="#ffa657" font-family="Arial, sans-serif">Thigh</text>
  <!-- Pelvis to Thigh bone line -->
  <line x1="230" y1="172" x2="230" y2="234" stroke="#8b949e" stroke-width="2"/>

  <!-- === KNEE === -->
  <!-- Knee dot at (270, 355) — midpoint of leg chain -->
  <circle cx="270" cy="355" r="5" fill="#e3b341" stroke="#bb8009" stroke-width="1.5"/>
  <text x="280" y="359" font-size="10" fill="#e3b341" font-family="Arial, sans-serif">Knee</text>
  <!-- Thigh to Knee -->
  <line x1="232" y1="245" x2="268" y2="350" stroke="#8b949e" stroke-width="2"/>

  <!-- === IK FOOT ORIGINAL === -->
  <!-- IK Foot original at (375, 470) — on floor -->
  <circle cx="375" cy="470" r="7" fill="#ff7b72" stroke="#f85149" stroke-width="2"/>
  <text x="384" y="465" font-size="11" fill="#ff7b72" font-family="Arial, sans-serif">IKFoot (原始)</text>
  <!-- Knee to IKFoot -->
  <line x1="272" y1="357" x2="372" y2="466" stroke="#8b949e" stroke-width="2"/>

  <!-- === T' — StrideWarpingPlaneOrigin === -->
  <!-- T' at (230, 470) — directly below Thigh on floor -->
  <circle cx="230" cy="470" r="7" fill="#e6edf3" stroke="#c9d1d9" stroke-width="1.5"/>
  <text x="218" y="490" font-size="11" fill="#e6edf3" font-family="Arial, sans-serif" text-anchor="middle">T'</text>

  <!-- Dashed gravity projection line: Thigh → T' -->
  <line x1="230" y1="246" x2="230" y2="462" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Arrow at end -->
  <polygon points="225,462 235,462 230,470" fill="#79c0ff"/>
  <text x="160" y="360" font-size="10" fill="#79c0ff" font-family="Arial, sans-serif">沿 Gravity 投影</text>
  <text x="160" y="372" font-size="10" fill="#79c0ff" font-family="Arial, sans-serif">到地板平面</text>

  <!-- === Dimension: stride offset d === -->
  <!-- double-headed arrow T' to IKFoot on floor, y=490 -->
  <line x1="230" y1="488" x2="375" y2="488" stroke="#f0c060" stroke-width="1.5" marker-end="url(#arrY)" marker-start="url(#arrYrev)"/>
  <text x="302" y="502" text-anchor="middle" font-size="11" fill="#f0c060" font-family="Arial, sans-serif">d（原始步幅偏移）</text>

  <!-- ScaleOrigin = T' in 2D XZ projection (same X as Thigh projection, same Z as foot) -->
  <!-- ScaleOrigin = T' = (230, 470) in this diagram, so we just annotate it -->
  <text x="144" y="483" font-size="10" fill="#e6edf3" text-anchor="middle" font-family="Arial, sans-serif">ScaleOrigin</text>
  <text x="144" y="494" font-size="10" fill="#e6edf3" text-anchor="middle" font-family="Arial, sans-serif">= T' (此截面)</text>

  <!-- === WARPED FOOT (StrideScale = 1.5) === -->
  <!-- WarpedFoot_x = T'_x + (Foot_x - T'_x) * 1.5 = 230 + (375-230)*1.5 = 230+217 = 447 -->
  <circle cx="447" cy="470" r="7" fill="#56d364" stroke="#238636" stroke-width="2"/>
  <text x="452" y="460" font-size="11" fill="#56d364" font-family="Arial, sans-serif">IKFoot</text>
  <text x="452" y="473" font-size="11" fill="#56d364" font-family="Arial, sans-serif">(warped, scale=1.5)</text>

  <!-- double-headed arrow T' to WarpedFoot, at y=516 -->
  <line x1="230" y1="516" x2="447" y2="516" stroke="#56d364" stroke-width="1.5" marker-end="url(#arrG)" marker-start="url(#arrGrev)"/>
  <text x="338" y="530" text-anchor="middle" font-size="11" fill="#56d364" font-family="Arial, sans-serif">d × 1.5（warped 步幅偏移）</text>

  <!-- === WARPED FOOT (StrideScale = 0.6) === -->
  <!-- WarpedFoot_x = 230 + (375-230)*0.6 = 230+87 = 317 -->
  <circle cx="317" cy="470" r="6" fill="#e3b341" stroke="#bb8009" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="300" y="456" font-size="10" fill="#e3b341" text-anchor="middle" font-family="Arial, sans-serif">warped</text>
  <text x="300" y="466" font-size="10" fill="#e3b341" text-anchor="middle" font-family="Arial, sans-serif">(scale=0.6)</text>

  <!-- ============================= RIGHT: FORMULA PANEL ============================= -->
  <rect x="548" y="40" width="360" height="530" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="728" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b949e" font-family="Arial, sans-serif">公式推导</text>

  <!-- Formula 1: StrideScale -->
  <rect x="562" y="74" width="332" height="60" rx="4" fill="#0f2033" stroke="#1f6feb" stroke-width="1"/>
  <text x="728" y="91" text-anchor="middle" font-size="11" font-weight="bold" fill="#79c0ff" font-family="Arial, sans-serif">① StrideScale（速度比）</text>
  <text x="568" y="107" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">RootMotionSpeed = |ΔT| / Δt</text>
  <text x="568" y="124" font-size="11" fill="#f0c060" font-family="Arial, sans-serif">StrideScale = V_locomotion / V_rootmotion</text>

  <!-- Formula 2: T' calculation -->
  <rect x="562" y="142" width="332" height="78" rx="4" fill="#0f2033" stroke="#1f6feb" stroke-width="1"/>
  <text x="728" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#79c0ff" font-family="Arial, sans-serif">② T'：大腿重力投影到地板</text>
  <text x="568" y="174" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">地板平面：(P - P_foot) · FloorNormal = 0</text>
  <text x="568" y="189" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">射线：P_thigh + t × GravityDir</text>
  <text x="568" y="206" font-size="11" fill="#e6edf3" font-family="Arial, sans-serif">t = (P_foot - P_thigh) · N / (GravityDir · N)</text>
  <text x="568" y="212" font-size="10" fill="#6e7681" font-family="Arial, sans-serif">——————————————————————————</text>
  <text x="568" y="214" font-size="10.5" fill="#e6edf3" font-family="Arial, sans-serif">T' = P_thigh + t × GravityDir</text>

  <!-- Formula 3: ScaleOrigin -->
  <rect x="562" y="228" width="332" height="78" rx="4" fill="#0f2033" stroke="#1f6feb" stroke-width="1"/>
  <text x="728" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#79c0ff" font-family="Arial, sans-serif">③ ScaleOrigin：去除步幅分量</text>
  <text x="568" y="260" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">平面：以 T' 为原点，法线 = StrideDir</text>
  <text x="568" y="275" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">即：平面 x = T'_x（垂直步幅方向的平面）</text>
  <text x="568" y="291" font-size="11" fill="#e6edf3" font-family="Arial, sans-serif">ScaleOrigin = Foot - ((Foot - T') · d̂) × d̂</text>
  <text x="568" y="300" font-size="10" fill="#6e7681" font-family="Arial, sans-serif">= 脚在步幅方向被"归零"后的基点</text>

  <!-- Formula 4: WarpedFoot -->
  <rect x="562" y="314" width="332" height="62" rx="4" fill="#1e1133" stroke="#8957e5" stroke-width="1.5"/>
  <text x="728" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#d2a8ff" font-family="Arial, sans-serif">④ 脚部 Warping（核心缩放公式）</text>
  <text x="568" y="350" font-size="12" fill="#f0c060" font-family="Arial, sans-serif">WarpedFoot = ScaleOrigin + (Foot - ScaleOrigin) × S</text>
  <text x="568" y="368" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">S = StrideScale，ScaleOrigin = 步幅方向上的枢轴点</text>

  <!-- Formula 5: Pelvis pulldown -->
  <rect x="562" y="384" width="332" height="76" rx="4" fill="#1f1a00" stroke="#bb8009" stroke-width="1"/>
  <text x="728" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#e3b341" font-family="Arial, sans-serif">⑤ 骨盆迭代下拉</text>
  <text x="568" y="418" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">每步迭代，每脚贡献：</text>
  <text x="568" y="432" font-size="10.5" fill="#e6edf3" font-family="Arial, sans-serif">IdealP_i = IKFoot_i + n̂_i × FKLen_i</text>
  <text x="568" y="446" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">n̂_i = normalize(P_pelvis - IKFoot_i)</text>
  <text x="568" y="458" font-size="11" fill="#e3b341" font-family="Arial, sans-serif">P_adjusted = Σ( IdealP_i / numFeet )  (迭代 3次)</text>

  <!-- Formula 6: Thigh compensation -->
  <rect x="562" y="468" width="332" height="64" rx="4" fill="#1f1500" stroke="#d1812b" stroke-width="1"/>
  <text x="728" y="484" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa657" font-family="Arial, sans-serif">⑥ 大腿旋转补偿</text>
  <text x="568" y="500" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">InitDir = normalize(FKFoot - Thigh)</text>
  <text x="568" y="514" font-size="10" fill="#8b949e" font-family="Arial, sans-serif">TargetDir = normalize(WarpedFoot - AdjThigh)</text>
  <text x="568" y="524" font-size="11" fill="#ffa657" font-family="Arial, sans-serif">ΔR = FindBetweenNormals(InitDir, TargetDir)</text>

  <!-- Key insight box -->
  <rect x="562" y="540" width="332" height="22" rx="4" fill="#0f2033" stroke="#388bfd" stroke-width="1"/>
  <text x="728" y="555" text-anchor="middle" font-size="10.5" fill="#79c0ff" font-family="Arial, sans-serif">本质：沿步幅方向缩放脚的偏移，垂直/高度不变</text>
</svg>
