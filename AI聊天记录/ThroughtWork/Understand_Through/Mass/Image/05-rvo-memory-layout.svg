  <text x="595" y="206" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#92400e">FMassVelocityFragment[]</text>
  <rect x="700" y="193" width="56" height="28" rx="2" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/><text x="728" y="211" font-family="Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">V7</text>
  <rect x="762" y="193" width="56" height="28" rx="2" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/><text x="790" y="211" font-family="Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">V8</text>
  <rect x="824" y="193" width="56" height="28" rx="2" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/><text x="852" y="211" font-family="Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">V9</text>
  <rect x="886" y="193" width="56" height="28" rx="2" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/><text x="914" y="211" font-family="Arial,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">V10</text>

