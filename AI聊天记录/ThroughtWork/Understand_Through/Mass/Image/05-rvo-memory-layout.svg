  <text x="815" y="334" font-family="Arial,sans-serif" font-size="11" fill="#475569" text-anchor="middle">Tag: FMassPlayerControlledTag（存于 Archetype TagBitSet，不占 Chunk 内存）</text>

  <!-- ========= Processor boxes ========= -->
  <rect x="20" y="416" width="1060" height="50" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="550" y="440" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#064e3b" text-anchor="middle">URVOAvoidanceProcessor::Execute() — Query: {Transform:RO, Velocity:RO, AgentRadius:RO, Force:RW}</text>
  <text x="550" y="456" font-family="Arial,sans-serif" font-size="11" fill="#064e3b" text-anchor="middle">同时匹配 Archetype A 和 B（均含这 4 个 Fragment），一次扫描两个 Archetype 的所有 Chunk，连续写入 Force</text>

  <rect x="20" y="476" width="1060" height="50" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="550" y="500" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0369a1" text-anchor="middle">UMassApplyMovementProcessor::Execute() — Query: {Velocity:RW, Transform:RW, Force:RW, Tag:None(OffLOD)}</text>
  <text x="550" y="516" font-family="Arial,sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">利用 Force 更新 Velocity，利用 Velocity 更新 Transform.Location（仅对在 LOD 范围内的实体）</text>

  <!-- EntityManager box (bottom) -->
  <rect x="20" y="548" width="500" height="90" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="270" y="570" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">FMassEntityManager (Entities 数组)</text>
  <text x="35" y="590" font-family="Arial,sans-serif" font-size="11" fill="#92400e">Entities[1..10] 每项含：</text>
  <text x="35" y="608" font-family="Arial,sans-serif" font-size="11" fill="#92400e">  CurrentArchetype (SharedPtr) → 指向 Archetype A 或 B</text>
  <text x="35" y="625" font-family="Arial,sans-serif" font-size="11" fill="#92400e">  SerialNumber — 用于校验句柄合法性</text>

  <!-- SharedFragment pool -->
  <rect x="560" y="548" width="520" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="820" y="570" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">FMassEntityManager SharedFragment 池</text>
  <text x="575" y="590" font-family="Arial,sans-serif" font-size="11" fill="#166534">SharedFragments[]:  FMassMovementParameters { MaxSpeed=200 }</text>
  <text x="575" y="608" font-family="Arial,sans-serif" font-size="11" fill="#166534">A、B 两个 Archetype 的所有实体共享同一份 FMassMovementParameters</text>
  <text x="575" y="625" font-family="Arial,sans-serif" font-size="11" fill="#166534">节省内存，修改参数立即对全部实体生效</text>

  <!-- Memory total summary -->
  <rect x="20" y="660" width="1060" height="110" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="550" y="682" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#581c87" text-anchor="middle">内存占用估算（10个角色）</text>
  <text x="35" y="702" font-family="Arial,sans-serif" font-size="11" fill="#581c87">Archetype A Chunk: 6 × (8 + 80 + 12 + 12 + 4) Byte = 6 × 116 = 696 Byte（EntityHandle + 4种 Fragment）</text>
  <text x="35" y="720" font-family="Arial,sans-serif" font-size="11" fill="#581c87">Archetype B Chunk: 4 × (8 + 80 + 12 + 12 + 4) Byte = 4 × 116 = 464 Byte（Tag 不占 Chunk 空间）</text>
  <text x="35" y="738" font-family="Arial,sans-serif" font-size="11" fill="#581c87">实际 Chunk 为 ChunkMemorySize（默认 128 KB）分配，这里预分配远大于实际数据，剩余空位可继续填充实体</text>
  <text x="35" y="756" font-family="Arial,sans-serif" font-size="11" fill="#581c87">FMassEntityManager.Entities[]: 10 × (8+4) Byte ≈ 120 Byte（SharedPtr 指针 + SerialNumber）</text>
</svg>
