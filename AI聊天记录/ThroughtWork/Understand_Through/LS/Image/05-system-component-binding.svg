<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="1000" height="700" fill="#f8f9fa"/>
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">System 与 Component 绑定关系图</text>

  <!-- ===== Component Types (left column) ===== -->
  <rect x="20" y="55" width="260" height="600" rx="8" fill="#e8f8f5" stroke="#148f77" stroke-width="2"/>
  <text x="150" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0b5345" font-family="sans-serif">组件类型 (Component)</text>

  <!-- component blocks -->
  <rect x="35" y="90" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="109" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">EvalTime: FFrameTime</text>

  <rect x="35" y="126" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="145" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">DoubleChannel[9]: FSourceDoubleChannel</text>

  <rect x="35" y="162" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="181" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">DoubleResult[9]: double</text>

  <rect x="35" y="198" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="217" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">CachedInterpolation[9]</text>

  <rect x="35" y="234" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="253" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">FloatChannel[9]: FSourceFloatChannel</text>

  <rect x="35" y="270" width="230" height="28" rx="4" fill="#a9dfbf" stroke="#27ae60"/>
  <text x="150" y="289" text-anchor="middle" font-size="11" fill="#1a5e34" font-family="sans-serif">FloatResult[9]: float</text>

  <rect x="35" y="306" width="230" height="28" rx="4" fill="#c8f7c5" stroke="#1abc9c"/>
  <text x="150" y="325" text-anchor="middle" font-size="11" fill="#145a32" font-family="sans-serif">PropertyBinding: FMovieScenePropertyBinding</text>

  <rect x="35" y="342" width="230" height="28" rx="4" fill="#c8f7c5" stroke="#1abc9c"/>
  <text x="150" y="361" text-anchor="middle" font-size="11" fill="#145a32" font-family="sans-serif">SceneComponentBinding / GenericObjectBinding: FGuid</text>

  <rect x="35" y="378" width="230" height="28" rx="4" fill="#c8f7c5" stroke="#1abc9c"/>
  <text x="150" y="397" text-anchor="middle" font-size="11" fill="#145a32" font-family="sans-serif">BoundObject: UObject*</text>

  <rect x="35" y="414" width="230" height="28" rx="4" fill="#d5d8dc" stroke="#7f8c8d"/>
  <text x="150" y="433" text-anchor="middle" font-size="11" fill="#2c3e50" font-family="sans-serif">BlendChannelInput/Output</text>

  <rect x="35" y="450" width="230" height="28" rx="4" fill="#d5d8dc" stroke="#7f8c8d"/>
  <text x="150" y="469" text-anchor="middle" font-size="11" fill="#2c3e50" font-family="sans-serif">EasingResult · WeightResult</text>

  <rect x="35" y="486" width="230" height="28" rx="4" fill="#d5d8dc" stroke="#7f8c8d"/>
  <text x="150" y="505" text-anchor="middle" font-size="11" fill="#2c3e50" font-family="sans-serif">Tags.NeedsLink / Finished / RestoreState</text>

  <rect x="35" y="522" width="230" height="28" rx="4" fill="#d5d8dc" stroke="#7f8c8d"/>
  <text x="150" y="541" text-anchor="middle" font-size="11" fill="#2c3e50" font-family="sans-serif">InstanceHandle · SequenceID</text>

  <rect x="35" y="558" width="230" height="28" rx="4" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="150" y="577" text-anchor="middle" font-size="11" fill="#922b21" font-family="sans-serif">FastPropertyOffset: uint16</text>

  <rect x="35" y="594" width="230" height="28" rx="4" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="150" y="613" text-anchor="middle" font-size="11" fill="#922b21" font-family="sans-serif">SlowProperty: TSharedPtr</text>

  <!-- ===== Systems (right column) ===== -->
  <rect x="600" y="55" width="380" height="600" rx="8" fill="#fef5fb" stroke="#8e44ad" stroke-width="2"/>
  <text x="790" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c3483" font-family="sans-serif">System (ECS处理器)</text>

  <!-- system blocks -->
  <rect x="615" y="90" width="350" height="44" rx="5" fill="#d7bde2" stroke="#8e44ad"/>
  <text x="790" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a" font-family="sans-serif">UMovieSceneEvalTimeSystem</text>
  <text x="790" y="127" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">Phase:Evaluation  写入 EvalTime 组件值 (所有Entity)</text>

  <rect x="615" y="145" width="350" height="44" rx="5" fill="#d7bde2" stroke="#8e44ad"/>
  <text x="790" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a" font-family="sans-serif">UDoubleChannelEvaluatorSystem</text>
  <text x="790" y="182" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">Read:DoubleChannel+EvalTime  Write:DoubleResult</text>

  <rect x="615" y="200" width="350" height="44" rx="5" fill="#d7bde2" stroke="#8e44ad"/>
  <text x="790" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a" font-family="sans-serif">UFloatChannelEvaluatorSystem</text>
  <text x="790" y="237" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">Read:FloatChannel+EvalTime  Write:FloatResult</text>

  <rect x="615" y="255" width="350" height="44" rx="5" fill="#d7bde2" stroke="#8e44ad"/>
  <text x="790" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a" font-family="sans-serif">UWeightAndEasingEvaluatorSystem</text>
  <text x="790" y="292" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">Phase:Evaluation  计算Weight+Easing系数</text>

  <rect x="615" y="310" width="350" height="44" rx="5" fill="#c0392b" opacity="0.8"/>
  <text x="790" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">UMovieScenePropertyInstantiatorSystem</text>
  <text x="790" y="347" text-anchor="middle" font-size="10" fill="#ffe" font-family="sans-serif">Phase:Instantiation  路由PropertyBinding到对应Blender</text>

  <rect x="615" y="365" width="350" height="44" rx="5" fill="#8e44ad" opacity="0.8"/>
  <text x="790" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">UMovieScenePiecewiseDoubleBlenderSystem</text>
  <text x="790" y="402" text-anchor="middle" font-size="10" fill="#ddd" font-family="sans-serif">Read:DoubleResult  Write:BlendOutput (Absolute/Additive混合)</text>

  <rect x="615" y="420" width="350" height="44" rx="5" fill="#8e44ad" opacity="0.8"/>
  <text x="790" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">UMovieSceneQuaternionBlenderSystem</text>
  <text x="790" y="457" text-anchor="middle" font-size="10" fill="#ddd" font-family="sans-serif">四元数旋转的Slerp混合</text>

  <rect x="615" y="475" width="350" height="44" rx="5" fill="#1a5276" opacity="0.9"/>
  <text x="790" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">UMovieSceneComponentTransformSystem</text>
  <text x="790" y="512" text-anchor="middle" font-size="10" fill="#ccc" font-family="sans-serif">Read:BlendOutput+BoundObject  Write:RelativeTransform (最终写)</text>

  <rect x="615" y="530" width="350" height="44" rx="5" fill="#1a5276" opacity="0.9"/>
  <text x="790" y="550" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">通用 PropertySystem 基类</text>
  <text x="790" y="567" text-anchor="middle" font-size="10" fill="#ccc" font-family="sans-serif">Read:Result+BoundObject  通过 FastOffset/SlowProperty 写UObject属性</text>

  <rect x="615" y="585" width="350" height="44" rx="5" fill="#7f8c8d" opacity="0.85"/>
  <text x="790" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">UMovieSceneInitialValueSystem</text>
  <text x="790" y="622" text-anchor="middle" font-size="10" fill="#ddd" font-family="sans-serif">Phase:Instantiation  保存属性原始值 (RestoreState用)</text>

  <!-- ===== Arrows from components to systems ===== -->
  <!-- EvalTime → EvalTimeSystem -->
  <line x1="265" y1="104" x2="615" y2="112" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <!-- DoubleChannel+EvalTime → DoubleEvaluator -->
  <line x1="265" y1="140" x2="615" y2="167" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <line x1="265" y1="104" x2="400" y2="115" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="3,4"/>
  <!-- FloatChannel → FloatEvaluator -->
  <line x1="265" y1="248" x2="615" y2="222" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <!-- PropertyBinding → Instantiator -->
  <line x1="265" y1="320" x2="615" y2="332" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <!-- DoubleResult → Blender -->
  <line x1="265" y1="176" x2="615" y2="385" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- BoundObject → ComponentTransformSystem -->
  <line x1="265" y1="394" x2="615" y2="495" stroke="#1a5276" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Phase legend bottom -->
  <rect x="20" y="665" width="960" height="28" rx="5" fill="#ecf0f1" stroke="#bbb" stroke-width="1"/>
  <rect x="30" y="671" width="60" height="16" rx="3" fill="#d7bde2" stroke="#8e44ad"/>
  <text x="60" y="683" text-anchor="middle" font-size="10" fill="#4a235a" font-family="sans-serif">Channel Eval</text>
  <rect x="105" y="671" width="60" height="16" rx="3" fill="#c0392b" opacity="0.8"/>
  <text x="135" y="683" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif">Instantiation</text>
  <rect x="180" y="671" width="60" height="16" rx="3" fill="#8e44ad" opacity="0.8"/>
  <text x="210" y="683" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif">Blending</text>
  <rect x="255" y="671" width="60" height="16" rx="3" fill="#1a5276" opacity="0.9"/>
  <text x="285" y="683" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif">PropertyWrite</text>
  <rect x="330" y="671" width="60" height="16" rx="3" fill="#7f8c8d" opacity="0.85"/>
  <text x="360" y="683" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif">InitialValue</text>
  <text x="450" y="684" font-size="11" fill="#555" font-family="sans-serif">IsRelevantImpl() 检查 EntityManager 中是否存在对应 Component → 决定 System 是否被加入图</text>
</svg>
