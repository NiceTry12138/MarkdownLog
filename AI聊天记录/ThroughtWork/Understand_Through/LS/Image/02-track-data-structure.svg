<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2980b9"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#f8f9fa"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">轨道数据结构层次图（以 3DTransform 为例）</text>

  <!-- UMovieScene box -->
  <rect x="360" y="55" width="240" height="58" rx="8" fill="#e8f4fd" stroke="#2980b9" stroke-width="2"/>
  <text x="480" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276" font-family="sans-serif">UMovieScene</text>
  <text x="480" y="100" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">TickResolution · DisplayRate</text>

  <!-- Bindings (left) and MasterTracks (right) -->
  <line x1="400" y1="113" x2="260" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="113" x2="700" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FMovieSceneBinding -->
  <rect x="90" y="158" width="340" height="60" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="260" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d6608" font-family="sans-serif">FMovieSceneBinding</text>
  <text x="260" y="197" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">ObjectGuid: FGuid  ·  BindingName: FString</text>
  <text x="260" y="212" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">Tracks: TArray&lt;UMovieSceneTrack*&gt;</text>

  <!-- MasterTracks box -->
  <rect x="570" y="158" width="300" height="60" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="720" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d6608" font-family="sans-serif">MasterTracks (无绑定轨道)</text>
  <text x="720" y="197" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">例：CameraCutTrack · AudioTrack</text>
  <text x="720" y="212" text-anchor="middle" font-size="11" fill="#666" font-family="sans-serif">不绑定到具体对象，直接驱动全局效果</text>

  <!-- Arrow from Binding to Track -->
  <line x1="260" y1="218" x2="260" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UMovieSceneTrack -->
  <rect x="80" y="282" width="360" height="80" rx="8" fill="#fef5fb" stroke="#9b59b6" stroke-width="2"/>
  <text x="260" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c3483" font-family="sans-serif">UMovieSceneTrack（基类）</text>
  <text x="260" y="323" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">EvalOptions · DisplayOptions · SupportedBlendTypes</text>
  <text x="260" y="341" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">GetEvaluationField()  ·  PopulateEvaluationTree()</text>
  <text x="260" y="357" text-anchor="middle" font-size="11" fill="#888" font-family="sans-serif">子类例：UMovieScene3DTransformTrack</text>

  <!-- Arrow to Section -->
  <line x1="260" y1="362" x2="260" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UMovieSceneSection -->
  <rect x="30" y="424" width="460" height="100" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="260" y="447" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e34" font-family="sans-serif">UMovieSceneSection（基类）</text>
  <text x="260" y="467" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">SectionRange: TRange&lt;FFrameNumber&gt;   ·   BlendType</text>
  <text x="260" y="485" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">EasingSettings  ·  CompletionMode (KeepState / RestoreState)</text>
  <text x="260" y="503" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">IMovieSceneEntityProvider 接口：ImportEntityImpl()</text>
  <text x="260" y="519" text-anchor="middle" font-size="11" fill="#888" font-family="sans-serif">子类例：UMovieScene3DTransformSection</text>

  <!-- Arrow to Channels -->
  <line x1="260" y1="524" x2="260" y2="575" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FMovieSceneDoubleChannel boxes -->
  <rect x="30" y="578" width="135" height="64" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="97" y="597" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e34" font-family="sans-serif">Translation[3]</text>
  <text x="97" y="614" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">X/Y/Z → </text>
  <text x="97" y="630" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">FMovieSceneDoubleChannel</text>

  <rect x="178" y="578" width="135" height="64" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="245" y="597" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e34" font-family="sans-serif">Rotation[3]</text>
  <text x="245" y="614" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">Roll/Pitch/Yaw</text>
  <text x="245" y="630" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">FMovieSceneDoubleChannel</text>

  <rect x="326" y="578" width="135" height="64" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="393" y="597" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e34" font-family="sans-serif">Scale[3]</text>
  <text x="393" y="614" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">X/Y/Z</text>
  <text x="393" y="630" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">FMovieSceneDoubleChannel</text>

  <!-- FMovieSceneDoubleChannel detail box -->
  <rect x="520" y="282" width="400" height="192" rx="8" fill="#fdebd0" stroke="#e74c3c" stroke-width="2"/>
  <text x="720" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21" font-family="sans-serif">FMovieSceneDoubleChannel（关键帧曲线）</text>
  <text x="535" y="332" font-size="12" fill="#555" font-family="sans-serif">• Times: TArray&lt;FFrameNumber&gt;    关键帧时间点</text>
  <text x="535" y="352" font-size="12" fill="#555" font-family="sans-serif">• Values: TArray&lt;FMovieSceneDoubleValue&gt;  关键帧值</text>
  <text x="535" y="373" font-size="12" fill="#555" font-family="sans-serif">FMovieSceneDoubleValue 结构：</text>
  <text x="553" y="393" font-size="11" fill="#666" font-family="sans-serif">  Value: double          —  具体数值</text>
  <text x="553" y="413" font-size="11" fill="#666" font-family="sans-serif">  InterpMode: Cubic/Linear/Constant</text>
  <text x="553" y="433" font-size="11" fill="#666" font-family="sans-serif">  TangentMode: Auto/User/Break</text>
  <text x="553" y="453" font-size="11" fill="#666" font-family="sans-serif">  Tangent: Arrive/Leave 切线斜率</text>
  <text x="535" y="470" font-size="11" fill="#888" font-family="sans-serif">Evaluate(FrameTime) → 插值求值，返回 double</text>

  <!-- FMovieSceneTrackEvaluationField box -->
  <rect x="520" y="495" width="400" height="84" rx="8" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
  <text x="720" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276" font-family="sans-serif">FMovieSceneTrackEvaluationField（编译产物）</text>
  <text x="535" y="540" font-size="11" fill="#555" font-family="sans-serif">• Ranges: TArray&lt;FFrameNumberRange&gt;   每段时间范围</text>
  <text x="535" y="558" font-size="11" fill="#555" font-family="sans-serif">• Entities: TArray&lt;FMovieSceneEntityID&gt;  对应的Entity列表</text>
  <text x="535" y="576" font-size="11" fill="#888" font-family="sans-serif">由 GetEvaluationField() 懒计算，运行时查 Range → 激活哪些Entity</text>

  <!-- Arrow Binding to Track label -->
  <text x="218" y="258" font-size="11" fill="#888" font-family="sans-serif">包含</text>
  <!-- Arrow Track to Section label -->
  <text x="218" y="410" font-size="11" fill="#888" font-family="sans-serif">包含</text>

  <!-- Connectors Section -> DoubleChannel detail -->
  <line x1="490" y1="470" x2="520" y2="400" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="497" y="448" font-size="10" fill="#27ae60" font-family="sans-serif">9条曲线</text>

  <!-- Connector Track to EvalField -->
  <line x1="440" y1="340" x2="520" y2="540" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="470" y="450" font-size="10" fill="#2980b9" font-family="sans-serif">生成</text>
</svg>
